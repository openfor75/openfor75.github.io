<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>日常分錄互動練習</title>
<style>
:root{
  --bg:#f4f6f8; --card:#ffffff; --ink:#1f2933; --sub:#5c6b7a;
  --line:#d8dee6; --brand:#1d5c8f; --brand-d:#16466c;
  --ok:#1a7f47; --ok-bg:#e6f5ec; --bad:#c0392b; --bad-bg:#fdecea;
  --warn:#b26a00; --warn-bg:#fff5e0;
  --A:#1d5c8f; --L:#b0532c; --C:#6b3fa0; --R:#1a7f47; --E:#a8371f;
  --tap:46px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  background:var(--bg); color:var(--ink); font-size:16px; line-height:1.6;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;font-size:16px;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;font-size:16px}
.hide{display:none !important}
.wrap{max-width:760px;margin:0 auto;padding:12px}

/* ---------- 通用元件 ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  min-height:var(--tap);padding:10px 18px;border-radius:10px;
  background:var(--brand);color:#fff;font-weight:700;width:100%;
}
.btn:active{background:var(--brand-d)}
.btn.ghost{background:#fff;color:var(--brand);border:2px solid var(--brand)}
.btn.grey{background:#e3e8ee;color:var(--ink)}
.btn.sm{min-height:40px;padding:8px 14px;font-size:15px;width:auto}
.btn[disabled]{opacity:.45;pointer-events:none}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>.btn{flex:1 1 0;min-width:130px}
h1{font-size:24px;margin:4px 0 2px}
h2{font-size:19px;margin:0 0 10px}
h3{font-size:17px;margin:0 0 8px}
.muted{color:var(--sub);font-size:15px}

/* ---------- 首頁 ---------- */
#home .pick{margin-bottom:10px;text-align:left;padding:14px 16px;
  background:#fff;border:1px solid var(--line);border-radius:12px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%}
#home .pick:active{border-color:var(--brand);background:#f0f6fb}
#home .pick b{font-size:18px;display:block}
#home .pick .meta{color:var(--sub);font-size:14px}
.badge{background:#eaf1f7;color:var(--brand);border-radius:999px;padding:3px 10px;font-size:13px;font-weight:700;white-space:nowrap}
.badge.done{background:var(--ok-bg);color:var(--ok)}
.badge.err{background:var(--bad-bg);color:var(--bad)}

/* ---------- 頂列 ---------- */
.topbar{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:8px 12px}
.topbar .line1{display:flex;align-items:center;gap:10px;justify-content:space-between}
.topbar .stat{font-size:14px;color:var(--sub);white-space:nowrap}
.bar{height:7px;background:#e3e8ee;border-radius:4px;overflow:hidden;margin-top:7px}
.bar>i{display:block;height:100%;background:var(--brand);border-radius:4px;transition:width .25s}
.iconbtn{min-width:var(--tap);min-height:38px;padding:6px 12px;border-radius:8px;background:#eef2f6;font-size:14px;font-weight:700;color:var(--sub)}

/* ---------- 題目 ---------- */
.qmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag{background:#eef2f6;color:var(--sub);border-radius:6px;padding:2px 9px;font-size:13px}
.qtext{font-size:18px;line-height:1.75;font-weight:500}

/* ---------- 分錄列 ---------- */
.side{margin-bottom:12px}
.side .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.side .head b{font-size:17px}
.side.dr{border-left:5px solid var(--brand);padding-left:10px}
.side.cr{border-left:5px solid var(--L);padding-left:10px}
.sum{font-variant-numeric:tabular-nums;font-weight:700;font-size:16px}

.jrow{display:flex;gap:8px;align-items:stretch;margin-bottom:8px}
.jrow .acct{flex:1 1 auto;min-width:0;min-height:var(--tap);padding:8px 12px;border:1.5px solid var(--line);
  border-radius:9px;background:#fff;text-align:left;font-size:16px;display:flex;align-items:center;overflow:hidden}
.jrow .acct span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.jrow .acct.empty{color:#9aa7b4}
.jrow .acct.set{border-color:var(--brand);font-weight:600}
.jrow .amt{width:118px;flex:0 0 118px;min-height:var(--tap);padding:8px 10px;border:1.5px solid var(--line);
  border-radius:9px;text-align:right;font-variant-numeric:tabular-nums;font-size:16px;background:#fff}
.jrow .amt:focus,.jrow .acct:focus{outline:2px solid var(--brand);outline-offset:1px}
.jrow .del{flex:0 0 40px;min-height:var(--tap);border-radius:9px;background:#f0f3f6;color:var(--sub);font-size:20px;
  display:flex;align-items:center;justify-content:center}
.jrow.mark-ok .acct,.jrow.mark-ok .amt{border-color:var(--ok);background:var(--ok-bg)}
.jrow.mark-bad .acct,.jrow.mark-bad .amt{border-color:var(--bad);background:var(--bad-bg)}
.rowmsg{font-size:14px;margin:-4px 0 8px 2px;font-weight:600}
.rowmsg.ok{color:var(--ok)} .rowmsg.bad{color:var(--bad)}

.addrow{width:100%;min-height:42px;border:1.5px dashed var(--line);border-radius:9px;color:var(--brand);font-weight:700;background:#fff}
.addrow:active{background:#f0f6fb}

/* ---------- 合計列 ---------- */
.totals{position:sticky;bottom:0;z-index:15;background:var(--card);border-top:1px solid var(--line);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));}
.totals .t{display:flex;justify-content:space-between;font-size:15px;font-variant-numeric:tabular-nums}
.totals .t b{font-size:16px}
.totals.bad .t.diff{color:var(--bad);font-weight:700}
.totals.ok .t.diff{color:var(--ok);font-weight:700}
.totals .acts{display:flex;gap:8px;margin-top:8px}
.totals .acts>*{flex:1}

/* ---------- 項目選擇器 ---------- */
.sheet{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(20,28,36,.5)}
.sheet .panel{background:var(--card);border-radius:16px 16px 0 0;max-height:88vh;display:flex;flex-direction:column;
  padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
@media(min-width:700px){
  .sheet{justify-content:center;align-items:center}
  .sheet .panel{border-radius:16px;max-width:640px;width:100%;max-height:82vh}
}
.sheet .shead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sheet .shead b{font-size:17px}
.search{width:100%;min-height:var(--tap);padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px}
.search:focus{outline:2px solid var(--brand);outline-offset:1px}
.clsrow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.clsbtn{flex:1 1 0;min-width:62px;min-height:var(--tap);border-radius:10px;background:#eef2f6;color:var(--sub);
  font-weight:700;font-size:15px;border:2px solid transparent;display:flex;flex-direction:column;justify-content:center;line-height:1.25}
.clsbtn small{font-size:11px;opacity:.75;font-weight:500}
.clsbtn[data-c="A"].on{background:var(--A);color:#fff}
.clsbtn[data-c="L"].on{background:var(--L);color:#fff}
.clsbtn[data-c="C"].on{background:var(--C);color:#fff}
.clsbtn[data-c="R"].on{background:var(--R);color:#fff}
.clsbtn[data-c="E"].on{background:var(--E);color:#fff}
.acclist{overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-wrap:wrap;gap:7px;padding:2px 0 4px;flex:1}
.accbtn{min-height:42px;padding:8px 13px;border-radius:9px;background:#fff;border:1.5px solid var(--line);font-size:15.5px}
.accbtn:active{background:#f0f6fb;border-color:var(--brand)}
.accbtn i{font-style:normal;font-size:12px;font-weight:700;margin-right:5px;opacity:.85}
.accbtn[data-c="A"] i{color:var(--A)} .accbtn[data-c="L"] i{color:var(--L)}
.accbtn[data-c="C"] i{color:var(--C)} .accbtn[data-c="R"] i{color:var(--R)}
.accbtn[data-c="E"] i{color:var(--E)}
.empty-note{color:var(--sub);padding:14px 4px;font-size:15px}

/* ---------- 詳解 ---------- */
.verdict{border-radius:10px;padding:12px 14px;margin-bottom:12px;font-weight:700;font-size:17px}
.verdict.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #b6e0c6}
.verdict.bad{background:var(--bad-bg);color:var(--bad);border:1px solid #f2c2bc}
.journal{background:#fbfcfd;border:1px solid var(--line);border-radius:10px;padding:14px 12px;font-variant-numeric:tabular-nums}
.jline{display:flex;align-items:baseline;gap:8px;padding:3px 0;font-size:16.5px}
.jline .nm{flex:1 1 auto}
.jline.cr .nm{padding-left:2.2em}
.jline .v{flex:0 0 auto;font-weight:600;min-width:96px;text-align:right}
.notebox{background:var(--warn-bg);border:1px solid #f0d9a8;color:#6b4400;border-radius:10px;padding:10px 12px;margin-top:10px;font-size:15px}

/* ---------- 總結 ---------- */
.score{text-align:center;padding:6px 0 12px}
.score .n{font-size:44px;font-weight:800;color:var(--brand);line-height:1.1}
.catrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line)}
.catrow:last-child{border-bottom:none}
.catrow .nm{flex:0 0 34%;font-size:15px}
.catrow .track{flex:1;height:9px;background:#e3e8ee;border-radius:5px;overflow:hidden}
.catrow .track>i{display:block;height:100%;background:var(--ok)}
.catrow .track.low>i{background:var(--bad)}
.catrow .track.mid>i{background:var(--warn)}
.catrow .v{flex:0 0 66px;text-align:right;font-size:14px;color:var(--sub);font-variant-numeric:tabular-nums}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#1f2933;color:#fff;
  padding:10px 18px;border-radius:999px;font-size:15px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw}
.toast.show{opacity:.95}
</style>
</head>
<body>

<!-- ========== 首頁 ========== -->
<div id="home" class="wrap">
  <div class="card">
    <h1>日常分錄互動練習</h1>
    <p class="muted" style="margin:6px 0 0">會計資訊科・日常交易分錄　共 60 題</p>
  </div>
  <div class="card">
    <h2>選擇試卷</h2>
    <div id="pickList"></div>
  </div>
  <div class="card">
    <h3>學習紀錄</h3>
    <p class="muted" id="recSummary" style="margin:0 0 10px">尚無紀錄。</p>
    <div class="row">
      <button class="btn ghost sm" style="flex:1" id="btnWrongAll">錯題重練</button>
      <button class="btn grey sm" style="flex:1" id="btnReset">清除紀錄</button>
    </div>
  </div>
</div>

<!-- ========== 答題 ========== -->
<div id="quiz" class="hide">
  <div class="topbar">
    <div class="line1">
      <button class="iconbtn" id="btnBack">‹ 返回</button>
      <div class="stat" id="statText">—</div>
      <button class="iconbtn" id="btnSkip">跳過 ›</button>
    </div>
    <div class="bar"><i id="progFill" style="width:0"></i></div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="qmeta" id="qMeta"></div>
      <div class="qtext" id="qText"></div>
    </div>

    <div class="card" id="entryCard">
      <div class="side dr">
        <div class="head"><b>借方</b><span class="sum" id="drSum">0</span></div>
        <div id="drRows"></div>
        <button class="addrow" id="drAdd">＋ 新增借方項目</button>
      </div>
      <div class="side cr">
        <div class="head"><b>貸方</b><span class="sum" id="crSum">0</span></div>
        <div id="crRows"></div>
        <button class="addrow" id="crAdd">＋ 新增貸方項目</button>
      </div>
      <button class="btn grey sm" id="btnNoEntry" style="width:100%;margin-top:4px">本題不作分錄</button>
    </div>

    <div class="card hide" id="resultCard">
      <div class="verdict" id="verdict"></div>
      <h3>標準分錄</h3>
      <div class="journal" id="stdJournal"></div>
      <div id="noteBox"></div>
    </div>
  </div>

  <div class="totals" id="totals">
    <div class="t"><span>借方合計　<b id="tDr">0</b></span><span>貸方合計　<b id="tCr">0</b></span></div>
    <div class="t diff" id="tDiff"><span id="diffText">尚未輸入</span></div>
    <div class="acts">
      <button class="btn" id="btnSubmit">送出批改</button>
      <button class="btn hide" id="btnNext">下一題 ›</button>
    </div>
  </div>
</div>

<!-- ========== 總結 ========== -->
<div id="summary" class="wrap hide">
  <div class="card">
    <h2 id="sumTitle">作答總結</h2>
    <div class="score"><div class="n" id="sumScore">0/0</div><div class="muted" id="sumRate">答對率 0%</div></div>
  </div>
  <div class="card">
    <h3>各類別答對率</h3>
    <div id="catList"></div>
  </div>
  <div class="card">
    <div class="row">
      <button class="btn" id="sumWrong">錯題重練</button>
      <button class="btn ghost" id="sumHome">回首頁</button>
    </div>
  </div>
</div>

<!-- ========== 項目選擇 ========== -->
<div class="sheet hide" id="sheet">
  <div class="panel">
    <div class="shead"><b id="sheetTitle">選擇會計項目</b><button class="iconbtn" id="sheetClose">關閉</button></div>
    <input class="search" id="sheetSearch" type="text" placeholder="輸入項目名稱搜尋…" autocomplete="off">
    <div class="clsrow" id="clsRow"></div>
    <div class="acclist" id="accList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
"use strict";
/* ============ 常數 ============ */
var CLS = {
  A:{n:"資產",c:"var(--A)"}, L:{n:"負債",c:"var(--L)"}, C:{n:"權益",c:"var(--C)"},
  R:{n:"收益",c:"var(--R)"}, E:{n:"費損",c:"var(--E)"}
};
var CLS_ORDER = ["A","L","C","R","E"];
var LS_KEY = "jrnl_practice_v1";
var MAX_ROWS = 4;

var ACC_MAP = {};
ACCOUNTS.forEach(function(a){ ACC_MAP[a.name] = a.cls; });

/* ============ 工具 ============ */
function $(id){ return document.getElementById(id); }
function fmt(n){ return (n||0).toLocaleString("en-US"); }
function el(tag, cls, txt){
  var e = document.createElement(tag);
  if(cls) e.className = cls;
  if(txt !== undefined && txt !== null) e.textContent = txt;
  return e;
}
function show(id){ $(id).classList.remove("hide"); }
function hide(id){ $(id).classList.add("hide"); }
var toastTimer = null;
function toast(msg){
  var t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 1800);
}

/* ============ 紀錄 (localStorage) ============ */
function loadRec(){
  try{
    var r = JSON.parse(localStorage.getItem(LS_KEY));
    if(r && typeof r === "object") return r;
  }catch(e){}
  return { sets:{}, wrong:[] };
}
function saveRec(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(REC)); }
  catch(e){ /* 隱私模式等情況忽略 */ }
}
var REC = loadRec();
if(!REC.sets) REC.sets = {};
if(!Array.isArray(REC.wrong)) REC.wrong = [];

function markResult(key, correct){
  var i = REC.wrong.indexOf(key);
  if(correct){ if(i >= 0) REC.wrong.splice(i,1); }
  else if(i < 0){ REC.wrong.push(key); }
}

/* ============ 狀態 ============ */
var S = {
  setId:"", setName:"", list:[], idx:0,
  drRows:[], crRows:[], graded:false, noEntry:false,
  results:[]      // {key, cat, correct}
};
function blankRow(){ return { acct:"", amt:"" }; }

/* ============ 首頁 ============ */
function buildHome(){
  var box = $("pickList"); box.innerHTML = "";
  var defs = [
    { id:"A", name:"A 卷", desc:"依序 30 題" },
    { id:"B", name:"B 卷", desc:"依序 30 題" },
    { id:"R", name:"隨機 10 題", desc:"從 60 題中隨機抽選" }
  ];
  defs.forEach(function(d){
    var b = el("button","pick");
    var L = el("div");
    L.appendChild(el("b", null, d.name));
    var meta = el("div","meta", d.desc);
    L.appendChild(meta);
    b.appendChild(L);
    var st = REC.sets[d.id];
    var bd;
    if(d.id !== "R" && st && st.done > 0){
      bd = el("span","badge done", "已作答 " + st.done + " 題・答對 " + st.correct);
    }else{
      bd = el("span","badge", "開始 ›");
    }
    b.appendChild(bd);
    b.addEventListener("click", function(){ startSet(d.id); });
    box.appendChild(b);
  });

  var n = REC.wrong.length;
  $("recSummary").textContent = n > 0
    ? "目前累積錯題 " + n + " 題,可點「錯題重練」集中複習。"
    : "尚無錯題紀錄。";
  $("btnWrongAll").disabled = (n === 0);
}

function pickQuestions(setId){
  if(setId === "A" || setId === "B"){
    return QUESTIONS.filter(function(q){ return q.ver === setId; })
                    .slice().sort(function(a,b){ return a.no - b.no; });
  }
  if(setId === "R"){
    var pool = QUESTIONS.slice();
    for(var i = pool.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
    }
    return pool.slice(0, 10);
  }
  if(setId === "W"){
    var set = {};
    REC.wrong.forEach(function(k){ set[k] = 1; });
    return QUESTIONS.filter(function(q){ return set[q.key]; })
                    .slice().sort(function(a,b){
                      return a.ver === b.ver ? a.no - b.no : (a.ver < b.ver ? -1 : 1);
                    });
  }
  return [];
}

function startSet(setId){
  var list = pickQuestions(setId);
  if(!list.length){ toast("沒有可練習的題目"); return; }
  S.setId = setId;
  S.setName = setId === "A" ? "A 卷" : setId === "B" ? "B 卷"
            : setId === "R" ? "隨機 10 題" : "錯題重練";
  S.list = list; S.idx = 0; S.results = [];
  if(setId === "A" || setId === "B") REC.sets[setId] = { done:0, correct:0, total:list.length };
  saveRec();
  hide("home"); hide("summary"); show("quiz");
  renderQuestion();
}

/* ============ 答題畫面 ============ */
function renderQuestion(){
  var q = S.list[S.idx];
  S.drRows = [blankRow()];
  S.crRows = [blankRow()];
  S.graded = false; S.noEntry = false;

  $("qText").textContent = q.text;
  var m = $("qMeta"); m.innerHTML = "";
  m.appendChild(el("span","tag", q.ver + " 卷 第 " + q.no + " 題"));
  m.appendChild(el("span","tag", q.cat));

  hide("resultCard"); show("entryCard");
  $("btnSubmit").classList.remove("hide");
  $("btnNext").classList.add("hide");
  $("btnNoEntry").classList.remove("hide");
  $("btnSkip").classList.remove("hide");

  var pct = Math.round((S.idx / S.list.length) * 100);
  $("progFill").style.width = pct + "%";
  var nCorrect = S.results.filter(function(r){ return r.correct; }).length;
  $("statText").textContent = S.setName + "　第 " + (S.idx + 1) + "/" + S.list.length +
                              " 題　答對 " + nCorrect;

  renderRows();
  window.scrollTo(0, 0);
}

function renderRows(){
  ["dr","cr"].forEach(function(side){
    var rows = side === "dr" ? S.drRows : S.crRows;
    var box = $(side + "Rows");
    box.innerHTML = "";
    rows.forEach(function(r, i){
      var wrap = el("div","jrow");
      if(S.graded && r._mark) wrap.classList.add("mark-" + r._mark);

      var ab = el("button","acct " + (r.acct ? "set" : "empty"));
      ab.appendChild(el("span", null, r.acct || "點選會計項目"));
      ab.disabled = S.graded;
      ab.addEventListener("click", function(){ openSheet(side, i); });
      wrap.appendChild(ab);

      var inp = document.createElement("input");
      inp.className = "amt"; inp.type = "text";
      inp.inputMode = "numeric"; inp.autocomplete = "off";
      inp.placeholder = "金額";
      inp.value = r.amt === "" ? "" : fmt(r.amt);
      inp.disabled = S.graded;
      inp.addEventListener("input", function(){
        var digits = inp.value.replace(/[^\d]/g, "");
        r.amt = digits === "" ? "" : parseInt(digits, 10);
        inp.value = digits === "" ? "" : fmt(r.amt);
        updateTotals();
      });
      wrap.appendChild(inp);

      var del = el("button","del","×");
      del.disabled = S.graded;
      del.addEventListener("click", function(){
        if(rows.length === 1){ rows[0] = blankRow(); }
        else { rows.splice(i, 1); }
        renderRows(); updateTotals();
      });
      wrap.appendChild(del);

      box.appendChild(wrap);

      if(S.graded && r._msg){
        box.appendChild(el("div","rowmsg " + (r._mark === "ok" ? "ok" : "bad"), r._msg));
      }
    });
    $(side + "Add").disabled = S.graded || rows.length >= MAX_ROWS;
    $(side + "Add").classList.toggle("hide", S.graded);
  });
  updateTotals();
}

function sumOf(rows){
  return rows.reduce(function(s, r){ return s + (typeof r.amt === "number" ? r.amt : 0); }, 0);
}
function updateTotals(){
  var d = sumOf(S.drRows), c = sumOf(S.crRows);
  $("drSum").textContent = fmt(d);
  $("crSum").textContent = fmt(c);
  $("tDr").textContent = fmt(d);
  $("tCr").textContent = fmt(c);
  var t = $("totals");
  t.classList.remove("ok","bad");
  if(S.noEntry){ $("diffText").textContent = "已選擇「不作分錄」"; return; }
  if(d === 0 && c === 0){ $("diffText").textContent = "尚未輸入"; return; }
  if(d === c){ t.classList.add("ok"); $("diffText").textContent = "✓ 借貸平衡"; }
  else { t.classList.add("bad"); $("diffText").textContent = "✕ 借貸不平衡,差額 " + fmt(Math.abs(d - c)); }
}

/* ============ 項目選擇器 ============ */
var sheetTarget = null;
var sheetCls = null;

function openSheet(side, idx){
  sheetTarget = { side:side, idx:idx };
  sheetCls = null;
  $("sheetTitle").textContent = (side === "dr" ? "借方" : "貸方") + "・選擇會計項目";
  $("sheetSearch").value = "";
  buildClsRow();
  renderAccList();
  show("sheet");
}
function closeSheet(){ hide("sheet"); sheetTarget = null; }

function buildClsRow(){
  var row = $("clsRow"); row.innerHTML = "";
  CLS_ORDER.forEach(function(c){
    var b = el("button","clsbtn" + (sheetCls === c ? " on" : ""));
    b.dataset.c = c;
    b.appendChild(document.createTextNode(CLS[c].n));
    b.appendChild(el("small", null, c));
    b.addEventListener("click", function(){
      sheetCls = (sheetCls === c) ? null : c;
      $("sheetSearch").value = "";
      buildClsRow(); renderAccList();
    });
    row.appendChild(b);
  });
}

function renderAccList(){
  var kw = $("sheetSearch").value.trim();
  var box = $("accList"); box.innerHTML = "";
  var list = ACCOUNTS.filter(function(a){
    if(kw) return a.name.indexOf(kw) >= 0;
    if(sheetCls) return a.cls === sheetCls;
    return true;
  });
  if(!list.length){
    box.appendChild(el("div","empty-note","找不到符合的會計項目,請確認名稱。"));
    return;
  }
  if(!kw && !sheetCls){
    box.appendChild(el("div","empty-note","請先點上方五大類,或直接輸入名稱搜尋。"));
  }
  list.sort(function(a,b){
    return CLS_ORDER.indexOf(a.cls) - CLS_ORDER.indexOf(b.cls) || a.name.localeCompare(b.name,"zh-Hant");
  });
  list.forEach(function(a){
    var b = el("button","accbtn");
    b.dataset.c = a.cls;
    b.appendChild(el("i", null, a.cls));
    b.appendChild(document.createTextNode(a.name));
    b.addEventListener("click", function(){ chooseAcct(a.name); });
    box.appendChild(b);
  });
}

function chooseAcct(name){
  if(!sheetTarget) return;
  var rows = sheetTarget.side === "dr" ? S.drRows : S.crRows;
  rows[sheetTarget.idx].acct = name;
  S.noEntry = false;
  closeSheet();
  renderRows();
}

/* ============ 批改 ============ */
function gradeSide(rows, answer){
  // answer: [{acct, amt}]  → 集合比對,不計順序
  var remain = answer.map(function(a){ return { acct:a.acct, amt:a.amt, used:false }; });
  var allOk = true;

  rows.forEach(function(r){
    if(!r.acct && r.amt === ""){ r._mark = ""; r._msg = ""; return; }
    if(!r.acct){ r._mark = "bad"; r._msg = "未選擇會計項目"; allOk = false; return; }
    if(r.amt === ""){ r._mark = "bad"; r._msg = "未輸入金額"; allOk = false; return; }

    var exact = null, nameOnly = null;
    for(var i = 0; i < remain.length; i++){
      if(remain[i].used) continue;
      if(remain[i].acct === r.acct){
        if(remain[i].amt === r.amt){ exact = remain[i]; break; }
        if(nameOnly === null) nameOnly = remain[i];
      }
    }
    if(exact){ exact.used = true; r._mark = "ok"; r._msg = "✓ 正確"; }
    else if(nameOnly){
      nameOnly.used = true; r._mark = "bad";
      r._msg = "項目正確,金額應為 " + fmt(nameOnly.amt);
      allOk = false;
    }else{
      r._mark = "bad"; r._msg = "此項目不在本題答案中(多列)";
      allOk = false;
    }
  });

  var missing = remain.filter(function(a){ return !a.used; });
  if(missing.length) allOk = false;
  return { ok:allOk, missing:missing };
}

function doSubmit(){
  var q = S.list[S.idx];
  var isEmptyAns = (q.dr.length === 0 && q.cr.length === 0);
  var correct, msgs = [];

  if(S.noEntry){
    correct = isEmptyAns;
    if(!correct) msgs.push("本題仍須作分錄。");
  }else if(isEmptyAns){
    var typed = S.drRows.concat(S.crRows).some(function(r){ return r.acct || r.amt !== ""; });
    correct = !typed;
    if(!correct) msgs.push("本題屬「無須作分錄」事項,不應作分錄。");
  }else{
    var gd = gradeSide(S.drRows, q.dr);
    var gc = gradeSide(S.crRows, q.cr);
    correct = gd.ok && gc.ok;
    gd.missing.forEach(function(a){ msgs.push("借方漏列:" + a.acct + " " + fmt(a.amt)); });
    gc.missing.forEach(function(a){ msgs.push("貸方漏列:" + a.acct + " " + fmt(a.amt)); });
  }

  S.graded = true;
  S.results.push({ key:q.key, cat:q.cat, correct:correct });
  markResult(q.key, correct);
  if(S.setId === "A" || S.setId === "B"){
    var st = REC.sets[S.setId] || { done:0, correct:0, total:S.list.length };
    st.done = S.results.length;
    st.correct = S.results.filter(function(r){ return r.correct; }).length;
    st.total = S.list.length;
    REC.sets[S.setId] = st;
  }
  saveRec();

  renderRows();
  showResult(q, correct, msgs);
}

function showResult(q, correct, msgs){
  var v = $("verdict");
  v.className = "verdict " + (correct ? "ok" : "bad");
  v.textContent = correct ? "✓ 答對了!" : "✕ 答錯了,請看下方標準分錄。";

  var jr = $("stdJournal"); jr.innerHTML = "";
  if(q.dr.length === 0 && q.cr.length === 0){
    jr.appendChild(el("div","jline","(本題無須作分錄)"));
  }else{
    q.dr.forEach(function(a){
      var l = el("div","jline dr");
      l.appendChild(el("span","nm", a.acct));
      l.appendChild(el("span","v", fmt(a.amt)));
      jr.appendChild(l);
    });
    q.cr.forEach(function(a){
      var l = el("div","jline cr");
      l.appendChild(el("span","nm", a.acct));
      l.appendChild(el("span","v", fmt(a.amt)));
      jr.appendChild(l);
    });
  }

  var nb = $("noteBox"); nb.innerHTML = "";
  var extra = msgs.slice();
  if(q.note) extra.unshift("說明:" + q.note);
  if(extra.length && !correct || q.note){
    var box = el("div","notebox");
    extra.forEach(function(t, i){
      if(i) box.appendChild(document.createElement("br"));
      box.appendChild(document.createTextNode(t));
    });
    nb.appendChild(box);
  }

  show("resultCard");
  $("btnSubmit").classList.add("hide");
  $("btnNext").classList.remove("hide");
  $("btnNext").textContent = (S.idx === S.list.length - 1) ? "看總結 ›" : "下一題 ›";
  $("btnNoEntry").classList.add("hide");
  $("btnSkip").classList.add("hide");
  $("resultCard").scrollIntoView({ behavior:"smooth", block:"start" });
}

/* ============ 總結 ============ */
function showSummary(){
  hide("quiz"); show("summary");
  var n = S.results.length;
  var ok = S.results.filter(function(r){ return r.correct; }).length;
  $("sumTitle").textContent = S.setName + "・作答總結";
  $("sumScore").textContent = ok + "/" + n;
  $("sumRate").textContent = "答對率 " + (n ? Math.round(ok / n * 100) : 0) + "%";

  var byCat = {};
  S.results.forEach(function(r){
    if(!byCat[r.cat]) byCat[r.cat] = { t:0, c:0 };
    byCat[r.cat].t++; if(r.correct) byCat[r.cat].c++;
  });
  var box = $("catList"); box.innerHTML = "";
  Object.keys(byCat).sort(function(a,b){
    return (byCat[a].c / byCat[a].t) - (byCat[b].c / byCat[b].t) || a.localeCompare(b,"zh-Hant");
  }).forEach(function(k){
    var d = byCat[k], p = Math.round(d.c / d.t * 100);
    var row = el("div","catrow");
    row.appendChild(el("div","nm", k));
    var tr = el("div","track" + (p < 50 ? " low" : p < 80 ? " mid" : ""));
    var f = el("i"); f.style.width = p + "%"; tr.appendChild(f);
    row.appendChild(tr);
    row.appendChild(el("div","v", d.c + "/" + d.t + "・" + p + "%"));
    box.appendChild(row);
  });

  $("sumWrong").disabled = (REC.wrong.length === 0);
  window.scrollTo(0, 0);
}

/* ============ 事件 ============ */
$("drAdd").addEventListener("click", function(){
  if(S.drRows.length < MAX_ROWS){ S.drRows.push(blankRow()); S.noEntry = false; renderRows(); }
});
$("crAdd").addEventListener("click", function(){
  if(S.crRows.length < MAX_ROWS){ S.crRows.push(blankRow()); S.noEntry = false; renderRows(); }
});
$("btnNoEntry").addEventListener("click", function(){
  S.drRows = [blankRow()]; S.crRows = [blankRow()];
  S.noEntry = true;
  renderRows();
  toast("已標記為「本題不作分錄」,請按送出批改");
});
$("btnSubmit").addEventListener("click", function(){
  var any = S.drRows.concat(S.crRows).some(function(r){ return r.acct || r.amt !== ""; });
  if(!any && !S.noEntry){ toast("請先建立分錄,或點「本題不作分錄」"); return; }
  doSubmit();
});
$("btnNext").addEventListener("click", function(){
  if(S.idx === S.list.length - 1){ showSummary(); }
  else { S.idx++; renderQuestion(); }
});
$("btnSkip").addEventListener("click", function(){
  if(S.idx === S.list.length - 1){ showSummary(); }
  else { S.idx++; renderQuestion(); }
});
$("btnBack").addEventListener("click", function(){
  hide("quiz"); show("home"); buildHome(); window.scrollTo(0,0);
});
$("sheetClose").addEventListener("click", closeSheet);
$("sheet").addEventListener("click", function(e){ if(e.target === $("sheet")) closeSheet(); });
$("sheetSearch").addEventListener("input", function(){
  if($("sheetSearch").value.trim()) sheetCls = null, buildClsRow();
  renderAccList();
});
$("sheetSearch").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    var first = $("accList").querySelector(".accbtn");
    if(first) first.click();
  }
});
$("btnWrongAll").addEventListener("click", function(){ startSet("W"); });
$("sumWrong").addEventListener("click", function(){ startSet("W"); });
$("sumHome").addEventListener("click", function(){
  hide("summary"); show("home"); buildHome(); window.scrollTo(0,0);
});
$("btnReset").addEventListener("click", function(){
  if(confirm("確定清除所有作答紀錄與錯題?此動作無法復原。")){
    REC = { sets:{}, wrong:[] };
    saveRec(); buildHome(); toast("已清除紀錄");
  }
});

buildHome();
</script>
