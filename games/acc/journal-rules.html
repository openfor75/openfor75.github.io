<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>借貸法則大挑戰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F8F6EF;
  --rule:#C9D6E8;
  --margin-red:#D65A5A;
  --ink:#22303A;
  --ink-soft:#5B6B77;
  --stamp:#C1272D;
  --up:#1E7F4F;
  --down:#C1272D;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(90deg, transparent 0, transparent 2.4rem, var(--margin-red) 2.4rem, var(--margin-red) calc(2.4rem + 1.5px), transparent calc(2.4rem + 1.5px)),
    repeating-linear-gradient(0deg, transparent 0, transparent 27px, var(--rule) 27px, var(--rule) 28px);
  display:flex;flex-direction:column;
  overflow:hidden;
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}

/* ── 頁首 ── */
header{
  padding:.7rem 1rem .4rem;
  display:flex;align-items:baseline;justify-content:space-between;gap:.6rem;flex-wrap:wrap;
}
h1{
  font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;
  font-size:clamp(1.05rem,4.3vw,1.5rem);letter-spacing:.12em;
}
h1 small{font-size:.6em;font-weight:600;color:var(--ink-soft);letter-spacing:.15em;margin-left:.4em;}
.scorebar{display:flex;gap:.9rem;font-size:.85rem;font-weight:500;color:var(--ink-soft);align-items:baseline;}
.scorebar b{color:var(--ink);font-variant-numeric:tabular-nums;}
.streak{color:var(--stamp);font-weight:700;}
#hearts{letter-spacing:.1em;}
.progress{height:6px;margin:0 1rem;border:1px solid var(--rule);border-radius:3px;overflow:hidden;background:#fff;}
.progress i{display:block;height:100%;width:0;background:var(--ink);transition:width .3s ease;}

/* ── 主區 ── */
main{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(.8rem,3vh,1.6rem);position:relative;min-height:0;padding:0 1rem;
}
.deck-hint{position:absolute;top:2%;font-size:.76rem;color:var(--ink-soft);letter-spacing:.1em;text-align:center;width:100%;pointer-events:none;padding:0 1rem;}

/* 題目卡 */
.qcard{
  width:min(90vw,430px);
  background:#fff;border:1.5px solid var(--ink);border-radius:6px;
  box-shadow:4px 4px 0 rgba(34,48,58,.15);
  padding:1rem .9rem .8rem;text-align:center;position:relative;
  cursor:grab;touch-action:none;
}
.qcard.dragging{opacity:.25;}
.qcard .contra{
  position:absolute;top:.4rem;right:.6rem;
  font-size:.62rem;font-weight:700;color:var(--stamp);
  border:1px solid var(--stamp);border-radius:3px;padding:.08em .4em;letter-spacing:.15em;
  display:none;
}
.qcard .qname{
  font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;
  font-size:clamp(1.4rem,6.4vw,2rem);letter-spacing:.05em;line-height:1.35;
}
.qcard .qname.long{font-size:clamp(1.05rem,4.8vw,1.5rem);}
.qcard .delta{
  display:inline-block;margin-top:.35rem;
  font-size:1.05rem;font-weight:900;letter-spacing:.2em;
  padding:.1em .7em;border-radius:4px;color:#fff;
}
.qcard .delta.up{background:var(--up);}
.qcard .delta.down{background:var(--down);}
.qcard .ask{font-size:.72rem;color:var(--ink-soft);letter-spacing:.2em;margin-top:.45rem;}
.tbar{height:7px;border:1px solid var(--rule);border-radius:4px;overflow:hidden;background:#fff;margin-top:.55rem;display:none;}
.tbar i{display:block;height:100%;width:100%;background:var(--up);}
.tbar i.warn{background:var(--stamp);}
.qcard.wrong-shake{animation:shake .4s;}
@keyframes shake{20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}

/* 拖曳漂浮卡 */
.ghost{position:fixed;z-index:50;pointer-events:none;transform:translate(-50%,-50%) rotate(-2deg) scale(.9);}

/* 日記簿 */
.journal{
  width:min(92vw,470px);
  background:#fff;border:1.5px solid var(--ink);border-radius:6px;
  box-shadow:4px 4px 0 rgba(34,48,58,.15);
  padding:.7rem .9rem .9rem;position:relative;
}
.j-head{
  font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;letter-spacing:.5em;
  text-align:center;font-size:1rem;border-bottom:2px solid var(--ink);
  padding-bottom:.4rem;margin-bottom:.2rem;
  display:flex;justify-content:space-between;align-items:baseline;
}
.j-head .j-date{font-size:.72rem;font-weight:600;color:var(--ink-soft);letter-spacing:.15em;}
.jline{
  display:flex;align-items:center;gap:.5rem;
  padding:.85rem .3rem;border-bottom:1px solid var(--rule);
  cursor:pointer;border-radius:4px;
  transition:background .12s ease, transform .12s ease;
  position:relative;
}
.jline:last-child{border-bottom:none;}
.jline.credit{padding-left:2.6em;}
.jline .j-label{
  font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;font-size:1rem;
  color:var(--ink-soft);opacity:.55;width:1.4em;flex:none;
}
.jline .j-slot{
  flex:1;font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;
  font-size:clamp(.95rem,4vw,1.2rem);letter-spacing:.05em;
  color:var(--ink);min-height:1.5em;line-height:1.4;
  border-bottom:1.5px dashed var(--rule);
  display:flex;align-items:center;
}
.jline .j-slot.empty{color:#B9C2CA;font-weight:500;font-size:.85rem;letter-spacing:.15em;white-space:nowrap;}

/* ── 上癮元素:得分浮字與 FEVER 狂熱 ── */
.popup{
  position:absolute;z-index:80;left:50%;top:34%;
  font-weight:900;font-size:1.5rem;color:var(--up);
  text-shadow:1.5px 1.5px 0 #fff;pointer-events:none;
  animation:pop 1s ease forwards;white-space:nowrap;
}
.popup.fev{color:#E8A008;font-size:1.7rem;}
@keyframes pop{from{opacity:1;transform:translate(-50%,0) scale(1);}30%{transform:translate(-50%,-14px) scale(1.15);}to{opacity:0;transform:translate(-50%,-64px) scale(1);}}
body.fever .journal{border-color:#E8A008;box-shadow:0 0 0 3px #E8A008, 6px 6px 0 rgba(232,160,8,.3);}
body.fever .qcard{border-color:#E8A008;box-shadow:4px 4px 0 rgba(232,160,8,.35);}
body.fever #streak-text{animation:fpulse .35s infinite alternate;}
@keyframes fpulse{to{transform:scale(1.18);}}
.jline .j-amt{
  font-variant-numeric:tabular-nums;font-weight:700;font-size:.95rem;
  min-width:4.8em;text-align:right;color:var(--ink);
  border-left:1.5px solid var(--rule);padding-left:.5rem;flex:none;
}
.jline.hover,.jline:active{background:#EFF4FA;transform:translateY(-1px);}
.jline.filled .j-slot{border-bottom-color:var(--ink);}

/* 印章 */
.stamp-seal{
  position:absolute;left:50%;top:44%;z-index:60;pointer-events:none;
  width:104px;height:104px;border:4px solid var(--stamp);border-radius:50%;
  color:var(--stamp);font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;font-size:1.9rem;letter-spacing:.1em;
  display:flex;align-items:center;justify-content:center;
  transform:translate(-50%,-50%) rotate(-12deg) scale(2.2);opacity:0;
  mix-blend-mode:multiply;
}
.stamp-seal.show{animation:stampIn .35s cubic-bezier(.2,1.6,.4,1) forwards;}
@keyframes stampIn{to{transform:translate(-50%,-50%) rotate(-12deg) scale(1);opacity:.9;}}

.feedback{
  min-height:1.5em;text-align:center;
  font-size:.85rem;font-weight:500;color:var(--ink-soft);
  padding:0 1rem;
}
.feedback.err{color:var(--stamp);font-weight:700;}
.feedback.ok{color:var(--up);font-weight:700;}

.pause-btn{
  position:absolute;top:.4rem;right:.6rem;z-index:20;
  font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.1em;
  padding:.35rem .7rem;border:1.5px solid var(--ink);border-radius:5px;
  background:#fff;color:var(--ink);cursor:pointer;display:none;
}

/* ── 覆蓋層 ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(248,246,239,.96);
  display:flex;align-items:center;justify-content:center;padding:1.2rem;
}
.overlay.hidden{display:none;}
.panel{
  width:min(92vw,560px);max-height:90vh;overflow:auto;
  background:#fff;border:1.5px solid var(--ink);border-radius:8px;
  box-shadow:6px 6px 0 rgba(34,48,58,.15);
  padding:1.6rem 1.4rem;text-align:center;
}
.panel h2{font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:.15em;margin-bottom:.6rem;}
.panel p{font-size:.88rem;color:var(--ink-soft);line-height:1.8;margin-bottom:.9rem;}
.panel .big{font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-size:2.6rem;font-weight:900;margin:.3rem 0 .1rem;font-variant-numeric:tabular-nums;}
.stats{display:flex;justify-content:center;gap:1.6rem;margin:.8rem 0 1rem;font-size:.85rem;color:var(--ink-soft);flex-wrap:wrap;}
.stats b{display:block;font-size:1.3rem;color:var(--ink);font-variant-numeric:tabular-nums;}
button.btn{
  font-family:inherit;font-size:.95rem;font-weight:700;letter-spacing:.12em;
  padding:.7rem 1.4rem;margin:.25rem;
  background:var(--ink);color:#fff;border:none;border-radius:6px;cursor:pointer;
}
button.btn.ghost-btn{background:#fff;color:var(--ink);border:1.5px solid var(--ink);}
button.btn:active{transform:translateY(2px);}
.mode-list{display:flex;flex-direction:column;gap:.55rem;margin:.4rem 0 .2rem;}
.mode-btn{
  display:flex;flex-direction:column;align-items:flex-start;text-align:left;
  border:1.5px solid var(--ink);border-radius:6px;background:#fff;cursor:pointer;
  padding:.75rem 1rem;font-family:inherit;color:var(--ink);
}
.mode-btn:active{transform:translateY(2px);}
.mode-btn b{font-size:1.02rem;letter-spacing:.1em;}
.mode-btn span{font-size:.78rem;color:var(--ink-soft);margin-top:.15rem;line-height:1.5;}
.wrong-list{
  text-align:left;font-size:.85rem;line-height:2;margin:.4rem 0 1rem;
  border-top:1px dashed var(--rule);padding-top:.6rem;
}
.wrong-list span.tag{font-weight:700;padding:.05em .45em;border-radius:3px;color:#fff;font-size:.72rem;margin-left:.5em;white-space:nowrap;}
input.txt{
  font-family:inherit;font-size:1rem;color:var(--ink);
  border:1.5px solid var(--ink);border-radius:6px;background:#fff;
  padding:.6rem .8rem;width:100%;margin:.2rem 0;text-align:center;
}
input.txt:focus{outline:2px solid var(--rule);}
.scorecard-box{border-top:1px dashed var(--rule);margin-top:.6rem;padding-top:.8rem;}
#scorecard-result img{width:100%;border:1px solid var(--rule);border-radius:6px;margin:.6rem 0 .2rem;}
.vcode-note{font-size:.78rem;color:var(--ink-soft);line-height:1.6;margin-top:.3rem;}
.verify-result{font-size:1.1rem;font-weight:900;letter-spacing:.15em;margin:.6rem 0;min-height:1.5em;}
.verify-result.ok{color:var(--up);}
.verify-result.bad{color:var(--stamp);}
.rule-table{
  display:grid;grid-template-columns:auto 1fr 1fr;gap:0;
  font-size:.82rem;border:1.5px solid var(--ink);border-radius:6px;overflow:hidden;
  margin:.6rem 0 1rem;text-align:center;
}
.rule-table>div{padding:.4rem .3rem;border-bottom:1px solid var(--rule);}
.rule-table>div:nth-child(-n+3){background:var(--ink);color:#fff;font-weight:700;border-bottom:none;}
.rule-table>div:nth-last-child(-n+3){border-bottom:none;}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;}
}
</style>
</head>
<body>

<header>
  <h1>借貸法則大挑戰<small id="mode-label"></small></h1>
  <div class="scorebar">
    <span id="snd" style="cursor:pointer">🔊</span>
    <span id="hearts"></span>
    <span>進度 <b id="prog-text">0/0</b></span>
    <span>答對 <b id="score-text">0</b></span>
    <span class="streak" id="streak-text"></span>
  </div>
</header>
<div class="progress"><i id="prog-bar"></i></div>

<main id="main">
  <div class="deck-hint" id="deck-hint"></div>
  <button class="pause-btn" id="pause-btn">⏸ 休息</button>

  <div class="qcard" id="qcard" style="visibility:hidden">
    <span class="contra" id="q-contra"></span>
    <div class="qname" id="q-name"></div>
    <span class="delta" id="q-delta"></span>
    <div class="ask">應該記在借方還是貸方?</div>
    <div class="tbar" id="tbar"><i id="tbar-i"></i></div>
  </div>

  <div class="journal" id="journal">
    <div class="j-head"><span>日 記 簿</span><span class="j-date" id="j-date">1月1日</span></div>
    <div class="jline debit" data-side="借">
      <span class="j-label">借</span>
      <span class="j-slot empty" id="slot-d">借方寫這裡</span>
      <span class="j-amt" id="amt-d"></span>
    </div>
    <div class="jline credit" data-side="貸">
      <span class="j-label">貸</span>
      <span class="j-slot empty" id="slot-c">貸方寫這裡</span>
      <span class="j-amt" id="amt-c"></span>
    </div>
  </div>

  <div class="stamp-seal" id="seal">正解</div>
  <div class="feedback" id="feedback"></div>
</main>

<!-- 開始畫面 -->
<div class="overlay" id="ov-start">
  <div class="panel">
    <h2>借貸法則大挑戰</h2>
    <div class="rule-table">
      <div>要素</div><div>增加記</div><div>減少記</div>
      <div><b>資產.費損</b></div><div style="color:#1D5FBF;font-weight:900">借方</div><div style="color:#C1272D;font-weight:900">貸方</div>
      <div><b>負債.權益.收益</b></div><div style="color:#C1272D;font-weight:900">貸方</div><div style="color:#1D5FBF;font-weight:900">借方</div>
    </div>
    <p style="margin-bottom:.5rem">把題目<b>拖到日記簿的正確位置</b>,或直接點那一行!<br>上面是借方,下面空兩格是貸方。減項項目方向相反,小心陷阱!</p>
    <div class="mode-list" id="mode-list"></div>
  </div>
</div>

<!-- 回合小結 -->
<div class="overlay hidden" id="ov-round">
  <div class="panel">
    <h2 id="round-title">第 1 回合完成</h2>
    <div class="stats">
      <span>本回合答對<b id="round-correct">0/10</b></span>
      <span>目前正確率<b id="round-acc">0%</b></span>
    </div>
    <div class="wrong-list" id="round-wrong"></div>
    <button class="btn" id="btn-next">下一回合</button>
  </div>
</div>

<!-- 休息/暫停 -->
<div class="overlay hidden" id="ov-break">
  <div class="panel">
    <h2 id="break-title">休息一下</h2>
    <p id="break-msg"></p>
    <div class="stats">
      <span>目前分數<b id="break-score">0</b></span>
      <span>已答對<b id="break-cleared">0</b></span>
      <span>剩餘生命<b id="break-hearts">❤️❤️❤️</b></span>
    </div>
    <button class="btn" id="btn-resume">繼續挑戰</button>
  </div>
</div>

<!-- 結算 -->
<div class="overlay hidden" id="ov-end">
  <div class="panel">
    <h2>挑戰完成!</h2>
    <div class="big" id="end-score">0 分</div>
    <div class="stats">
      <span id="stat1-label">答對題數<b id="end-correct">0</b></span>
      <span>正確率<b id="end-acc">0%</b></span>
      <span>最長連對<b id="end-streak">0</b></span>
    </div>
    <div class="wrong-list" id="end-wrong"></div>
    <div class="scorecard-box">
      <input class="txt" id="player-name" maxlength="20" placeholder="輸入班級座號姓名(例:商三乙15王小明)">
      <button class="btn ghost-btn" id="btn-make-card">產生成績卡 📸</button>
      <div id="scorecard-result"></div>
    </div>
    <button class="btn" id="btn-retry-wrong">錯題重練</button>
    <button class="btn ghost-btn" id="btn-restart">回到首頁</button>
  </div>
</div>

<!-- 教師驗證(網址加 #verify 開啟) -->
<div class="overlay hidden" id="ov-verify">
  <div class="panel">
    <h2>成績卡驗證</h2>
    <p>依成績卡上的內容逐欄輸入,系統會核對驗證碼是否相符。</p>
    <input class="txt" id="v-name" placeholder="姓名(照卡片輸入)">
    <input class="txt" id="v-mode" placeholder="模式(照卡片輸入)">
    <input class="txt" id="v-score" placeholder="分數(照卡片輸入,例:186 分)">
    <input class="txt" id="v-dt" placeholder="日期時間(照卡片輸入,例:2026/07/16 14:32)">
    <input class="txt" id="v-code" placeholder="驗證碼(例:A3F9-K27B)">
    <div class="verify-result" id="verify-result"></div>
    <button class="btn" id="btn-verify">驗證</button>
    <button class="btn ghost-btn" id="btn-verify-close">關閉</button>
  </div>
</div>

{n:"交際費",c:"費損"},{n:"捐贈",c:"費損"},{n:"稅捐",c:"費損"},
{n:"佣金支出",c:"費損"},{n:"職工福利",c:"費損"},{n:"折舊",c:"費損"},
{n:"各項攤提",c:"費損"},{n:"預期信用減損利益",c:"費損",x:1},{n:"其他損失",c:"費損"},
{n:"利息費用",c:"費損"},{n:"手續費支出",c:"費損"},{n:"現金短溢(借餘)",c:"費損"},
{n:"處分投資損失",c:"費損"}
];
const ELEMS=["資產","負債","權益","收益","費損"];
const DEBIT_ELEMS=["資產","費損"];
const ANS_COLOR={借:"#1D5FBF",貸:"#C1272D"};

/* 借貸判斷核心 */
function side(it,delta){
  let s = DEBIT_ELEMS.includes(it.c) ? "借" : "貸";
  if(it.x) s = s==="借"?"貸":"借";
  if(delta==="減少") s = s==="借"?"貸":"借";
  return s;
}
function explain(q){
  const el=q.it.c, d=q.delta, a=q.ans;
  if(q.it.elem) return `${q.it.n}${d}記${a}方`;
  if(q.it.x) return `「${q.it.n}」是${el}的減項,方向與${el}相反,${d}記${a}方`;
  if(q.it.p) return `「${q.it.n}」是${el}的加項,方向與${el}相同,${d}記${a}方`;
  return `「${q.it.n}」屬${el},${el}${d}記${a}方`;
}
function makeQ(it,delta){
  delta = delta || (Math.random()<0.5?"增加":"減少");
  return {it, delta, ans:side(it,delta)};
}

/* ══ 模式與題組 ══ */
const rand=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const SHORT=BANK.filter(it=>it.n.length<=12);
const MARKED=BANK.filter(it=>it.x||it.p);

const MODES={
  warm:{
    label:"要素熱身",
    build:()=>shuffle(ELEMS.flatMap(e=>["增加","減少"].map(d=>makeQ({n:e,c:e,elem:true},d))))
  },
  items:{
    label:"項目挑戰",
    build:()=>shuffle([...SHORT]).slice(0,30).map(it=>makeQ(it))
  },
  trap:{
    label:"加減項陷阱",
    build:()=>shuffle([...MARKED]).map(it=>makeQ(it))
  },
  timed:{
    label:"限時挑戰",
    build:()=>[] /* 動態出題 */
  }
};
const modeName={warm:"要素熱身",items:"項目挑戰",trap:"加減項陷阱",timed:"限時挑戰(三條命)"};
const modeDesc={
  warm:"10 題:五大要素 × 增加/減少,先把借貸法則口訣練熟",
  items:"30 題:隨機抽會計項目考增減借貸,含減項陷阱",
  trap:`${MARKED.length} 題:只考加減項標記項目,方向全部相反,敢來嗎?`,
  timed:"街機玩法!每題 12 秒起跳慢慢加速(最快 6 秒),答錯或超時扣一條命,三條命拚高分"
};
const ROUND_SIZE=10;

/* ══ 狀態 ══ */
let mode="warm", queue=[], idx=0, score=0, streak=0, maxStreak=0;
let wrongAll=[], roundWrong=[], roundCorrect=0, roundNo=1;
let locked=false, firstTry=true, curQ=null;
let hearts=3, answered=0, points=0, tRaf=null, tLeft=0, tLimit=8, paused=false;
let jm=1, jd=1; /* 日記簿日期 */
let timedPool=[], timedIdx=0;

const $=s=>document.querySelector(s);
const qcard=$("#qcard"), qName=$("#q-name"), qDelta=$("#q-delta"), qContra=$("#q-contra");
const slotD=$("#slot-d"), slotC=$("#slot-c"), amtD=$("#amt-d"), amtC=$("#amt-c");
const seal=$("#seal"), fb=$("#feedback");
const jlines=[...document.querySelectorAll(".jline")];
const tbar=$("#tbar"), tbarI=$("#tbar-i");
const mainEl=$("#main");
let bestPoints=0;

/* ── 音效(WebAudio 合成,免素材)── */
let AC=null, muted=false;
$("#snd").addEventListener("click",()=>{ muted=!muted; $("#snd").textContent=muted?"🔇":"🔊"; });
function beep(f,d=0.09,t="square",v=0.12){
  if(muted) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+d);
  }catch(e){}
}
const isFever=()=> mode==="timed" && streak>=10;
function spawnPopup(text,fev){
  const el=document.createElement("div");
  el.className="popup"+(fev?" fev":"");
  el.textContent=text;
  el.style.left=(42+Math.random()*16)+"%";
  mainEl.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

/* ── 首頁選單 ── */
$("#mode-list").innerHTML=Object.keys(MODES).map(m=>
  `<button class="mode-btn" data-mode="${m}" ${m==="timed"?'style="border-color:#C1272D"':""}>
     <b ${m==="timed"?'style="color:#C1272D"':""}>${modeName[m]}</b><span>${modeDesc[m]}</span>
   </button>`).join("");
document.querySelectorAll(".mode-btn").forEach(b=>
  b.addEventListener("click",()=>startGame(b.dataset.mode))
);

function refillTimed(){
  timedPool=shuffle([
    ...ELEMS.flatMap(e=>["增加","減少"].map(d=>makeQ({n:e,c:e,elem:true},d))),
    ...SHORT.map(it=>makeQ(it))
  ]);
  timedIdx=0;
}

function startGame(m, customQueue){
  stopTimer();
  mode=m;
  $("#mode-label").textContent=modeName[m];
  score=0; streak=0; maxStreak=0; idx=0;
  wrongAll=[]; roundWrong=[]; roundCorrect=0; roundNo=1;
  hearts=3; answered=0; points=0; paused=false;
  jm=1+Math.floor(Math.random()*12); jd=1+Math.floor(Math.random()*10);
  if(m==="timed"){
    refillTimed();
    queue=[]; tLimit=12;
    $("#pause-btn").style.display="";
    tbar.style.display="";
  }else{
    queue = customQueue ? shuffle([...customQueue]) : MODES[m].build();
    $("#pause-btn").style.display="none";
    tbar.style.display="none";
  }
  $("#deck-hint").textContent = m==="timed"
    ? "倒數歸零前作答!點日記簿的借方行或貸方行"
    : "把題目拖到日記簿的正確行,或直接點那一行(鍵盤 1 借/2 貸)";
  updateHUD();
  ["ov-start","ov-round","ov-break","ov-end"].forEach(id=>$("#"+id).classList.add("hidden"));
  nextQ();
}

function resetJournal(){
  slotD.textContent="借方寫這裡"; slotD.classList.add("empty");
  slotC.textContent="貸方寫這裡"; slotC.classList.add("empty");
  amtD.textContent=""; amtC.textContent="";
  jlines.forEach(l=>l.classList.remove("filled"));
}
function advanceDate(){
  jd+=1+Math.floor(Math.random()*3);
  if(jd>28){jd-=28;jm=jm%12+1;}
  $("#j-date").textContent=`${jm}月${jd}日`;
}

function nextQ(){
  resetJournal(); advanceDate();
  locked=false; firstTry=true;
  if(mode==="timed"){
    if(timedIdx>=timedPool.length) refillTimed();
    curQ=timedPool[timedIdx++];
  }else{
    if(idx>=queue.length){ endGame(); return; }
    curQ=queue[idx];
  }
  qName.textContent=curQ.it.n;
  qName.classList.toggle("long",curQ.it.n.length>=9);
  qDelta.textContent=curQ.delta+(curQ.delta==="增加"?" ↑":" ↓");
  qDelta.className="delta "+(curQ.delta==="增加"?"up":"down");
  if(curQ.it.x){qContra.textContent="減項";qContra.style.display="inline-block";}
  else if(curQ.it.p){qContra.textContent="加項";qContra.style.display="inline-block";}
  else qContra.style.display="none";
  fb.textContent=""; fb.className="feedback";
  qcard.style.visibility="visible";
  qcard.animate?.([{transform:"translateY(10px)",opacity:0},{transform:"translateY(0)",opacity:1}],{duration:200,easing:"ease-out"});
  if(mode==="timed") startTimer();
}

function updateHUD(){
  if(mode==="timed"){
    $("#hearts").textContent="❤️".repeat(hearts)+"🖤".repeat(3-hearts);
    $("#prog-text").textContent=answered;
    $("#score-text").textContent=points;
    $("#prog-bar").style.width=((answered%10)/10*100)+"%";
  }else{
    $("#hearts").textContent="";
    $("#prog-text").textContent=`${idx}/${queue.length}`;
    $("#score-text").textContent=score;
    $("#prog-bar").style.width=(queue.length?idx/queue.length*100:0)+"%";
  }
  $("#streak-text").textContent= isFever() ? `🔥FEVER x2 連對 ${streak}` : (streak>=3 ? `🔥 連對 ${streak}` : "");
}

const fmtAmt=()=> "$ "+((1+Math.floor(Math.random()*99))*1000).toLocaleString();

function fillLine(sideCh){
  const isD=sideCh==="借";
  const slot=isD?slotD:slotC, amt=isD?amtD:amtC, line=jlines[isD?0:1];
  slot.textContent=curQ.it.elem?`(${curQ.it.n}類項目)`:curQ.it.n;
  slot.classList.remove("empty");
  amt.textContent=fmtAmt();
  line.classList.add("filled");
}

function answer(sideCh){
  if(locked||!curQ) return;
  if(sideCh===curQ.ans){
    locked=true;
    stopTimer();
    fillLine(sideCh);
    seal.classList.remove("show"); void seal.offsetWidth; seal.classList.add("show");
    beep(440+Math.min(streak,12)*45,0.09,"square");
    if(mode==="timed"){
      answered++; streak++; maxStreak=Math.max(maxStreak,streak);
      const fever=isFever();
      document.body.classList.toggle("fever",fever);
      if(fever && streak===10){ beep(660,.1);setTimeout(()=>beep(880,.1),90);setTimeout(()=>beep(1100,.14),180); }
      const bonus=Math.round(tLeft/tLimit*5);
      const gain=Math.round((10+bonus+Math.min(streak-1,5))*(fever?2:1));
      points += gain;
      spawnPopup("+"+gain+(fever?" 🔥":""),fever);
      tLimit=Math.max(6, 12*Math.pow(0.985,answered));
      fb.textContent = fever ? `FEVER 雙倍得分中!連對 ${streak}` : (streak>=3?`連對 ${streak}!`:"");
      fb.className="feedback ok";
      updateHUD();
      setTimeout(()=>{ seal.classList.remove("show");
        if(answered%10===0){ pauseBreak(`已完成 ${answered} 題!`,"喝口水休息一下,速度會越來越快!"); }
        else nextQ();
      },650);
    }else{
      if(firstTry){ score++; streak++; maxStreak=Math.max(maxStreak,streak); roundCorrect++; }
      fb.textContent = (curQ.it.x||curQ.it.p) ? explain(curQ) : "";
      fb.className="feedback ok";
      updateHUD();
      setTimeout(()=>{ seal.classList.remove("show");
        idx++;
        updateHUD();
        if(idx>=queue.length){ endGame(); }
        else if(idx%ROUND_SIZE===0){ roundSummary(); }
        else nextQ();
      },700);
    }
  }else{
    streak=0;
    document.body.classList.remove("fever");
    beep(140,0.28,"sawtooth",0.15);
    if(mode==="timed"){ loseHeart(); return; }
    if(firstTry){ wrongAll.push(curQ); roundWrong.push(curQ); }
    firstTry=false;
    qcard.classList.remove("wrong-shake"); void qcard.offsetWidth; qcard.classList.add("wrong-shake");
    fb.textContent=explain(curQ);
    fb.className="feedback err";
    updateHUD();
  }
}

/* ── 限時模式:計時與生命 ── */
function startTimer(){
  stopTimer();
  tLeft=tLimit;
  let last=performance.now();
  const step=t=>{
    if(paused){ last=t; tRaf=requestAnimationFrame(step); return; }
    tLeft-=(t-last)/1000; last=t;
    const pct=Math.max(0,tLeft/tLimit*100);
    tbarI.style.width=pct+"%";
    tbarI.classList.toggle("warn",pct<35);
    if(tLeft<=0){ tRaf=null; loseHeart(true); return; }
    tRaf=requestAnimationFrame(step);
  };
  tRaf=requestAnimationFrame(step);
}
function stopTimer(){ if(tRaf) cancelAnimationFrame(tRaf); tRaf=null; }

function loseHeart(timeout){
  locked=true;
  stopTimer();
  hearts--;
  streak=0;
  document.body.classList.remove("fever");
  wrongAll.push(curQ);
  fillLine(curQ.ans); /* 顯示正解位置 */
  qcard.classList.remove("wrong-shake"); void qcard.offsetWidth; qcard.classList.add("wrong-shake");
  fb.textContent=(timeout?"超時!":"答錯!")+explain(curQ);
  fb.className="feedback err";
  updateHUD();
  setTimeout(()=>{
    if(hearts<=0){ endGame(); }
    else nextQ();
  },1100);
}

function pauseBreak(title,msg){
  paused=true;
  $("#break-title").textContent=title;
  $("#break-msg").textContent=msg;
  $("#break-score").textContent=points;
  $("#break-cleared").textContent=answered;
  $("#break-hearts").textContent="❤️".repeat(hearts)+"🖤".repeat(3-hearts);
  $("#ov-break").classList.remove("hidden");
}
$("#btn-resume").addEventListener("click",()=>{
  $("#ov-break").classList.add("hidden");
  paused=false;
  if(locked||!tRaf) nextQ();
});
$("#pause-btn").addEventListener("click",()=>{
  if(mode==="timed" && !locked) pauseBreak("暫停中","休息一下,準備好再按繼續!");
});

/* ── 回合與結算 ── */
function wrongListHTML(list){
  return list.map(q=>{
    const label=q.it.elem?`${q.it.n}${q.delta}`:`${q.it.n} ${q.delta}`;
    return `${label}<span class="tag" style="background:${ANS_COLOR[q.ans]}">${q.ans}方</span>`;
  }).join("<br>");
}
function roundSummary(){
  $("#round-title").textContent=`第 ${roundNo} 回合完成`;
  $("#round-correct").textContent=`${roundCorrect}/${ROUND_SIZE}`;
  $("#round-acc").textContent=Math.round(score/idx*100)+"%";
  $("#round-wrong").innerHTML=roundWrong.length
    ? "<b>本回合答錯:</b><br>"+wrongListHTML(roundWrong)
    : "本回合全對,太厲害了!";
  roundWrong=[]; roundCorrect=0; roundNo++;
  $("#ov-round").classList.remove("hidden");
}
$("#btn-next").addEventListener("click",()=>{ $("#ov-round").classList.add("hidden"); nextQ(); });

function endGame(){
  stopTimer();
  document.body.classList.remove("fever");
  qcard.style.visibility="hidden";
  $("#scorecard-result").innerHTML="";
  if(mode==="timed"){
    let recordLine="";
    if(points>bestPoints){
      bestPoints=points;
      recordLine="<b style='color:#E8A008'>🏆 新紀錄!本次最佳 "+points+" 分</b><br>";
      beep(660,.1);setTimeout(()=>beep(880,.1),100);setTimeout(()=>beep(1320,.18),200);
    }else if(bestPoints>0){
      recordLine=`<b>目前最佳 ${bestPoints} 分,只差 ${bestPoints-points+1} 分就破紀錄,再來一場!</b><br>`;
    }
    $("#ov-end .panel h2").textContent="遊戲結束!";
    $("#end-score").textContent=points+" 分";
    $("#end-correct").textContent=answered;
    const total=answered+wrongAll.length;
    $("#end-acc").textContent= total?Math.round(answered/total*100)+"%":"0%";
    $("#btn-retry-wrong").textContent="再玩一次";
    $("#btn-retry-wrong").style.display="";
    $("#end-streak").textContent=maxStreak;
    $("#end-wrong").innerHTML= recordLine + (wrongAll.length
      ? "<b>需要複習:</b><br>"+wrongListHTML(wrongAll)
      : "全部答對,超神!");
    $("#ov-end").classList.remove("hidden");
    return;
  }
  $("#ov-end .panel h2").textContent="挑戰完成!";
  $("#end-score").textContent=Math.round(score/queue.length*100)+" 分";
  $("#end-correct").textContent=`${score}/${queue.length}`;
  $("#end-acc").textContent=Math.round(score/queue.length*100)+"%";
  $("#btn-retry-wrong").textContent="錯題重練";
  $("#btn-retry-wrong").style.display= wrongAll.length?"":"none";
  $("#end-streak").textContent=maxStreak;
  $("#end-wrong").innerHTML= wrongAll.length
    ? "<b>需要複習:</b><br>"+wrongListHTML(wrongAll)
    : "全部答對,超神!";
  $("#ov-end").classList.remove("hidden");
}
$("#btn-retry-wrong").addEventListener("click",()=>{
  if(mode==="timed") startGame("timed");
  else startGame(mode, wrongAll);
});
$("#btn-restart").addEventListener("click",()=>{
  stopTimer();
  $("#ov-end").classList.add("hidden");
  $("#ov-start").classList.remove("hidden");
});

/* ── 作答輸入:點行、拖曳、鍵盤 ── */
jlines.forEach(l=>l.addEventListener("click",()=>answer(l.dataset.side)));
document.addEventListener("keydown",e=>{
  if(document.querySelector(".overlay:not(.hidden)")) return;
  if(e.key==="1"||e.key==="ArrowUp") answer("借");
  else if(e.key==="2"||e.key==="ArrowDown") answer("貸");
});
/* 拖曳 */
let ghost=null, dragging=false;
qcard.addEventListener("pointerdown",e=>{
  if(locked||qcard.style.visibility==="hidden") return;
  dragging=true;
  qcard.setPointerCapture(e.pointerId);
  ghost=qcard.cloneNode(true);
  ghost.classList.add("ghost");
  ghost.style.width=qcard.offsetWidth+"px";
  document.body.appendChild(ghost);
  moveGhost(e);
  qcard.classList.add("dragging");
});
qcard.addEventListener("pointermove",e=>{ if(dragging) moveGhost(e); });
qcard.addEventListener("pointerup",e=>{
  if(!dragging) return;
  dragging=false;
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const line=el?.closest?.(".jline");
  jlines.forEach(l=>l.classList.remove("hover"));
  ghost?.remove(); ghost=null;
  qcard.classList.remove("dragging");
  if(line) answer(line.dataset.side);
});
qcard.addEventListener("pointercancel",()=>{
  dragging=false; ghost?.remove(); ghost=null;
  qcard.classList.remove("dragging");
  jlines.forEach(l=>l.classList.remove("hover"));
});
function moveGhost(e){
  ghost.style.left=e.clientX+"px";
  ghost.style.top=e.clientY+"px";
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const over=el?.closest?.(".jline");
  jlines.forEach(l=>l.classList.toggle("hover",l===over));
}

/* ══════════════════════════════════════════════════════
   成績卡與驗證碼(與分類遊戲共用同一套機制)
   ══════════════════════════════════════════════════════ */
const VSALT="CLVS-ACC-2026-桃";
function vcode(str){
  let h=5381, h2=52711;
  for(let i=0;i<str.length;i++){ h=((h<<5)+h+str.charCodeAt(i))>>>0; }
  for(let i=str.length-1;i>=0;i--){ h2=((h2*33)^str.charCodeAt(i))>>>0; }
  const s=(h.toString(36)+h2.toString(36)).toUpperCase().replace(/[^A-Z0-9]/g,"");
  return (s+"00000000").slice(0,8).replace(/^(.{4})(.{4})$/,"$1-$2");
}
const cardModeName=()=>"借貸法則."+modeName[mode];

$("#btn-make-card").addEventListener("click",async()=>{
  const name=$("#player-name").value.trim();
  if(!name){
    $("#player-name").style.borderColor="var(--stamp)";
    $("#player-name").placeholder="請先輸入姓名!";
    return;
  }
  $("#player-name").style.borderColor="";
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  const dt=`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  const mName=cardModeName();
  const scoreTxt=$("#end-score").textContent.trim();
  const code=vcode(`${VSALT}|${name}|${mName}|${scoreTxt}|${dt}`);
  const stat1=$("#end-correct").textContent.trim();
  const stat2=$("#end-acc").textContent.trim();
  const stat3=$("#end-streak").textContent.trim();

  try{ await document.fonts.ready; }catch(e){}
  const W=1000,H=640;
  const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
  const g=cv.getContext("2d");
  g.fillStyle="#F8F6EF"; g.fillRect(0,0,W,H);
  g.strokeStyle="#C9D6E8"; g.lineWidth=1;
  for(let y=64;y<H;y+=44){ g.beginPath(); g.moveTo(0,y); g.lineTo(W,y); g.stroke(); }
  g.strokeStyle="#D65A5A"; g.lineWidth=2;
  g.beginPath(); g.moveTo(78,0); g.lineTo(78,H); g.stroke();
  g.strokeStyle="#22303A"; g.lineWidth=3; g.strokeRect(14,14,W-28,H-28);
  g.fillStyle="#22303A"; g.textAlign="center";
  g.font='900 46px "Noto Sans TC",sans-serif';
  g.fillText("借貸法則大挑戰",W/2,88);
  g.font='700 22px "Noto Sans TC",sans-serif';
  g.fillStyle="#5B6B77";
  g.fillText("成 績 證 明",W/2,124);
  g.fillStyle="#22303A";
  g.font='900 40px "Noto Sans TC",sans-serif';
  g.fillText(name,W/2,196);
  g.font='700 24px "Noto Sans TC",sans-serif';
  g.fillStyle="#5B6B77";
  g.fillText(`模式:${mName}`,W/2,238);
  g.fillStyle="#22303A";
  g.font='900 110px "Noto Sans TC",sans-serif';
  g.fillText(scoreTxt,W/2,372);
  const labels=["答對題數","正確率","最長連對"];
  const vals=[stat1,stat2,stat3];
  const xs=[W/2-280,W/2,W/2+280];
  for(let i=0;i<3;i++){
    g.fillStyle="#5B6B77"; g.font='500 20px "Noto Sans TC",sans-serif';
    g.fillText(labels[i],xs[i],428);
    g.fillStyle="#22303A"; g.font='900 34px "Noto Sans TC",sans-serif';
    g.fillText(vals[i],xs[i],470);
  }
  g.fillStyle="#5B6B77"; g.font='500 22px "Noto Sans TC",sans-serif';
  g.fillText(dt,W/2,530);
  g.fillStyle="#22303A"; g.font='900 30px monospace';
  g.fillText(`驗證碼 ${code}`,W/2,576);
  g.save();
  g.translate(W-150,150); g.rotate(-0.22);
  g.strokeStyle="rgba(193,39,45,.85)"; g.lineWidth=6;
  g.beginPath(); g.arc(0,0,74,0,Math.PI*2); g.stroke();
  g.fillStyle="rgba(193,39,45,.85)";
  g.font='900 52px "Noto Sans TC",sans-serif';
  g.fillText("正解",0,20);
  g.restore();

  const url=cv.toDataURL("image/png");
  $("#scorecard-result").innerHTML=
    `<img src="${url}" alt="成績卡">`+
    `<a class="btn ghost-btn" style="display:inline-block;text-decoration:none" href="${url}" download="成績卡_${name}.png">下載圖片</a>`+
    `<div class="vcode-note">手機也可以長按圖片直接儲存,再傳給老師。<br>驗證碼:<b>${code}</b>(改任何內容驗證碼就會對不上喔)</div>`;
});

function openVerify(){ $("#ov-verify").classList.remove("hidden"); }
if(location.hash==="#verify") openVerify();
window.addEventListener("hashchange",()=>{ if(location.hash==="#verify") openVerify(); });
$("#btn-verify").addEventListener("click",()=>{
  const name=$("#v-name").value.trim();
  const mName=$("#v-mode").value.trim();
  const scoreTxt=$("#v-score").value.trim();
  const dt=$("#v-dt").value.trim();
  const code=$("#v-code").value.trim().toUpperCase();
  const expect=vcode(`${VSALT}|${name}|${mName}|${scoreTxt}|${dt}`);
  const r=$("#verify-result");
  if(code===expect){ r.textContent="✔ 驗證通過,成績為真"; r.className="verify-result ok"; }
  else{ r.textContent="✘ 驗證失敗,內容與驗證碼不符"; r.className="verify-result bad"; }
});
$("#btn-verify-close").addEventListener("click",()=>{
  $("#ov-verify").classList.add("hidden");
  if(location.hash==="#verify") history.replaceState(null,"",location.pathname+location.search);
});
</script>
