function ratioFlowGrid(q){const rf=q.ratioFlow,rows=rf.rows||["pre","close","post"],RL={init:["1 / 1","期初"],mid:["年度中",""],pre:["12 / 31","結帳前"],post:["12 / 31","結帳後"]};

function selectRatioSlot(q,clear=true){state.target="RATIO";if(clear){state.expr="";state.tokens=[];state.sign=1}clearPicking();const el=$("#ratioSlot");if(el)el.classList.add("pick");$("#calc").classList.remove("idle");document.querySelectorAll(".key").forEach(k=>k.disabled=false);$("#targetText").innerHTML=`正在解：<b>${q.ratioFlow?q.ratioFlow.oneLabel:q.ratio.label}</b>`;$("#calcHint").textContent=q.ratioFlow?(q.ratioFlow.solve==="rearrange"?`照引導移項：按＝算出總數，再 ÷ ${rfRearrangeCoef(q.ratioFlow)}`:`點已填好的${q.ratioFlow.anchorLabel}帶入，再 ÷ ${parseFloat(q.ratioFlow.symbolExpected[q.ratioFlow.anchorCol])}`):"點已填好的金額帶入";paintCalc()}
function calcValue(){const t=[...state.tokens];if(state.expr!=="")t.push(state.sign*Number(state.expr));if(!t.length)return 0;const high=[t[0]];for(let i=1;i<t.length;i+=2){const op=t[i],n=t[i+1];if(n===undefined)break;if(op==="*")high[high.length-1]*=n;else if(op==="/")high[high.length-1]=n===0?0:high[high.length-1]/n;else high.push(op,n)}let r=high[0];for(let i=1;i<high.length;i+=2)r=high[i]==="+"?r+high[i+1]:r-high[i+1];return Math.round(r*100)/100}
function paintCalc(){const map={"+":"＋","-":"－","*":"×","/":"÷"};const p=state.tokens.map(x=>typeof x==="number"?(x<0?"－":"")+fmt(x):map[x]);if(state.expr!=="")p.push((state.sign<0?"－":"")+fmt(Number(state.expr))+(state.expr.endsWith(".")?".":""));$("#expr").textContent=p.join(" ");const v=calcValue();$("#value").textContent=(v<0?"－":"")+fmt(v);$("#value").classList.toggle("neg",v<0)}

function handleKey(q,k){if(!state.target)return toast("請先點一個要填寫的空格");beep(520,.035,"square");if(k==="put"){q.type==="choiceflow"?putChoiceFlowValue(q):putMatrixValue(q);return}if(k==="neg"){toggleSign();return}if(k==="clear"){state.expr="";state.tokens=[];state.sign=1}else if(k==="del"){if(state.expr){state.expr=state.expr.slice(0,-1);if(!state.expr)state.sign=1}else state.tokens.pop()}else if(k==="eq"){const r=calcValue();state.tokens=[];state.expr=String(Math.abs(r));state.sign=r<0?-1:1}else if(k==="."){if(!state.expr.includes("."))state.expr=state.expr===""?"0.":state.expr+"."}else if("+-*/".includes(k)){if(state.expr!==""){state.tokens.push(state.sign*Number(state.expr),k);state.expr="";state.sign=1}else if(state.tokens.length)state.tokens[state.tokens.length-1]=k}else state.expr=(state.expr==="0"?"":state.expr)+k;paintCalc()}
function putMatrixValue(q){if(!state.target)return toast("請先點一個空格");if(state.expr===""&&!state.tokens.length)return toast("請先輸入金額");const v=calcValue();if(state.target==="RATIO")state.ratioValue=v;else state.values[state.target]=v;state.target=null;state.expr="";state.tokens=[];state.sign=1;beep(760);rerenderMatrixStable(q)}
function checkMatrix(q){const expected=expectedMatrix(q),flow=expectedRatioFlow(q);const missing=[...Object.keys(expected),...Object.keys(flow)].filter(k=>state.values[k]===undefined);const ratioMissing=(q.ratio||q.ratioFlow)&&state.ratioValue===undefined;const placementMissing=q.ratioFlow?Object.keys(q.ratioFlow.symbolExpected).filter(c=>!state.ratioPlacements[c]).length:0;if(missing.length||ratioMissing||placementMissing){toast(`還有 ${missing.length+(ratioMissing?1:0)+placementMissing} 格尚未完成`);return}state.attempts++;let ok=0;for(const [k,v] of Object.entries({...flow,...expected})){const el=document.querySelector(`[data-cell="${k}"]`);if(state.values[k]===v){ok++;el&&el.classList.add("right")}else el&&el.classList.add("wrong")}if(q.ratio||q.ratioFlow){const rs=$("#ratioSlot"),answer=q.ratioFlow?q.ratioFlow.oneAnswer:q.ratio.answer;if(state.ratioValue===answer){ok++;rs&&rs.classList.add("right")}else rs&&rs.classList.add("wrong")}if(q.ratioFlow){for(const [col,sym] of Object.entries(q.ratioFlow.symbolExpected)){const el=document.querySelector(`[data-ratio-drop="${col}"]`);if(state.ratioPlacements[col]===sym){ok++;el&&el.classList.add("right")}else el&&el.classList.add("wrong")}}const total=Object.keys(expected).length+Object.keys(flow).length+((q.ratio||q.ratioFlow)?1:0)+(q.ratioFlow?Object.keys(q.ratioFlow.symbolExpected).length:0);if(ok===total){finishLevel(q,ok,total)}else{save.streak=0;persist();updateHud();const fb=$("#feedback");fb.className="card feedback show bad";fb.innerHTML=`<h3>還有 ${total-ok} 格需要修正</h3><p>紅色項目代表金額、位置、比例卡或正負號不正確。可直接點格子或比例卡重新調整。</p>`;beep(170,.2,"sawtooth")}}


function cfGroupState(group){return group==="a"?state.cfAPlacements:state.cfBPlacements}
function cfPickState(group){return group==="a"?state.cfAPick:state.cfBPick}
function cfSetPick(group,v){if(group==="a")state.cfAPick=v;else state.cfBPick=v}
function cfValue(group){return group==="a"?state.cfAValue:state.cfBValue}
function cfSetValue(group,v){if(group==="a")state.cfAValue=v;else state.cfBValue=v}
function cfConfig(q,group){return group==="a"?q.choiceFlow.ratioA:q.choiceFlow.ratioB}
function cfPlacedCorrect(q,group){const cfg=cfConfig(q,group),p=cfGroupState(group);return Object.entries(cfg.expected).every(([c,sym])=>p[c]===sym)}
function cfSolved(q,group){return cfPlacedCorrect(q,group)&&cfValue(group)===cfConfig(q,group).answer}
function cfBUnlocked(q){const k=q.choiceFlow.ratioB.baseKey;return cfSolved(q,"a")&&state.values[k]===q.choiceFlow.values[k]}
function cfSymbolAmount(q,group,symbol){if(!cfSolved(q,group))return null;return Math.round(parseFloat(symbol)*cfValue(group))}
function cfCoefSum(cfg){return cfg.pieces.reduce((t,x)=>t+parseFloat(x),0)}
function cfCoefDiff(cfg){const a=cfg.pieces.map(x=>parseFloat(x));return Math.abs(a[0]-a[1])}
function cfDiffOpText(cfg){const d=cfCoefDiff(cfg),f=1/d;return Number.isInteger(f)?`× ${f}`:`÷ ${d}`}
function cfCellHtml(q,key){const expected=q.choiceFlow.values,v=state.values[key];return expected[key]===undefined?`<span class="cell empty"></span>`:`<button class="cell blank${v!==undefined?" filled":""}" data-cf-cell="${key}" title="${labelFor(q,key)}">${v===undefined?"？":showNum(v)}</button>`}
function cfRatioDropHtml(q,group,col,enabled=true){const p=cfGroupState(group),sym=p[col],solved=cfSolved(q,group),amount=sym?cfSymbolAmount(q,group,sym):null;const inner=sym?`<span class="placed-ratio" draggable="${enabled}" data-cf-drag-symbol="${sym}" data-cf-group="${group}"><b>${sym}</b>${solved?`<small>${fmt(amount)}</small>`:""}</span>`:(enabled?"拖到這裡":"待開放");return `<div class="ratio-drop${sym?" filled":""}${solved?" solved":""}${enabled?"":" disabled"}" data-cf-drop="${col}" data-cf-group="${group}" data-source-value="${amount===null?"":amount}">${inner}</div>`}
function cfRatioTrayHtml(q,group,enabled=true){const cfg=cfConfig(q,group),p=cfGroupState(group),used=new Set(Object.values(p)),pick=cfPickState(group);return `<div class="ratio-tray${enabled?"":" cf-locked"}" data-cf-tray="${group}"><span class="ratio-tray-label">${group==="a"?"期末比例卡":"損益比例卡"}</span>${cfg.pieces.map(sym=>`<button class="ratio-piece${pick===sym?" selected":""}${used.has(sym)?" used":""}" ${enabled&&!used.has(sym)?`draggable="true" data-cf-drag-symbol="${sym}"`:"disabled"} data-cf-piece="${sym}" data-cf-group="${group}">${sym}</button>`).join("")}<span class="ratio-help">${enabled?"拖進對應欄位":`完成${q.choiceFlow.ratioB.baseLabel}後自動開放`}</span></div>`}
function cfRatioSlot(q,group){const v=cfValue(group),cfg=cfConfig(q,group);return `<button class="ratio-slot${v!==undefined?" filled":""}" data-cf-slot="${group}" title="${cfg.label}">${v===undefined?"？":showNum(v)}</button>`}
function cfGuidanceA(q){const cfg=q.choiceFlow.ratioA,placed=cfPlacedCorrect(q,"a"),base=state.values[cfg.baseKey],baseOK=base===q.choiceFlow.values[cfg.baseKey],v=state.cfAValue,sum=cfCoefSum(cfg),eL=cfg.expected.l,eC=cfg.expected.c;
if(!placed)return `<div class="ratio-guidance"><span class="lead">先把期末比例放進表格</span><span class="math">負債放 ${eL}　｜　權益放 ${eC}</span><small>兩張比例卡都放對後，下一步提示才會出現。</small></div>`;
if(base===undefined)return `<div class="ratio-guidance"><span class="lead">比例放好了！</span><span class="math">${cfg.baseNote}</span><small>想一想：結帳會改變資產嗎？請先把 <b>${cfg.baseLabel}</b> 填入表格，解 a 的算式才會出現。</small></div>`;

function cfGuidanceB(q){const cfg=q.choiceFlow.ratioB,unlocked=cfBUnlocked(q),placed=cfPlacedCorrect(q,"b"),v=state.cfBValue,d=cfCoefDiff(cfg),op=cfDiffOpText(cfg),er=cfg.expected.r,ee=cfg.expected.e,pl=state.values[cfg.baseKey];

function choiceFlowGrid(q){const bEnabled=cfBUnlocked(q);return `<div class="mgrid"><div class="mhead"><span></span><span class="ha">資產 A</span><span class="sign">＝</span><span class="hl">負債 L</span><span class="sign">＋</span><span class="hc">權益 C</span><span class="sign">＋</span><span class="hr">收益 R</span><span class="sign">－</span><span class="he">費損 E</span></div><div class="mrow sep"><span class="rlabel">12 / 31<small>結帳前</small></span><span class="cellstack">${cfCellHtml(q,"cf.a.pre")}</span><span class="sign">＝</span><span class="cellstack">${cfCellHtml(q,"cf.l.pre")}</span><span class="sign">＋</span><span class="cellstack">${cfCellHtml(q,"cf.c.pre")}</span><span class="sign">＋</span><span class="cellstack">${cfRatioDropHtml(q,"b","r",bEnabled)}</span><span class="sign">－</span><span class="cellstack">${cfRatioDropHtml(q,"b","e",bEnabled)}</span></div><div class="plrow"><span class="rlabel">結帳</span><div class="plbox"><span class="pl-label">本期損益併入權益 →</span>${cfCellHtml(q,"cf.pl")}</div></div><div class="mrow sep"><span class="rlabel">12 / 31<small>結帳後</small></span><span class="cellstack">${cfCellHtml(q,"cf.a.post")}</span><span class="sign">＝</span><span class="cellstack">${cfRatioDropHtml(q,"a","l",true)}</span><span class="sign">＋</span><span class="cellstack">${cfRatioDropHtml(q,"a","c",true)}</span><span class="sign">＋</span><span class="cellstack"><span class="cell empty"></span></span><span class="sign">－</span><span class="cellstack"><span class="cell empty"></span></span></div></div>`}
function choiceFlowComplete(q){const valuesFilled=Object.keys(q.choiceFlow.values).every(k=>state.values[k]!==undefined),aPlaced=cfPlacedCorrect(q,"a"),bPlaced=cfPlacedCorrect(q,"b");return valuesFilled&&aPlaced&&bPlaced&&state.cfAValue!==undefined&&state.cfBValue!==undefined}

function choiceFlowOptionsHtml(q){const complete=choiceFlowComplete(q);return `<section class="card ${complete?"choice-ready":""}">${complete?`<h3>✓ 解題資料已填完，請判斷錯誤選項</h3><div class="choice-list">${q.options.map((o,i)=>`<button class="choice${state.selected===i?" selected":""}" data-choice="${i}"><span class="letter">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`).join("")}</div>`:`<div class="choice-locked">依序完成 a、4a／5a、本期損益、b、1.5b／1b 後，選項才會開放。</div>`}</section>`}
function renderChoiceFlow(q){const bEnabled=cfBUnlocked(q);$("#main").innerHTML=qCard(q)+commonToolbar()+givensHtml()+`<section class="card choice-flow-card"><div class="choice-flow-title"><span class="pill">同一張表</span>依序處理兩組比例</div><div class="choice-flow-note">每一組比例放好後，畫面都會提供明確的 a／b 解題空格；算對後，比例格會自動顯示實際金額，不需要另外重填。</div><div class="cf-stage"><div class="cf-stage-head">${q.choiceFlow.titleA}</div>${cfRatioTrayHtml(q,"a",true)}</div><div class="symbolic-grid">${choiceFlowGrid(q)}</div><div class="cf-guidance-stack">${cfGuidanceA(q)}</div><div class="cf-stage${bEnabled?"":" cf-locked"}"><div class="cf-stage-head">${q.choiceFlow.titleB}</div>${cfRatioTrayHtml(q,"b",bEnabled)}</div><div class="cf-guidance-stack">${cfGuidanceB(q)}</div></section>`+calcHtml()+(q.options?choiceFlowOptionsHtml(q):"")+`<section class="toolbar"><button class="btn gold" id="checkCF" style="flex:1">${q.options?"驗證並送出答案":"驗證答案"}</button></section><section class="card feedback" id="feedback"></section>`;wireCommon();wireChoiceFlow(q);refreshCalcUI(q)}

function cfPickPiece(q,group,symbol){const p=cfGroupState(group),current=Object.keys(p).find(c=>p[c]===symbol);if(current)delete p[current];cfSetPick(group,symbol);cfSetValue(group,undefined);beep(560);rerenderChoiceFlowStable(q)}
function cfDropSymbol(q,group,symbol,col){if(!symbol)return;const cfg=cfConfig(q,group);if(!Object.values(cfg.expected).includes(symbol)||!Object.keys(cfg.expected).includes(col))return;const p0=cfGroupState(group);if(p0[col]===symbol){cfSetPick(group,null);rerenderChoiceFlowStable(q);return}const p=cfGroupState(group),from=Object.keys(p).find(c=>p[c]===symbol);if(from)delete p[from];const occupied=p[col];if(occupied&&occupied!==symbol){const other=Object.keys(p).find(c=>p[c]===occupied);if(other)delete p[other]}p[col]=symbol;cfSetPick(group,null);cfSetValue(group,undefined);if(cfPlacedCorrect(q,group)){const cfg=cfConfig(q,group);state.target=group==="a"?(state.values[cfg.baseKey]===undefined?cfg.baseKey:"CF_A"):"CF_B";state.expr="";state.tokens=[];state.sign=1}beep(700);rerenderChoiceFlowStable(q)}

function cfHandleDropTap(q,el){if(el.classList.contains("disabled"))return toast("請先完成前面的步驟");const group=el.dataset.cfGroup,col=el.dataset.cfDrop,source=Number(el.dataset.sourceValue);if(state.target&&el.dataset.sourceValue!==""&&Number.isFinite(source)){loadSourceValue(source,el.textContent.trim(),el);return}const p=cfGroupState(group),pick=cfPickState(group);if(pick){cfDropSymbol(q,group,pick,col);return}if(p[col]){cfSetPick(group,p[col]);delete p[col];cfSetValue(group,undefined);beep(480);rerenderChoiceFlowStable(q);return}toast("請直接拖曳比例卡，或先點比例卡再點欄位")}
function cfWireTouchDrag(q,el){el.addEventListener("pointerdown",e=>{if(e.pointerType==="mouse"||el.disabled)return;const symbol=el.dataset.cfDragSymbol,group=el.dataset.cfGroup;if(!symbol)return;e.preventDefault();const sx=e.clientX,sy=e.clientY;let moved=false,ghost=null;const mkGhost=()=>{ghost=document.createElement("div");ghost.className="ratio-touch-ghost";ghost.textContent=symbol;document.body.appendChild(ghost);document.body.classList.add("dragging-cards")};const move=ev=>{if(!moved&&Math.hypot(ev.clientX-sx,ev.clientY-sy)<8)return;if(!moved){moved=true;mkGhost()}ghost.style.left=ev.clientX+"px";ghost.style.top=ev.clientY+"px";const vh=window.innerHeight;if(ev.clientY>vh-110)window.scrollBy(0,12);else if(ev.clientY<110)window.scrollBy(0,-12);document.querySelectorAll("[data-cf-drop],[data-cf-tray]").forEach(x=>x.classList.remove("drag-over"));const hit=document.elementFromPoint(ev.clientX,ev.clientY)?.closest("[data-cf-drop],[data-cf-tray]");if(hit&&hit.dataset.cfGroup===group)hit.classList.add("drag-over")};const up=ev=>{const hit=moved?document.elementFromPoint(ev.clientX,ev.clientY)?.closest("[data-cf-drop],[data-cf-tray]"):null;ghost&&ghost.remove();document.body.classList.remove("dragging-cards");document.querySelectorAll("[data-cf-drop],[data-cf-tray]").forEach(x=>x.classList.remove("drag-over"));el.removeEventListener("pointermove",move);el.removeEventListener("pointerup",up);el.removeEventListener("pointercancel",up);if(!moved){if(el.dataset.cfPiece){if(!el.disabled)cfPickPiece(q,el.dataset.cfGroup,el.dataset.cfPiece)}else{const drop=el.closest("[data-cf-drop]");drop&&cfHandleDropTap(q,drop)}return}if(hit&&hit.dataset.cfGroup===group){if(hit.dataset.cfDrop)cfDropSymbol(q,group,symbol,hit.dataset.cfDrop);else cfReturnSymbol(q,group,symbol)}};el.addEventListener("pointermove",move);el.addEventListener("pointerup",up);el.addEventListener("pointercancel",up)})}
function wireChoiceFlow(q){document.querySelectorAll("[data-cf-cell]").forEach(el=>el.onclick=()=>{const key=el.dataset.cfCell,v=state.values[key];if(state.target&&state.target!==key&&v!==undefined){loadSourceValue(v,labelFor(q,key),el);return}selectChoiceFlowTarget(q,key)});document.querySelectorAll("[data-cf-slot]").forEach(el=>el.onclick=()=>selectChoiceFlowTarget(q,el.dataset.cfSlot==="a"?"CF_A":"CF_B"));document.querySelectorAll("[data-cf-source]").forEach(el=>el.onclick=()=>{const group=el.dataset.cfSourceGroup;if(!state.target)selectChoiceFlowTarget(q,group==="a"?"CF_A":"CF_B");loadSourceValue(Number(el.dataset.cfSource),el.textContent.trim(),el)});document.querySelectorAll("[data-cf-piece]").forEach(el=>el.onclick=()=>{if(!el.disabled)cfPickPiece(q,el.dataset.cfGroup,el.dataset.cfPiece)});document.querySelectorAll("[data-cf-drop]").forEach(el=>{el.onclick=()=>cfHandleDropTap(q,el);el.ondragover=e=>{if(el.classList.contains("disabled"))return;e.preventDefault();el.classList.add("drag-over")};el.ondragleave=()=>el.classList.remove("drag-over");el.ondrop=e=>{e.preventDefault();el.classList.remove("drag-over");const group=el.dataset.cfGroup;if(e.dataTransfer.getData("text/cf-group")===group)cfDropSymbol(q,group,e.dataTransfer.getData("text/cf-symbol"),el.dataset.cfDrop)}});document.querySelectorAll("[data-cf-drag-symbol]").forEach(el=>{el.ondragstart=e=>{e.dataTransfer.setData("text/cf-symbol",el.dataset.cfDragSymbol);e.dataTransfer.setData("text/cf-group",el.dataset.cfGroup);e.dataTransfer.effectAllowed="move";el.classList.add("dragging");document.body.classList.add("dragging-cards")};el.ondragend=()=>{el.classList.remove("dragging");document.body.classList.remove("dragging-cards")};cfWireTouchDrag(q,el)});document.querySelectorAll("[data-cf-tray]").forEach(tray=>{tray.ondragover=e=>{if(e.dataTransfer.types.includes("text/cf-symbol")){e.preventDefault();tray.classList.add("drag-over")}};tray.ondragleave=()=>tray.classList.remove("drag-over");tray.ondrop=e=>{e.preventDefault();tray.classList.remove("drag-over");const group=tray.dataset.cfTray;if(e.dataTransfer.getData("text/cf-group")===group)cfReturnSymbol(q,group,e.dataTransfer.getData("text/cf-symbol"))}});document.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{state.selected=+b.dataset.choice;document.querySelectorAll(".choice").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");beep(540)});document.querySelectorAll(".key").forEach(k=>k.onclick=()=>handleKey(q,k.dataset.k));$("#checkCF").onclick=()=>checkChoiceFlow(q);if(state.target)selectChoiceFlowTarget(q,state.target,false)}
function selectChoiceFlowTarget(q,key,clear=true){state.target=key;if(clear){state.expr="";state.tokens=[];state.sign=1}clearPicking();const el=key==="CF_A"?document.querySelector('[data-cf-slot="a"]'):key==="CF_B"?document.querySelector('[data-cf-slot="b"]'):document.querySelector(`[data-cf-cell="${key}"]`);el&&el.classList.add("pick");$("#calc").classList.remove("idle");document.querySelectorAll(".key").forEach(k=>k.disabled=false);const text=key==="CF_A"?"一份 a":key==="CF_B"?"一份 b":labelFor(q,key);$("#targetText").innerHTML=`正在填：<b>${text}</b>`;const cf=q.choiceFlow;$("#calcHint").textContent=key==="CF_A"?`點已填好的${cf.ratioA.baseLabel}帶入，再 ÷ ${cfCoefSum(cf.ratioA)}`:key==="CF_B"?`點已填好的${cf.ratioB.baseLabel}帶入，再 ${cfDiffOpText(cf.ratioB)}`:"可按數字鍵，或點已填好的金額帶入";paintCalc()}
function putChoiceFlowValue(q){if(!state.target)return toast("請先點一個空格");if(state.expr===""&&!state.tokens.length)return toast("請先輸入金額");const target=state.target,v=calcValue();if(target==="CF_A")state.cfAValue=v;else if(target==="CF_B")state.cfBValue=v;else state.values[target]=v;state.target=null;state.expr="";state.tokens=[];state.sign=1;beep(760);const cf=q.choiceFlow;if(target==="CF_A"&&v===cf.ratioA.answer)toast(`a 正確！${cf.ratioA.pieces.join("、")} 已自動換成金額`);if(target===cf.ratioB.baseKey&&v===cf.values[cf.ratioB.baseKey])toast(`${cf.ratioB.baseLabel}正確，第二組比例已解鎖`);if(target==="CF_B"&&v===cf.ratioB.answer)toast(`b 正確！${cf.ratioB.pieces.join("、")} 已自動換成金額`);rerenderChoiceFlowStable(q)}
function checkChoiceFlow(q){const hasOpt=!!q.options;const expected=q.choiceFlow.values,missing=Object.keys(expected).filter(k=>state.values[k]===undefined);const aCfg=q.choiceFlow.ratioA,bCfg=q.choiceFlow.ratioB,aPlace=Object.keys(aCfg.expected).filter(c=>!state.cfAPlacements[c]).length,bPlace=Object.keys(bCfg.expected).filter(c=>!state.cfBPlacements[c]).length;if(missing.length||state.cfAValue===undefined||state.cfBValue===undefined||aPlace||bPlace||(hasOpt&&state.selected===null)){toast(`還有 ${missing.length+(state.cfAValue===undefined?1:0)+(state.cfBValue===undefined?1:0)+aPlace+bPlace+(hasOpt&&state.selected===null?1:0)} 個項目尚未完成`);return}state.attempts++;let ok=0,total=Object.keys(expected).length+1+1+Object.keys(aCfg.expected).length+Object.keys(bCfg.expected).length+(hasOpt?1:0);for(const [k,v] of Object.entries(expected)){const el=document.querySelector(`[data-cf-cell="${k}"]`);if(state.values[k]===v){ok++;el&&el.classList.add("right")}else el&&el.classList.add("wrong") }[["a",aCfg,state.cfAValue,state.cfAPlacements],["b",bCfg,state.cfBValue,state.cfBPlacements]].forEach(([group,cfg,val,p])=>{const slot=document.querySelector(`[data-cf-slot="${group}"]`);if(val===cfg.answer){ok++;slot&&slot.classList.add("right")}else slot&&slot.classList.add("wrong");for(const [col,sym] of Object.entries(cfg.expected)){const el=document.querySelector(`[data-cf-drop="${col}"][data-cf-group="${group}"]`);if(p[col]===sym){ok++;el&&el.classList.add("right")}else el&&el.classList.add("wrong")}});if(hasOpt){document.querySelectorAll(".choice").forEach((b,i)=>{if(i===q.correct)b.classList.add("correct");if(i===state.selected&&i!==q.correct)b.classList.add("incorrect")});if(state.selected===q.correct)ok++}if(ok===total)finishLevel(q,ok,total);else{save.streak=0;persist();updateHud();const fb=$("#feedback");fb.className="card feedback show bad";fb.innerHTML=`<h3>還有 ${total-ok} 個項目需要修正</h3><p>紅色項目可能是金額、比例位置、本期損益方向${hasOpt?"或選項判斷":""}不正確。</p>`;beep(170,.2,"sawtooth")}}

function renderChoice(q){const isAudit=q.type==="audit";$("#main").innerHTML=qCard(q)+commonToolbar()+(isAudit?`<section class="card audit-box"><h3>🧭 這一關不是硬算，而是檢查題目是否自洽</h3><div class="audit-eq">結帳前比例先決定一組 <code>L、C</code>；結帳後若只做結帳分錄，<code>L</code> 原則上不應改變。</div></section>`:"")+`<section class="card"><div class="choice-list">${q.options.map((o,i)=>`<button class="choice" data-choice="${i}"><span class="letter">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`).join("")}</div></section><section class="toolbar"><button class="btn gold" id="checkChoice" style="flex:1">送出答案</button></section><section class="card feedback" id="feedback"></section>`;wireCommon();document.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{state.selected=+b.dataset.choice;document.querySelectorAll(".choice").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");beep(540)});$("#checkChoice").onclick=()=>checkChoice(q)}
function checkChoice(q){if(state.selected===null)return toast("請先選一個答案");state.attempts++;const buttons=[...document.querySelectorAll(".choice")];buttons.forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add("correct");if(i===state.selected&&i!==q.correct)b.classList.add("incorrect")});if(state.selected===q.correct)finishLevel(q,1,1);else{save.streak=0;persist();updateHud();const fb=$("#feedback");fb.className="card feedback show bad";fb.innerHTML=`<h3>這個選項不是答案</h3><p>查看提示或重新作答，再從資料關係逐步檢查。</p>`;$("#checkChoice").disabled=true;setTimeout(()=>{buttons.forEach(b=>{b.disabled=false;b.classList.remove("correct","incorrect","selected")});state.selected=null;$("#checkChoice").disabled=false},1100);beep(170,.2,"sawtooth")}}

function renderAlgebra(q){$("#main").innerHTML=qCard(q)+commonToolbar()+`<section class="card formula-board">${q.formulaQuestions.map((f,fi)=>`<div class="formula-step"><h3>${f.title}</h3><div class="formula-options">${f.options.map((o,oi)=>`<button class="formula-option" data-fi="${fi}" data-oi="${oi}">${o}</button>`).join("")}</div></div>`).join("")}<div class="formula-step"><h3>④ 算出三個金額</h3><div class="numeric-row">${q.numbers.map(n=>`<div class="num-card"><label>${n.label}</label><input class="num-input" inputmode="numeric" data-num="${n.key}" placeholder="輸入金額"></div>`).join("")}</div></div></section><section class="toolbar"><button class="btn gold" id="checkAlg" style="flex:1">驗證推理</button></section><section class="card feedback" id="feedback"></section>`;wireCommon();state.formulaSelections=state.formulaSelections.length?q.formulaQuestions.map((_,i)=>state.formulaSelections[i]??null):q.formulaQuestions.map(()=>null);document.querySelectorAll(".formula-option").forEach(b=>b.onclick=()=>{const fi=+b.dataset.fi,oi=+b.dataset.oi;state.formulaSelections[fi]=oi;document.querySelectorAll(`[data-fi="${fi}"]`).forEach(x=>x.classList.remove("selected"));b.classList.add("selected");beep(540)});$("#checkAlg").onclick=()=>checkAlgebra(q)}
function checkAlgebra(q){if(state.formulaSelections.some(v=>v===null))return toast("三個公式都要選");const inputs=[...document.querySelectorAll(".num-input")];if(inputs.some(i=>i.value.trim()===""))return toast("三個金額都要填");state.attempts++;let ok=0,total=q.formulaQuestions.length+q.numbers.length;q.formulaQuestions.forEach((f,fi)=>{const buttons=document.querySelectorAll(`[data-fi="${fi}"]`);buttons.forEach((b,oi)=>{b.classList.remove("correct","incorrect");if(oi===f.correct)b.classList.add("correct");if(oi===state.formulaSelections[fi]&&oi!==f.correct)b.classList.add("incorrect")});if(state.formulaSelections[fi]===f.correct)ok++});inputs.forEach(inp=>{const n=q.numbers.find(x=>x.key===inp.dataset.num);inp.classList.remove("right","wrong");if(Number(inp.value.replace(/,/g,""))===n.answer){ok++;inp.classList.add("right")}else inp.classList.add("wrong")});if(ok===total)finishLevel(q,ok,total);else{save.streak=0;persist();updateHud();const fb=$("#feedback");fb.className="card feedback show bad";fb.innerHTML=`<h3>推理完成 ${ok}/${total}</h3><p>紅色項目需修正；綠色項目已正確。</p>`;beep(170,.2,"sawtooth")}}

function scoreFor(){return Math.max(50,100-(state.attempts-1)*10-(state.hintUsed?10:0))}
function finishLevel(q,ok,total){if(state.finished)return;state.finished=true;const score=scoreFor();const i=state.level;save.best[i]=Math.max(save.best[i]||0,score);if(!save.done.includes(i))save.done.push(i);save.streak=(save.streak||0)+1;persist();updateHud();$("#endTitle").textContent="🎉 本關完成";$("#endText").textContent=state.hintUsed?"已完成推理；再練一次可挑戰更高分。":"題目已知、正負判斷與推算結果都正確。";$("#endScore").textContent=score;$("#endCorrect").textContent=`${ok}/${total}`;$("#endBest").textContent=save.best[i];$("#endSteps").innerHTML=`<h3>解題步驟</h3><div class="steps">${q.steps.map((s,j)=>`<div class="step"><b>${j+1}</b><p>${s}</p></div>`).join("")}</div>`;$("#nextBtn").textContent=i<LEVELS.length-1?"下一關 →":"回到題目清單";$("#endOverlay").classList.remove("hidden");beep(760,.12,"square");setTimeout(()=>beep(980,.14,"sine"),120)}

$("#menuBtn").onclick=()=>{$("#endOverlay").classList.add("hidden");renderMenu();$("#menuOverlay").classList.remove("hidden")};
$("#nextBtn").onclick=()=>{const i=state.level+1;$("#endOverlay").classList.add("hidden");if(i<LEVELS.length)startLevel(i);else{renderMenu();$("#menuOverlay").classList.remove("hidden")}};
$("#soundBtn").onclick=()=>{muted=!muted;$("#soundBtn").textContent=muted?"🔇":"🔊"};
document.addEventListener("gesturestart",e=>e.preventDefault());
document.addEventListener("gesturechange",e=>e.preventDefault());
let __lastTap=0;
document.addEventListener("touchend",e=>{const t=Date.now();const isDrag=e.target.closest("[data-drag-symbol],[data-cf-drag-symbol]");if(t-__lastTap<350&&!isDrag&&!e.target.closest("input,textarea")){e.preventDefault();const el=e.target.closest("button,[data-cf-drop],[data-ratio-drop]");el&&el.click()}__lastTap=t},{passive:false});
function setHeaderH(){const h=document.querySelector("header");document.documentElement.style.setProperty("--header-h",((h?h.offsetHeight:54)+2)+"px")}
window.addEventListener("resize",setHeaderH);setHeaderH();
renderMenu();updateHud();
</script>
</body>
