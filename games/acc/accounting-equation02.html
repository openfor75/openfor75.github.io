<body>
<header>
  <div class="brand"><div class="brand-mark">A</div><div><h1>會計方程式｜韓式解題闖關</h1><small>ACCOUNTING EQUATION CHALLENGE</small></div></div>
  <div class="hud"><span class="pill">第 <b id="levelNo">1</b>/8 關</span><span class="pill">總分 <b id="totalScore">0</b></span><span class="pill">連勝 <b id="streak">0</b></span><button class="icon-btn" id="soundBtn" aria-label="切換音效">🔊</button></div>
</header>
<main id="main"></main>
<div class="overlay" id="menuOverlay"><div class="panel">
  <h2>會計方程式闖關</h2>
  <p>題目數字不預先放入表格，由學生自行判斷欄位、正負與計算結果。</p>
  <div class="rule"><b>玩法：</b>題目中的已知數字也要由學生親自填入解題架構表；遇到減少、提取或淨損，使用計算機的 <b>±</b> 鍵切換負號。計算時可直接點擊<b>已填好的金額</b>，快速帶入計算機。全部完成後再驗證答案。</div>
  <div class="level-list" id="levelList"></div>
</div></div>
<div class="overlay hidden" id="endOverlay"><div class="panel">
  <h2 id="endTitle">完成</h2><p id="endText"></p>
  <div class="summary"><div class="stat">本關得分<b id="endScore">0</b></div><div class="stat">完成格數<b id="endCorrect">0/0</b></div><div class="stat">最佳成績<b id="endBest">0</b></div></div>
  <div class="feedback show ok" id="endSteps"></div>
  <div class="end-actions"><button class="btn" id="nextBtn">下一關 →</button><button class="btn secondary" id="menuBtn">回選單</button></div>
</div></div>
<div class="toast" id="toast"></div>
<script>
const ROWS=[
 {k:"0",t:"1 / 1",s:"期初"},{k:"1",t:"年度中",s:""},{k:"2",t:"12 / 31",s:"結帳前"},{k:"3",t:"結帳",s:""},{k:"4",t:"12 / 31",s:"結帳後"}
];
const COLS=["a","l","c","r","e"];
const COLNAME={a:"資產",l:"負債",c:"權益",r:"收益",e:"費損",pl:"本期損益"};
const fmt=n=>Math.abs(Number(n)).toLocaleString("zh-TW");
const showNum=n=>Number(n)<0?`<span class="neg">(${fmt(n)})</span>`:fmt(n);
const cell=(r,c,i=0)=>`${r}.${c}.${i}`;

const LEVELS=[
{
 type:"matrix",page:"P.16",no:"教學示範 1",title:"會計方程式應用計算－1",
 body:"試計算下列空格應有之金額：期初資產 <b>$258,000</b>、期末資產 <b>$356,000</b>、期初負債 <b>$130,000</b>、本期增資 <b>$55,000</b>、業主提取現金自用 <b>$20,000</b>、本期費損 <b>$24,000</b>、本期淨利 <b>$52,000</b>。",
 ask:"求：①期初權益　②期末權益　③期末負債　④本期收益",

function expectedMatrix(q){return {...q.known,...q.answers}}
function labelFor(q,key){return (q.labels&&q.labels[key])||(q.ratioFlow&&q.ratioFlow.labels&&q.ratioFlow.labels[key])||COLNAME[(key.split(".")[1]||"")]||"金額"}
function expectedRatioFlow(q){return q.ratioFlow?{...q.ratioFlow.symbolValues}:{} }
function allMatrixKeys(q){return Object.keys(expectedMatrix(q))}
function slotsFor(q,r,c){const keys=allMatrixKeys(q).filter(k=>{const [rr,cc]=k.split(".");return rr===r&&cc===c});if(!keys.length)return 0;return Math.max(...keys.map(k=>+k.split(".")[2]))+1}
function cellHtml(q,key){const expected=expectedMatrix(q);if(expected[key]!==undefined){const v=state.values[key];return `<button class="cell blank${v!==undefined?" filled":""}" data-cell="${key}" title="${q.labels[key]||""}">${v===undefined?"？":showNum(v)}</button>`}return `<span class="cell empty"></span>`}
function matrixGrid(q){const expected=expectedMatrix(q);let html=`<div class="mgrid"><div class="mhead"><span></span><span class="ha">資產 A</span><span class="sign">＝</span><span class="hl">負債 L</span><span class="sign">＋</span><span class="hc">權益 C</span><span class="sign">＋</span><span class="hr">收益 R</span><span class="sign">－</span><span class="he">費損 E</span></div>`;
 for(const row of ROWS){if(q.compact&&!["2","3","4"].includes(row.k))continue;if(row.k==="3"){const key="3.pl.0";if(expected[key]!==undefined){html+=`<div class="plrow"><span class="rlabel">結帳</span><div class="plbox"><span class="pl-label">本期損益併入權益 →</span>${cellHtml(q,key)}</div></div>`}continue}
  const cells=COLS.map(c=>{const n=slotsFor(q,row.k,c);let inside="";for(let i=0;i<n;i++)inside+=cellHtml(q,cell(row.k,c,i));return `<span class="cellstack">${inside||'<span class="cell empty"></span>'}</span>`});
  html+=`<div class="mrow${row.k==="2"||row.k==="4"?" sep":""}"><span class="rlabel">${row.t}${row.s?`<small>${row.s}</small>`:""}</span>${cells[0]}<span class="sign">＝</span>${cells[1]}<span class="sign">＋</span>${cells[2]}<span class="sign">＋</span>${cells[3]}<span class="sign">－</span>${cells[4]}</div>`}
 return html+"</div>"}

function flowCellHtml(q,key){const expected=expectedRatioFlow(q);if(expected[key]!==undefined){const v=state.values[key];return `<button class="cell blank${v!==undefined?" filled":""}" data-cell="${key}" title="${labelFor(q,key)}">${v===undefined?"？":showNum(v)}</button>`}return `<span class="cell empty"></span>`}
function ratioSolved(q){return !!(q.ratioFlow&&state.ratioValue===q.ratioFlow.oneAnswer&&state.ratioPlacements.l==="3a"&&state.ratioPlacements.c==="1a")}
function ratioNumericValue(col,q){if(!ratioSolved(q))return null;return col==="l"?240000:col==="c"?q.ratioFlow.oneAnswer:null}
function ratioDropHtml(col,q){const sym=state.ratioPlacements[col],solved=ratioSolved(q),num=ratioNumericValue(col,q);const inner=sym?`<span class="placed-ratio" draggable="true" data-drag-symbol="${sym}" data-drag-from="${col}"><b>${sym}</b>${solved?`<small>＝ ${fmt(num)}</small>`:""}</span>`:"拖到這裡";return `<div class="ratio-drop${sym?" filled":""}${solved?" solved":""}" data-ratio-drop="${col}" data-source-value="${num===null?"":num}" role="button" tabindex="0" title="將比例卡拖到這裡">${inner}</div>`}
function ratioGuidanceHtml(q){const correct=state.ratioPlacements.l==="3a"&&state.ratioPlacements.c==="1a",postL=state.values["rf.l.post"],v=state.ratioValue;if(!correct)return `<div class="ratio-guidance"><span class="lead">先完成比例定位</span><span class="math">把 3a 拖到負債、1a 拖到權益</span><small>也保留點選操作：先點比例卡，再點欄位。</small></div>`;if(postL===undefined)return `<div class="ratio-guidance"><span class="lead">比例放對了！</span><span class="math">結帳前與結帳後的負債相同</span><small>請先把題目的結帳後負債 240,000 填入下方負債格。</small></div>`;if(v===q.ratioFlow.oneAnswer)return `<div class="ratio-guidance done"><span class="lead">✓ 比例已換成金額</span><span class="math">3a＝240,000　｜　1a＝80,000</span><small>接著求本期損益，再完成結帳後的資產與權益；收益與費損無法個別求出。</small></div>`;return `<div class="ratio-guidance"><span class="lead">結帳不影響負債：</span><span class="math">240,000＝3a　→　240,000 ÷ 3 ＝ a ＝</span><button class="ratio-slot${v!==undefined?" filled":""}" id="ratioSlot" title="${q.ratioFlow.oneLabel}">${v===undefined?"？":showNum(v)}</button><small>點 a 的空格，再點下方已填好的 240,000，使用計算機除以 3。</small></div>`}
function ratioFlowGrid(q){return `<div class="mgrid"><div class="mhead"><span></span><span class="ha">資產 A</span><span class="sign">＝</span><span class="hl">負債 L</span><span class="sign">＋</span><span class="hc">權益 C</span><span class="sign">＋</span><span class="hr">收益 R</span><span class="sign">－</span><span class="he">費損 E</span></div><div class="mrow sep"><span class="rlabel">12 / 31<small>結帳前</small></span><span class="cellstack">${flowCellHtml(q,"rf.a.pre")}</span><span class="sign">＝</span><span class="cellstack">${ratioDropHtml("l",q)}</span><span class="sign">＋</span><span class="cellstack">${ratioDropHtml("c",q)}</span><span class="sign">＋</span><span class="net-note">R－E 僅能求出本期損益，無法個別求收益與費損</span></div><div class="plrow"><span class="rlabel">結帳</span><div class="plbox"><span class="pl-label">本期損益併入權益 →</span>${flowCellHtml(q,"rf.pl")}</div></div><div class="mrow sep"><span class="rlabel">12 / 31<small>結帳後</small></span><span class="cellstack">${flowCellHtml(q,"rf.a.post")}</span><span class="sign">＝</span><span class="cellstack">${flowCellHtml(q,"rf.l.post")}</span><span class="sign">＋</span><span class="cellstack">${flowCellHtml(q,"rf.c.post")}</span><span class="sign">＋</span><span class="cellstack"><span class="cell empty"></span></span><span class="sign">－</span><span class="cellstack"><span class="cell empty"></span></span></div></div>`}
function ratioFlowHtml(q){const used=new Set(Object.values(state.ratioPlacements));return `<section class="card phase-card"><div class="phase-head">把比例直接放進同一張會計方程式表</div><div class="phase-note">將比例卡拖曳到結帳前的負債與權益欄。算出一份 a 後，比例格會自動顯示對應金額，不再切換到第二個介面。</div><div class="ratio-tray" data-ratio-tray><span class="ratio-tray-label">比例卡</span>${["3a","1a"].map(sym=>`<button class="ratio-piece${state.ratioPick===sym?" selected":""}${used.has(sym)?" used":""}" draggable="${used.has(sym)?"false":"true"}" data-ratio-piece="${sym}" data-drag-symbol="${sym}" data-drag-from="tray">${sym}</button>`).join("")}<span class="ratio-help">拖到欄位中；也可以點卡片再點欄位</span></div><div class="symbolic-grid">${ratioFlowGrid(q)}</div>${ratioGuidanceHtml(q)}</section>`}
function calcHtml(){return `<section class="card calc idle" id="calc"><div class="calc-top"><div class="target" id="targetText">👆 請先點一個要填寫的空格</div><div class="calc-hint" id="calcHint">計算機會一直留在原位，不會再忽然出現或消失</div></div><div class="calc-layout"><div><div class="display"><div class="expr" id="expr"></div><div class="value" id="value">0</div></div></div><div class="keys"><button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key op" data-k="/">÷</button><button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key op" data-k="*">×</button><button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button><button class="key op" data-k="-">－</button><button class="key" data-k="0">0</button><button class="key" data-k="00">00</button><button class="key fn" data-k="del">⌫</button><button class="key op" data-k="+">＋</button><button class="key fn" data-k="clear">C</button><button class="key fn" data-k="neg">±</button><button class="key" data-k="eq">＝</button><button class="key put" data-k="put">填入</button></div></div></section>`}
function renderMatrix(q){
 const work=q.ratioFlow?ratioFlowHtml(q):`<section class="card matrix" id="matrix">${matrixGrid(q)}</section>`;
 $("#main").innerHTML=qCard(q)+commonToolbar()+givensHtml()+work+calcHtml()+`<section class="toolbar"><button class="btn gold" id="checkBtn" style="flex:1">驗證答案</button></section><section class="card feedback" id="feedback"></section>`;
 wireCommon();wireMatrix(q);refreshCalcUI(q);
}
function rerenderMatrixStable(q){const y=window.scrollY;renderMatrix(q);requestAnimationFrame(()=>window.scrollTo({top:y,left:0,behavior:"auto"}))}
function wireMatrix(q){
 document.querySelectorAll("[data-cell]").forEach(el=>el.onclick=()=>handleCellTap(q,el));
 const ratioSlot=$("#ratioSlot");if(ratioSlot)ratioSlot.onclick=()=>handleRatioTap(q,ratioSlot);
 document.querySelectorAll("[data-ratio-piece]").forEach(el=>el.onclick=()=>pickRatioPiece(q,el.dataset.ratioPiece));
 document.querySelectorAll("[data-ratio-drop]").forEach(el=>{el.onclick=()=>handleRatioDropTap(q,el);el.ondragover=e=>{e.preventDefault();el.classList.add("drag-over")};el.ondragleave=()=>el.classList.remove("drag-over");el.ondrop=e=>{e.preventDefault();el.classList.remove("drag-over");dropRatioSymbol(q,e.dataTransfer.getData("text/ratio"),el.dataset.ratioDrop)}});
 document.querySelectorAll("[data-drag-symbol]").forEach(el=>{el.ondragstart=e=>{e.dataTransfer.setData("text/ratio",el.dataset.dragSymbol);e.dataTransfer.effectAllowed="move";el.classList.add("dragging")};el.ondragend=()=>el.classList.remove("dragging");wireTouchRatioDrag(q,el)});
 const tray=document.querySelector("[data-ratio-tray]");if(tray){tray.ondragover=e=>{e.preventDefault();tray.classList.add("drag-over")};tray.ondragleave=()=>tray.classList.remove("drag-over");tray.ondrop=e=>{e.preventDefault();tray.classList.remove("drag-over");returnRatioToTray(q,e.dataTransfer.getData("text/ratio"))}}
 document.querySelectorAll(".key").forEach(k=>k.onclick=()=>handleKey(q,k.dataset.k));
 $("#checkBtn").onclick=()=>checkMatrix(q);
 if(state.target==="RATIO"&&$("#ratioSlot"))selectRatioSlot(q,false);else if(state.target)selectMatrixCell(q,state.target,false);
}
function handleCellTap(q,el){const key=el.dataset.cell,v=state.values[key];if(state.target&&state.target!==key&&v!==undefined){loadSourceValue(v,labelFor(q,key),el);return}selectMatrixCell(q,key)}
function handleRatioTap(q,el){const lb=q.ratioFlow?q.ratioFlow.oneLabel:(q.ratio?q.ratio.label:"一份 a");if(state.target&&state.target!=="RATIO"&&state.ratioValue!==undefined){loadSourceValue(state.ratioValue,lb,el);return}selectRatioSlot(q)}
function handleRatioDropTap(q,el){const col=el.dataset.ratioDrop,source=Number(el.dataset.sourceValue);if(state.target&&el.dataset.sourceValue!==""&&Number.isFinite(source)){loadSourceValue(source,col==="l"?"3a 對應金額":"1a 對應金額",el);return}placeRatioPiece(q,col)}
function pickRatioPiece(q,symbol){const currentCol=Object.keys(state.ratioPlacements).find(c=>state.ratioPlacements[c]===symbol);if(currentCol)delete state.ratioPlacements[currentCol];state.ratioPick=symbol;beep(560);rerenderMatrixStable(q)}
function placeRatioPiece(q,col){if(state.ratioPick){dropRatioSymbol(q,state.ratioPick,col);return}if(state.ratioPlacements[col]){state.ratioPick=state.ratioPlacements[col];delete state.ratioPlacements[col];state.ratioValue=undefined;beep(480);rerenderMatrixStable(q);return}toast("請拖曳比例卡，或先點 3a／1a 再點欄位")}
function dropRatioSymbol(q,symbol,col){if(!symbol)return;const from=Object.keys(state.ratioPlacements).find(c=>state.ratioPlacements[c]===symbol);if(from)delete state.ratioPlacements[from];const occupied=state.ratioPlacements[col];if(occupied&&occupied!==symbol){const other=Object.keys(state.ratioPlacements).find(c=>state.ratioPlacements[c]===occupied);if(other)delete state.ratioPlacements[other]}state.ratioPlacements[col]=symbol;state.ratioPick=null;state.ratioValue=undefined;beep(700);rerenderMatrixStable(q)}
function returnRatioToTray(q,symbol){if(!symbol)return;const col=Object.keys(state.ratioPlacements).find(c=>state.ratioPlacements[c]===symbol);if(col)delete state.ratioPlacements[col];state.ratioValue=undefined;state.ratioPick=null;beep(480);rerenderMatrixStable(q)}
function wireTouchRatioDrag(q,el){el.addEventListener("pointerdown",e=>{if(e.pointerType==="mouse")return;const symbol=el.dataset.dragSymbol;if(!symbol)return;e.preventDefault();let ghost=document.createElement("div");ghost.className="ratio-touch-ghost";ghost.textContent=symbol;document.body.appendChild(ghost);const move=ev=>{ghost.style.left=ev.clientX+"px";ghost.style.top=ev.clientY+"px";document.querySelectorAll(".ratio-drop,.ratio-tray").forEach(x=>x.classList.remove("drag-over"));const hit=document.elementFromPoint(ev.clientX,ev.clientY)?.closest("[data-ratio-drop],[data-ratio-tray]");hit&&hit.classList.add("drag-over")};const up=ev=>{const hit=document.elementFromPoint(ev.clientX,ev.clientY)?.closest("[data-ratio-drop],[data-ratio-tray]");ghost.remove();document.querySelectorAll(".ratio-drop,.ratio-tray").forEach(x=>x.classList.remove("drag-over"));el.releasePointerCapture?.(e.pointerId);el.removeEventListener("pointermove",move);el.removeEventListener("pointerup",up);el.removeEventListener("pointercancel",up);if(hit?.dataset.ratioDrop)dropRatioSymbol(q,symbol,hit.dataset.ratioDrop);else if(hit?.hasAttribute("data-ratio-tray"))returnRatioToTray(q,symbol)};el.setPointerCapture?.(e.pointerId);el.addEventListener("pointermove",move);el.addEventListener("pointerup",up);el.addEventListener("pointercancel",up);move(e)})}
function loadSourceValue(v,label,el){state.expr=String(Math.abs(Number(v)));state.sign=Number(v)<0?-1:1;paintCalc();$("#calcHint").textContent=`已帶入：${label} ${Number(v)<0?"－":""}${fmt(v)}`;el&&el.classList.add("source-flash");setTimeout(()=>el&&el.classList.remove("source-flash"),480);beep(690,.07)}
function clearPicking(){document.querySelectorAll(".cell.pick,.ratio-slot.pick,.ratio-drop.pick").forEach(x=>x.classList.remove("pick"))}
function refreshCalcUI(q){const calc=$("#calc"),keys=[...document.querySelectorAll(".key")];if(!calc)return;calc.classList.toggle("idle",!state.target);keys.forEach(k=>k.disabled=!state.target);if(!state.target){$("#targetText").innerHTML="👆 請先點一個要填寫的空格";$("#calcHint").textContent="計算機會一直留在原位，不會再忽然出現或消失";state.expr="";state.tokens=[];state.sign=1;paintCalc()}}
function selectMatrixCell(q,key,clear=true){state.target=key;if(clear){state.expr="";state.tokens=[];state.sign=1}clearPicking();const el=document.querySelector(`[data-cell="${key}"]`);if(el)el.classList.add("pick");$("#calc").classList.remove("idle");document.querySelectorAll(".key").forEach(k=>k.disabled=false);$("#targetText").innerHTML=`正在填：<b>${labelFor(q,key)}</b>`;$("#calcHint").textContent="可按數字鍵，或點已填好的金額帶入";paintCalc()}
function selectRatioSlot(q,clear=true){state.target="RATIO";if(clear){state.expr="";state.tokens=[];state.sign=1}clearPicking();const el=$("#ratioSlot");if(el)el.classList.add("pick");$("#calc").classList.remove("idle");document.querySelectorAll(".key").forEach(k=>k.disabled=false);$("#targetText").innerHTML=`正在解：<b>${q.ratioFlow?q.ratioFlow.oneLabel:q.ratio.label}</b>`;$("#calcHint").textContent="點已填好的 240,000，再按 ÷ 3";paintCalc()}
function calcValue(){const t=[...state.tokens];if(state.expr!=="")t.push(state.sign*Number(state.expr));if(!t.length)return 0;const high=[t[0]];for(let i=1;i<t.length;i+=2){const op=t[i],n=t[i+1];if(n===undefined)break;if(op==="*")high[high.length-1]*=n;else if(op==="/")high[high.length-1]=n===0?0:high[high.length-1]/n;else high.push(op,n)}let r=high[0];for(let i=1;i<high.length;i+=2)r=high[i]==="+"?r+high[i+1]:r-high[i+1];return Math.round(r)}
function paintCalc(){const map={"+":"＋","-":"－","*":"×","/":"÷"};const p=state.tokens.map(x=>typeof x==="number"?(x<0?"－":"")+fmt(x):map[x]);if(state.expr!=="")p.push((state.sign<0?"－":"")+fmt(Number(state.expr)));$("#expr").textContent=p.join(" ");const v=calcValue();$("#value").textContent=(v<0?"－":"")+fmt(v);$("#value").classList.toggle("neg",v<0)}
function toggleSign(){state.sign*=-1;beep(state.sign<0?380:620);paintCalc()}
function handleKey(q,k){if(!state.target)return toast("請先點一個要填寫的空格");beep(520,.035,"square");if(k==="put"){putMatrixValue(q);return}if(k==="neg"){toggleSign();return}if(k==="clear"){state.expr="";state.tokens=[];state.sign=1}else if(k==="del"){if(state.expr){state.expr=state.expr.slice(0,-1);if(!state.expr)state.sign=1}else state.tokens.pop()}else if(k==="eq"){const r=calcValue();state.tokens=[];state.expr=String(Math.abs(r));state.sign=r<0?-1:1}else if("+-*/".includes(k)){if(state.expr!==""){state.tokens.push(state.sign*Number(state.expr),k);state.expr="";state.sign=1}else if(state.tokens.length)state.tokens[state.tokens.length-1]=k}else state.expr=(state.expr==="0"?"":state.expr)+k;paintCalc()}
function putMatrixValue(q){if(!state.target)return toast("請先點一個空格");if(state.expr===""&&!state.tokens.length)return toast("請先輸入金額");const v=calcValue();if(state.target==="RATIO")state.ratioValue=v;else state.values[state.target]=v;state.target=null;state.expr="";state.tokens=[];state.sign=1;beep(760);rerenderMatrixStable(q)}
function checkMatrix(q){const expected=expectedMatrix(q),flow=expectedRatioFlow(q);const missing=[...Object.keys(expected),...Object.keys(flow)].filter(k=>state.values[k]===undefined);const ratioMissing=(q.ratio||q.ratioFlow)&&state.ratioValue===undefined;const placementMissing=q.ratioFlow?Object.keys(q.ratioFlow.symbolExpected).filter(c=>!state.ratioPlacements[c]).length:0;if(missing.length||ratioMissing||placementMissing){toast(`還有 ${missing.length+(ratioMissing?1:0)+placementMissing} 格尚未完成`);return}state.attempts++;let ok=0;for(const [k,v] of Object.entries({...flow,...expected})){const el=document.querySelector(`[data-cell="${k}"]`);if(state.values[k]===v){ok++;el&&el.classList.add("right")}else el&&el.classList.add("wrong")}if(q.ratio||q.ratioFlow){const rs=$("#ratioSlot"),answer=q.ratioFlow?q.ratioFlow.oneAnswer:q.ratio.answer;if(state.ratioValue===answer){ok++;rs&&rs.classList.add("right")}else rs&&rs.classList.add("wrong")}if(q.ratioFlow){for(const [col,sym] of Object.entries(q.ratioFlow.symbolExpected)){const el=document.querySelector(`[data-ratio-drop="${col}"]`);if(state.ratioPlacements[col]===sym){ok++;el&&el.classList.add("right")}else el&&el.classList.add("wrong")}}const total=Object.keys(expected).length+Object.keys(flow).length+((q.ratio||q.ratioFlow)?1:0)+(q.ratioFlow?Object.keys(q.ratioFlow.symbolExpected).length:0);if(ok===total){finishLevel(q,ok,total)}else{save.streak=0;persist();updateHud();const fb=$("#feedback");fb.className="card feedback show bad";fb.innerHTML=`<h3>還有 ${total-ok} 格需要修正</h3><p>紅色項目代表金額、位置、比例卡或正負號不正確。可直接點格子或比例卡重新調整。</p>`;beep(170,.2,"sawtooth")}}

function renderChoice(q){const isAudit=q.type==="audit";$("#main").innerHTML=qCard(q)+commonToolbar()+(isAudit?`<section class="card audit-box"><h3>🧭 這一關不是硬算，而是檢查題目是否自洽</h3><div class="audit-eq">結帳前比例先決定一組 <code>L、C</code>；結帳後若只做結帳分錄，<code>L</code> 原則上不應改變。</div></section>`:"")+`<section class="card"><div class="choice-list">${q.options.map((o,i)=>`<button class="choice" data-choice="${i}"><span class="letter">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`).join("")}</div></section><section class="toolbar"><button class="btn gold" id="checkChoice" style="flex:1">送出答案</button></section><section class="card feedback" id="feedback"></section>`;wireCommon();document.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{state.selected=+b.dataset.choice;document.querySelectorAll(".choice").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");beep(540)});$("#checkChoice").onclick=()=>checkChoice(q)}
function checkChoice(q){if(state.selected===null)return toast("請先選一個答案");state.attempts++;const buttons=[...document.querySelectorAll(".choice")];buttons.forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add("correct");if(i===state.selected&&i!==q.correct)b.classList.add("incorrect")});if(state.selected===q.correct)finishLevel(q,1,1);else{save.streak=0;persist();updateHud();const fb=$("#feedback");fb.className="card feedback show bad";fb.innerHTML=`<h3>這個選項不是答案</h3><p>查看提示或重新作答，再從資料關係逐步檢查。</p>`;$("#checkChoice").disabled=true;setTimeout(()=>{buttons.forEach(b=>{b.disabled=false;b.classList.remove("correct","incorrect","selected")});state.selected=null;$("#checkChoice").disabled=false},1100);beep(170,.2,"sawtooth")}}

function renderAlgebra(q){$("#main").innerHTML=qCard(q)+commonToolbar()+`<section class="card formula-board">${q.formulaQuestions.map((f,fi)=>`<div class="formula-step"><h3>${f.title}</h3><div class="formula-options">${f.options.map((o,oi)=>`<button class="formula-option" data-fi="${fi}" data-oi="${oi}">${o}</button>`).join("")}</div></div>`).join("")}<div class="formula-step"><h3>④ 算出三個金額</h3><div class="numeric-row">${q.numbers.map(n=>`<div class="num-card"><label>${n.label}</label><input class="num-input" inputmode="numeric" data-num="${n.key}" placeholder="輸入金額"></div>`).join("")}</div></div></section><section class="toolbar"><button class="btn gold" id="checkAlg" style="flex:1">驗證推理</button></section><section class="card feedback" id="feedback"></section>`;wireCommon();state.formulaSelections=state.formulaSelections.length?q.formulaQuestions.map((_,i)=>state.formulaSelections[i]??null):q.formulaQuestions.map(()=>null);document.querySelectorAll(".formula-option").forEach(b=>b.onclick=()=>{const fi=+b.dataset.fi,oi=+b.dataset.oi;state.formulaSelections[fi]=oi;document.querySelectorAll(`[data-fi="${fi}"]`).forEach(x=>x.classList.remove("selected"));b.classList.add("selected");beep(540)});$("#checkAlg").onclick=()=>checkAlgebra(q)}
function checkAlgebra(q){if(state.formulaSelections.some(v=>v===null))return toast("三個公式都要選");const inputs=[...document.querySelectorAll(".num-input")];if(inputs.some(i=>i.value.trim()===""))return toast("三個金額都要填");state.attempts++;let ok=0,total=q.formulaQuestions.length+q.numbers.length;q.formulaQuestions.forEach((f,fi)=>{const buttons=document.querySelectorAll(`[data-fi="${fi}"]`);buttons.forEach((b,oi)=>{b.classList.remove("correct","incorrect");if(oi===f.correct)b.classList.add("correct");if(oi===state.formulaSelections[fi]&&oi!==f.correct)b.classList.add("incorrect")});if(state.formulaSelections[fi]===f.correct)ok++});inputs.forEach(inp=>{const n=q.numbers.find(x=>x.key===inp.dataset.num);inp.classList.remove("right","wrong");if(Number(inp.value.replace(/,/g,""))===n.answer){ok++;inp.classList.add("right")}else inp.classList.add("wrong")});if(ok===total)finishLevel(q,ok,total);else{save.streak=0;persist();updateHud();const fb=$("#feedback");fb.className="card feedback show bad";fb.innerHTML=`<h3>推理完成 ${ok}/${total}</h3><p>紅色項目需修正；綠色項目已正確。</p>`;beep(170,.2,"sawtooth")}}

function scoreFor(){return Math.max(50,100-(state.attempts-1)*10-(state.hintUsed?10:0))}
function finishLevel(q,ok,total){if(state.finished)return;state.finished=true;const score=scoreFor();const i=state.level;save.best[i]=Math.max(save.best[i]||0,score);if(!save.done.includes(i))save.done.push(i);save.streak=(save.streak||0)+1;persist();updateHud();$("#endTitle").textContent="🎉 本關完成";$("#endText").textContent=state.hintUsed?"已完成推理；再練一次可挑戰更高分。":"題目已知、正負判斷與推算結果都正確。";$("#endScore").textContent=score;$("#endCorrect").textContent=`${ok}/${total}`;$("#endBest").textContent=save.best[i];$("#endSteps").innerHTML=`<h3>解題步驟</h3><div class="steps">${q.steps.map((s,j)=>`<div class="step"><b>${j+1}</b><p>${s}</p></div>`).join("")}</div>`;$("#nextBtn").textContent=i<LEVELS.length-1?"下一關 →":"回到題目清單";$("#endOverlay").classList.remove("hidden");beep(760,.12,"square");setTimeout(()=>beep(980,.14,"sine"),120)}

$("#menuBtn").onclick=()=>{$("#endOverlay").classList.add("hidden");renderMenu();$("#menuOverlay").classList.remove("hidden")};
$("#nextBtn").onclick=()=>{const i=state.level+1;$("#endOverlay").classList.add("hidden");if(i<LEVELS.length)startLevel(i);else{renderMenu();$("#menuOverlay").classList.remove("hidden")}};
$("#soundBtn").onclick=()=>{muted=!muted;$("#soundBtn").textContent=muted?"🔇":"🔊"};
renderMenu();updateHud();
</script>
</body>
</html>
