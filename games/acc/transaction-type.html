<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>交易鑑定所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F8F6EF;
  --rule:#C9D6E8;
  --margin-red:#D65A5A;
  --ink:#22303A;
  --ink-soft:#5B6B77;
  --stamp:#C1272D;
  --ok:#1E7F4F;
  --gold:#E8A008;
  --blue:#1D5FBF;
  --purple:#6B4FA3;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Noto Sans TC','LINE Seed TW',system-ui,sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(90deg, transparent 0, transparent 2.4rem, var(--margin-red) 2.4rem, var(--margin-red) calc(2.4rem + 1.5px), transparent calc(2.4rem + 1.5px)),
    repeating-linear-gradient(0deg, transparent 0, transparent 27px, var(--rule) 27px, var(--rule) 28px);
  display:flex;flex-direction:column;
  overflow:hidden;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}

header{padding:.7rem 1rem .4rem;display:flex;align-items:baseline;justify-content:space-between;gap:.5rem;flex-wrap:wrap;}
h1{font-weight:900;font-size:clamp(1.05rem,4.3vw,1.45rem);letter-spacing:.1em;}
h1 small{font-size:.6em;font-weight:700;color:var(--ink-soft);letter-spacing:.12em;margin-left:.4em;}
.scorebar{display:flex;gap:.85rem;font-size:.84rem;font-weight:500;color:var(--ink-soft);align-items:baseline;}
.scorebar b{color:var(--ink);font-variant-numeric:tabular-nums;}
.streak{color:var(--stamp);font-weight:700;}
#snd{cursor:pointer;}
.progress{height:6px;margin:0 1rem;border:1px solid var(--rule);border-radius:3px;overflow:hidden;background:#fff;}
.progress i{display:block;height:100%;width:0;background:var(--ink);transition:width .3s ease;}

main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(.5rem,2vh,1rem);position:relative;min-height:0;padding:.4rem 1rem;}

/* 傳票 */
.voucher{
  width:min(92vw,460px);
  background:#fff;border:1.5px solid var(--ink);border-radius:6px;
  box-shadow:4px 4px 0 rgba(34,48,58,.15);
  padding:.75rem .95rem .9rem;position:relative;
}
.v-head{
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:2px solid var(--ink);padding-bottom:.35rem;margin-bottom:.5rem;
}
.v-head .t{font-weight:900;letter-spacing:.4em;font-size:.95rem;}
.v-head .d{font-size:.72rem;color:var(--ink-soft);letter-spacing:.1em;}
.v-desc{
  font-size:.82rem;color:var(--ink-soft);line-height:1.6;
  border-bottom:1px dashed var(--rule);padding-bottom:.45rem;margin-bottom:.5rem;
}
.jrow{
  display:flex;align-items:baseline;gap:.4rem;
  padding:.3rem .1rem;font-size:clamp(.92rem,3.9vw,1.08rem);
  opacity:0;transform:translateX(-8px);
}
.jrow.show{animation:writeIn .28s ease forwards;}
@keyframes writeIn{to{opacity:1;transform:translateX(0);}}
.jrow.cr{padding-left:2.4em;}
.jrow .lbl{font-weight:900;color:var(--ink-soft);width:1.3em;flex:none;font-size:.85em;}
.jrow .acc{font-weight:900;flex:1;letter-spacing:.03em;}
.jrow .amt{font-variant-numeric:tabular-nums;font-weight:700;min-width:5.2em;text-align:right;border-left:1.5px solid var(--rule);padding-left:.45rem;}
.jrow.cash .acc{color:var(--blue);}

/* 鑑定進度章格 */
.stamps{display:flex;gap:.4rem;justify-content:center;margin-top:.55rem;}
.slot{
  flex:1;max-width:120px;text-align:center;
  border:1.5px dashed var(--rule);border-radius:5px;
  padding:.3rem .2rem;font-size:.68rem;color:#B9C2CA;letter-spacing:.1em;
}
.slot.done{border-style:solid;border-color:var(--ok);color:var(--ok);font-weight:900;}
.slot.done .v{display:block;font-size:.92rem;margin-top:.1rem;}
.slot.bad{border-style:solid;border-color:var(--stamp);color:var(--stamp);font-weight:900;}
.slot.bad .v{display:block;font-size:.92rem;margin-top:.1rem;}
.slot.now{border-color:var(--ink);color:var(--ink);animation:blink 1s infinite alternate;}
@keyframes blink{to{opacity:.45;}}

/* 提問與選項 */
.qbar{font-size:.9rem;font-weight:700;letter-spacing:.08em;text-align:center;min-height:1.4em;}
.opts{display:grid;gap:.45rem;width:min(92vw,460px);grid-template-columns:repeat(2,1fr);}
.opts.n3{grid-template-columns:repeat(3,1fr);}
.opt{
  border:1.5px solid var(--c,var(--ink));border-radius:6px;background:#fff;
  color:var(--c,var(--ink));font-family:inherit;font-weight:900;
  font-size:clamp(.92rem,3.9vw,1.1rem);letter-spacing:.06em;
  padding:.7rem .2rem;cursor:pointer;
  transition:transform .1s ease, box-shadow .1s ease;
}
.opt small{display:block;font-size:.62rem;font-weight:500;color:var(--ink-soft);letter-spacing:.02em;margin-top:.12rem;}
.opt:active{transform:translateY(2px);box-shadow:0 2px 0 var(--c,var(--ink));}
.opt.wrongpick{animation:shake .4s;background:#FBE9E9;}
@keyframes shake{20%{transform:translateX(-8px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}

/* 大印章 */
.bigstamp{
  position:absolute;left:50%;top:38%;z-index:60;pointer-events:none;
  width:132px;height:132px;border:5px solid var(--stamp);border-radius:50%;
  color:var(--stamp);font-weight:900;font-size:1.5rem;letter-spacing:.08em;line-height:1.25;
  display:flex;align-items:center;justify-content:center;text-align:center;
  transform:translate(-50%,-50%) rotate(-13deg) scale(2.3);opacity:0;
  mix-blend-mode:multiply;
}
.bigstamp.show{animation:stampIn .34s cubic-bezier(.2,1.6,.4,1) forwards;}
@keyframes stampIn{to{transform:translate(-50%,-50%) rotate(-13deg) scale(1);opacity:.92;}}

.popup{position:absolute;left:50%;top:30%;z-index:80;font-weight:900;font-size:1.4rem;color:var(--ok);text-shadow:1.5px 1.5px 0 #fff;pointer-events:none;animation:pop 1s ease forwards;white-space:nowrap;}
@keyframes pop{from{opacity:1;transform:translate(-50%,0) scale(1);}30%{transform:translate(-50%,-12px) scale(1.15);}to{opacity:0;transform:translate(-50%,-56px);}}

.feedback{min-height:2.6em;text-align:center;font-size:.83rem;font-weight:500;color:var(--ink-soft);line-height:1.6;padding:0 .5rem;}
.feedback.err{color:var(--stamp);font-weight:700;}
.feedback.ok{color:var(--ok);font-weight:700;}
.feedback b{color:var(--ink);}

/* 覆蓋層 */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(248,246,239,.96);display:flex;align-items:center;justify-content:center;padding:1.1rem;}
.overlay.hidden{display:none;}
.panel{width:min(93vw,560px);max-height:92vh;overflow:auto;background:#fff;border:1.5px solid var(--ink);border-radius:8px;box-shadow:6px 6px 0 rgba(34,48,58,.15);padding:1.5rem 1.3rem;text-align:center;}
.panel h2{font-weight:900;font-size:1.4rem;letter-spacing:.14em;margin-bottom:.5rem;}
.panel p{font-size:.86rem;color:var(--ink-soft);line-height:1.75;margin-bottom:.8rem;}
.panel .big{font-size:2.5rem;font-weight:900;margin:.25rem 0 .1rem;font-variant-numeric:tabular-nums;}
.stats{display:flex;justify-content:center;gap:1.5rem;margin:.7rem 0 .9rem;font-size:.83rem;color:var(--ink-soft);flex-wrap:wrap;}
.stats b{display:block;font-size:1.25rem;color:var(--ink);font-variant-numeric:tabular-nums;}
button.btn{font-family:inherit;font-size:.94rem;font-weight:900;letter-spacing:.12em;padding:.68rem 1.35rem;margin:.22rem;background:var(--ink);color:#fff;border:none;border-radius:6px;cursor:pointer;}
button.btn.ghost-btn{background:#fff;color:var(--ink);border:1.5px solid var(--ink);}
button.btn:active{transform:translateY(2px);}
.mode-list{display:flex;flex-direction:column;gap:.5rem;margin:.35rem 0 .2rem;}
.mode-btn{display:flex;flex-direction:column;align-items:flex-start;text-align:left;border:1.5px solid var(--ink);border-radius:6px;background:#fff;cursor:pointer;padding:.7rem .95rem;font-family:inherit;color:var(--ink);}
.mode-btn:active{transform:translateY(2px);}
.mode-btn b{font-size:1rem;letter-spacing:.09em;}
.mode-btn span{font-size:.76rem;color:var(--ink-soft);margin-top:.13rem;line-height:1.5;}
.wrong-list{text-align:left;font-size:.83rem;line-height:1.9;margin:.35rem 0 .9rem;border-top:1px dashed var(--rule);padding-top:.55rem;}
.wrong-list .tag{font-weight:900;padding:.05em .45em;border-radius:3px;color:#fff;font-size:.7rem;margin-left:.4em;white-space:nowrap;}
input.txt{font-family:inherit;font-size:1rem;color:var(--ink);border:1.5px solid var(--ink);border-radius:6px;background:#fff;padding:.6rem .8rem;width:100%;margin:.2rem 0;text-align:center;}
.scorecard-box{border-top:1px dashed var(--rule);margin-top:.55rem;padding-top:.75rem;}
#scorecard-result img{width:100%;border:1px solid var(--rule);border-radius:6px;margin:.55rem 0 .2rem;}
.vcode-note{font-size:.76rem;color:var(--ink-soft);line-height:1.6;margin-top:.3rem;}
.verify-result{font-size:1.05rem;font-weight:900;letter-spacing:.14em;margin:.55rem 0;min-height:1.5em;}
.verify-result.ok{color:var(--ok);}
.verify-result.bad{color:var(--stamp);}

/* 錯題圖解 */
.diagram{
  border:1.5px solid var(--ink);border-radius:6px;background:#FCFCF9;
  padding:.6rem .7rem;margin:.5rem 0 .2rem;text-align:left;font-size:.8rem;line-height:1.7;
}
.diagram .dt{font-weight:900;letter-spacing:.1em;margin-bottom:.3rem;font-size:.85rem;}
.diagram .row{display:flex;gap:.4rem;align-items:flex-start;margin:.15rem 0;}
.diagram .k{font-weight:900;color:var(--ink-soft);flex:none;min-width:4.6em;}
.mark{padding:0 .2em;border-radius:2px;font-weight:900;}
.mark.cash{background:#DCE9FB;color:var(--blue);}
.mark.out{background:#FBE3E3;color:var(--stamp);}
.mark.cnt{background:#E6E0F3;color:var(--purple);}

.rule-card{border:1.5px solid var(--rule);border-radius:6px;padding:.55rem .7rem;margin-bottom:.7rem;font-size:.78rem;line-height:1.75;text-align:left;color:var(--ink-soft);}
.rule-card b{color:var(--ink);}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<header>
  <h1>交易鑑定所<small id="mode-label"></small></h1>
  <div class="scorebar">
    <span id="snd">🔊</span>
    <span>進度 <b id="prog-text">0/0</b></span>
    <span>得分 <b id="score-text">0</b></span>
    <span class="streak" id="streak-text"></span>
  </div>
</header>
<div class="progress"><i id="prog-bar"></i></div>

<main id="main">
  <div class="voucher" id="voucher">
    <div class="v-head"><span class="t">傳 票</span><span class="d" id="v-date">1月1日</span></div>
    <div class="v-desc" id="v-desc"></div>
    <div id="jrows"></div>
    <div class="stamps" id="stamps"></div>
  </div>
  <div class="qbar" id="qbar"></div>
  <div class="opts" id="opts"></div>
  <div class="bigstamp" id="bigstamp"></div>
  <div class="feedback" id="feedback"></div>
</main>

<!-- 開始 -->
<div class="overlay" id="ov-start">
  <div class="panel">
    <h2>交易鑑定所</h2>
    <div class="rule-card">
      <b>三種鑑定維度(互相獨立!)</b><br>
      ① <b>對象</b>:對外交易(涉及企業以外的人)/ 對內交易(調整、結帳、更正、火災損失)<br>
      ② <b>項目多寡</b>:簡單交易(一借一貸)/ 複雜交易(共三個以上會計項目)<br>
      ③ <b>是否涉及現金</b>:現金交易(僅一方有現金)/ 轉帳交易(完全沒現金)/ 混合交易(同一方有現金也有非現金)
    </div>
    <p style="margin-bottom:.5rem">先分項練習,再挑戰三重鑑定!</p>
    <div class="mode-list" id="mode-list"></div>
  </div>
</div>

<!-- 回合 -->
<div class="overlay hidden" id="ov-round">
  <div class="panel">
    <h2 id="round-title">第 1 回合完成</h2>
    <div class="stats">
      <span>本回合<b id="round-correct">0/5</b></span>
      <span>正確率<b id="round-acc">0%</b></span>
    </div>
    <button class="btn" id="btn-next">繼續鑑定</button>
  </div>
</div>

<!-- 結算 -->
<div class="overlay hidden" id="ov-end">
  <div class="panel">
    <h2 id="end-title">鑑定完成!</h2>
    <div class="big" id="end-score">0 分</div>
    <div class="stats">
      <span id="l1">答對<b id="end-correct">0</b></span>
      <span>正確率<b id="end-acc">0%</b></span>
      <span id="l3">最長連對<b id="end-streak">0</b></span>
    </div>
    <div class="wrong-list" id="end-wrong"></div>
    <div class="scorecard-box">
      <input class="txt" id="player-name" maxlength="20" placeholder="輸入班級座號姓名(例:商三乙15王小明)">
      <button class="btn ghost-btn" id="btn-make-card">產生鑑定證書 📸</button>
      <div id="scorecard-result"></div>
    </div>
    <button class="btn" id="btn-again">再玩一次</button>
    <button class="btn ghost-btn" id="btn-restart">回到首頁</button>
  </div>
</div>

<!-- 驗證 -->
<div class="overlay hidden" id="ov-verify">
  <div class="panel">
    <h2>證書驗證</h2>
    <p>依證書上的內容逐欄輸入,系統會核對驗證碼是否相符。</p>
    <input class="txt" id="v-name" placeholder="姓名">
    <input class="txt" id="v-mode" placeholder="模式">
    <input class="txt" id="v-score" placeholder="分數(例:186 分)">
    <input class="txt" id="v-dt" placeholder="日期時間(例:2026/07/16 14:32)">
    <input class="txt" id="v-code" placeholder="驗證碼(例:A3F9-K27B)">
    <div class="verify-result" id="verify-result"></div>
    <button class="btn" id="btn-verify">驗證</button>
    <button class="btn ghost-btn" id="btn-verify-close">關閉</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   交易題庫
   d:情境描述  dr:[[科目,金額],…] 借方  cr:貸方
   who:"對外"|"對內"
   分錄的簡單/複雜、現金/轉帳/混合由程式自動判斷
   ══════════════════════════════════════════════════════ */
const CASH=["現金","銀行存款","零用金"];
const TX=[
 /* 對外.簡單.轉帳 */
 {d:"賒購商品一批",dr:[["進貨",50000]],cr:[["應付帳款",50000]],who:"對外"},
 {d:"賒銷商品一批",dr:[["應收帳款",38000]],cr:[["銷貨收入",38000]],who:"對外"},
 {d:"收到客戶開來的支票抵償帳款",dr:[["應收票據",25000]],cr:[["應收帳款",25000]],who:"對外"},
 {d:"開立本票償還應付帳款",dr:[["應付帳款",42000]],cr:[["應付票據",42000]],who:"對外"},
 {d:"賒購辦公設備一台",dr:[["辦公設備成本",36000]],cr:[["應付設備款",36000]],who:"對外"},
 /* 對外.簡單.現金 */
 {d:"現購商品一批",dr:[["進貨",28000]],cr:[["現金",28000]],who:"對外"},
 {d:"現銷商品一批",dr:[["現金",45000]],cr:[["銷貨收入",45000]],who:"對外"},
 {d:"支付本月水電瓦斯費",dr:[["水電瓦斯費",4200]],cr:[["現金",4200]],who:"對外"},
 {d:"支付本月員工薪資",dr:[["薪資支出",86000]],cr:[["銀行存款",86000]],who:"對外"},
 {d:"收到銀行存款利息",dr:[["銀行存款",1500]],cr:[["利息收入",1500]],who:"對外"},
 {d:"收到本月店面租金收入",dr:[["現金",30000]],cr:[["租金收入",30000]],who:"對外"},
 {d:"支付廣告費",dr:[["廣告費",12000]],cr:[["現金",12000]],who:"對外"},
 {d:"以現金償還應付帳款",dr:[["應付帳款",50000]],cr:[["現金",50000]],who:"對外"},
 {d:"收到客戶償還的應收帳款",dr:[["現金",38000]],cr:[["應收帳款",38000]],who:"對外"},
 {d:"支付郵電費",dr:[["郵電費",860]],cr:[["現金",860]],who:"對外"},
 /* 對外.複雜.混合 */
 {d:"購進商品一批,半數付現、半數賒欠",dr:[["進貨",60000]],cr:[["現金",30000],["應付帳款",30000]],who:"對外"},
 {d:"購進商品並另付運費",dr:[["進貨",40000],["進貨費用",2000]],cr:[["現金",42000]],who:"對外"},
 {d:"業主投資現金與存貨開業",dr:[["現金",200000],["存貨",80000]],cr:[["業主資本",280000]],who:"對外"},
 {d:"償還應付帳款,享有進貨折讓",dr:[["應付帳款",50000]],cr:[["進貨折讓",1000],["現金",49000]],who:"對外"},
 {d:"銷貨部分收現、部分賒欠",dr:[["現金",20000],["應收帳款",30000]],cr:[["銷貨收入",50000]],who:"對外"},
 {d:"購買運輸設備,付現一部分餘額開票",dr:[["運輸設備成本",300000]],cr:[["現金",100000],["應付票據",200000]],who:"對外"},
 /* 對外.複雜.轉帳 */
 {d:"賒購商品並由對方賒欠運費",dr:[["進貨",30000],["進貨費用",1500]],cr:[["應付帳款",31500]],who:"對外"},
 {d:"客戶開票償還帳款,並沖銷部分折讓",dr:[["應收票據",28000],["銷貨折讓",2000]],cr:[["應收帳款",30000]],who:"對外"},
 /* 對內(調整、結帳、更正、災損) */
 {d:"年底調整:提列本期折舊",dr:[["折舊",25000]],cr:[["累計折舊—機器設備",25000]],who:"對內"},
 {d:"年底調整:認列已到期的應收利息",dr:[["應收收益",1200]],cr:[["利息收入",1200]],who:"對內"},
 {d:"年底調整:預付保險費已耗用部分轉列費用",dr:[["保險費",6000]],cr:[["預付費用",6000]],who:"對內"},
 {d:"年底調整:提列預期信用減損損失",dr:[["預期信用減損損失",3500]],cr:[["備抵損失—應收帳款",3500]],who:"對內"},
 {d:"年底調整:應付而未付的薪資",dr:[["薪資支出",18000]],cr:[["應付薪資",18000]],who:"對內"},
 {d:"年底調整:用品盤存耗用部分轉列費用",dr:[["文具用品",2400]],cr:[["用品盤存",2400]],who:"對內"},
 {d:"錯誤更正:誤記為修繕費,應為運輸設備成本",dr:[["運輸設備成本",15000]],cr:[["修繕費",15000]],who:"對內"},
 {d:"倉庫失火,商品全部損毀",dr:[["其他損失",70000]],cr:[["存貨",70000]],who:"對內"},
 {d:"結帳:將本期收益結轉本期損益",dr:[["銷貨收入",500000]],cr:[["本期損益",500000]],who:"對內"},
 {d:"結帳:將本期費損結轉本期損益",dr:[["本期損益",320000]],cr:[["銷貨成本",320000]],who:"對內"},
 {d:"年底調整:預收租金已實現部分轉列收入",dr:[["預收收入",9000]],cr:[["租金收入",9000]],who:"對內"},
 {d:"對內調整:攤銷本期專利權",dr:[["各項攤提",8000]],cr:[["累計攤銷—專利權",8000]],who:"對內"},
 /* 對內.複雜(打破「對內=簡單」的錯誤直覺)*/
 {d:"結帳:將銷貨收入與利息收入結轉本期損益",dr:[["銷貨收入",480000],["利息收入",6000]],cr:[["本期損益",486000]],who:"對內"},
 {d:"結帳:將各項費用結轉本期損益",dr:[["本期損益",95000]],cr:[["薪資支出",86000],["水電瓦斯費",9000]],who:"對內"},
 {d:"年底調整:同時提列折舊與攤銷",dr:[["折舊",25000],["各項攤提",8000]],cr:[["累計折舊—機器設備",25000],["累計攤銷—專利權",8000]],who:"對內"},
 {d:"錯誤更正:誤將預付費用與運費記錯",dr:[["預付費用",6000],["運費",1500]],cr:[["文具用品",7500]],who:"對內"},
 {d:"盤點發現現金短少,列為其他損失",dr:[["現金短溢(借餘)",800]],cr:[["現金",800]],who:"對內"},
 {d:"盤點發現現金溢出,列為其他收入",dr:[["現金",500]],cr:[["現金短溢(貸餘)",500]],who:"對內"}
];

/* 自動判斷三個維度 */
const isCash=n=>CASH.includes(n);
function analyze(t){
  const drN=t.dr.length, crN=t.cr.length;
  const cnt=drN+crN;
  const simple = cnt<=2 ? "簡單" : "複雜";
  const drCash=t.dr.some(a=>isCash(a[0])), crCash=t.cr.some(a=>isCash(a[0]));
  const drMix=drCash && t.dr.some(a=>!isCash(a[0]));
  const crMix=crCash && t.cr.some(a=>!isCash(a[0]));
  let cash;
  if(!drCash && !crCash) cash="轉帳";
  else if(drMix||crMix) cash="混合";
  else cash="現金";
  return {who:t.who, simple, cash, cnt};
}

/* ══ 模式 ══ */
const DIMS={
  who:{q:"這是對外交易還是對內交易?",opts:[["對外","涉及企業外部"],["對內","調整/結帳/更正"]],c:["#1D5FBF","#6B4FA3"],key:a=>a.who},
  simple:{q:"這是簡單交易還是複雜交易?",opts:[["簡單","一借一貸"],["複雜","三個項目以上"]],c:["#1E7F4F","#C77817"],key:a=>a.simple},
  cash:{q:"這筆交易涉及現金的情形?",opts:[["現金","一方有現金"],["轉帳","完全沒現金"],["混合","同方有現金與非現金"]],c:["#1D5FBF","#6B4FA3","#C1272D"],key:a=>a.cash}
};
const MODES={
  who:{label:"對象鑑定",dims:["who"],n:12},
  simple:{label:"項目多寡鑑定",dims:["simple"],n:12},
  cash:{label:"現金鑑定",dims:["cash"],n:12},
  full:{label:"三重鑑定",dims:["who","simple","cash"],n:10}
};
const modeName={who:"分項.對象鑑定",simple:"分項.項目多寡",cash:"分項.現金鑑定",full:"★ 三重鑑定"};
const modeDesc={
  who:"12 題:判斷對外交易 or 對內交易(調整、結帳、更正、災損都是對內)",
  simple:"12 題:數會計項目!一借一貸是簡單,三個以上是複雜",
  cash:"12 題:找現金在哪!沒現金=轉帳,同一方現金+非現金=混合",
  full:"10 筆傳票,每筆連判三關!三關全中才算完美鑑定,可拿滿分證書"
};
const SLOT_NAME={who:"對象",simple:"項目",cash:"現金"};
const ROUND=5;

/* ══ 狀態 ══ */
let mode="who", queue=[], idx=0, dimIdx=0, score=0, streak=0, maxStreak=0;
let perfect=0, wrongAll=[], roundCorrect=0, roundNo=1, locked=false;
let curT=null, curA=null, curErr=false, best=0;
let jm=1,jd=1;

const $=s=>document.querySelector(s);
const mainEl=$("#main"), fb=$("#feedback"), bigstamp=$("#bigstamp");

/* 音效 */
let AC=null, muted=false;
$("#snd").addEventListener("click",()=>{muted=!muted;$("#snd").textContent=muted?"🔇":"🔊";});
function beep(f,d=.09,t="square",v=.12){
  if(muted) return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
    o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const fmt=n=>n.toLocaleString();

/* 首頁 */
$("#mode-list").innerHTML=Object.keys(MODES).map(m=>
  `<button class="mode-btn" data-mode="${m}" ${m==="full"?'style="border-color:#C1272D"':""}>
     <b ${m==="full"?'style="color:#C1272D"':""}>${modeName[m]}</b><span>${modeDesc[m]}</span>
   </button>`).join("");
document.querySelectorAll(".mode-btn").forEach(b=>b.addEventListener("click",()=>start(b.dataset.mode)));

function start(m){
  mode=m;
  $("#mode-label").textContent=MODES[m].label;
  const pool=shuffle([...TX]);
  /* 分項模式盡量讓各答案平均出現 */
  if(m!=="full"){
    const dim=MODES[m].dims[0];
    const groups={};
    pool.forEach(t=>{const k=DIMS[dim].key(analyze(t));(groups[k]=groups[k]||[]).push(t);});
    const keys=Object.keys(groups), per=Math.ceil(MODES[m].n/keys.length);
    queue=shuffle(keys.flatMap(k=>groups[k].slice(0,per))).slice(0,MODES[m].n);
  }else{
    queue=pool.slice(0,MODES[m].n);
  }
  idx=0;score=0;streak=0;maxStreak=0;perfect=0;wrongAll=[];roundCorrect=0;roundNo=1;
  jm=1+Math.floor(Math.random()*12);jd=1+Math.floor(Math.random()*10);
  ["ov-start","ov-round","ov-end"].forEach(i=>$("#"+i).classList.add("hidden"));
  updateHUD();nextT();
}

function nextT(){
  if(idx>=queue.length){ end(); return; }
  curT=queue[idx]; curA=analyze(curT); dimIdx=0; locked=false; curErr=false;
  jd+=1+Math.floor(Math.random()*3); if(jd>28){jd-=28;jm=jm%12+1;}
  $("#v-date").textContent=`${jm}月${jd}日`;
  $("#v-desc").textContent="◆ "+curT.d;
  /* 逐行書寫動畫 */
  const rows=[
    ...curT.dr.map((a,i)=>({lbl:i===0?"借":"",acc:a[0],amt:a[1],cr:false})),
    ...curT.cr.map((a,i)=>({lbl:i===0?"貸":"",acc:a[0],amt:a[1],cr:true}))
  ];
  $("#jrows").innerHTML=rows.map(r=>
    `<div class="jrow${r.cr?" cr":""}${isCash(r.acc)?" cash":""}">
       <span class="lbl">${r.lbl}</span><span class="acc">${r.acc}</span><span class="amt">${fmt(r.amt)}</span>
     </div>`).join("");
  [...document.querySelectorAll(".jrow")].forEach((el,i)=>
    setTimeout(()=>{el.classList.add("show");beep(520+i*40,.05,"sine",.07);},i*150));
  /* 章格 */
  $("#stamps").innerHTML=MODES[mode].dims.map(d=>
    `<div class="slot" data-d="${d}">${SLOT_NAME[d]}<span class="v"></span></div>`).join("");
  fb.textContent="";fb.className="feedback";
  setTimeout(askDim, rows.length*150+150);
}

function askDim(){
  const d=MODES[mode].dims[dimIdx], D=DIMS[d];
  $("#qbar").textContent=`【${dimIdx+1}/${MODES[mode].dims.length}】${D.q}`;
  const el=$("#opts");
  el.className="opts"+(D.opts.length===3?" n3":"");
  el.innerHTML=D.opts.map((o,i)=>
    `<button class="opt" data-v="${o[0]}" style="--c:${D.c[i]}">${o[0]}<small>${o[1]}</small></button>`).join("");
  [...el.querySelectorAll(".opt")].forEach(b=>b.addEventListener("click",()=>pick(b,d,b.dataset.v)));
  document.querySelectorAll(".slot").forEach(s=>s.classList.toggle("now",s.dataset.d===d));
}

function pick(btn,dim,val){
  if(locked) return;
  const right=DIMS[dim].key(curA);
  const slot=document.querySelector(`.slot[data-d="${dim}"]`);
  slot.classList.remove("now");
  if(val===right){
    slot.classList.add("done");
    slot.querySelector(".v").textContent=right;
    beep(600+dimIdx*120,.09);
    score+=10;
    dimIdx++;
    if(dimIdx<MODES[mode].dims.length){ askDim(); updateHUD(); return; }
    finishT();
  }else{
    curErr=true;
    btn.classList.add("wrongpick");
    beep(150,.25,"sawtooth",.14);
    slot.classList.add("bad");
    slot.querySelector(".v").textContent=right;
    fb.innerHTML=diagram(dim);
    fb.className="feedback err";
    locked=true;
    setTimeout(()=>{
      locked=false;
      dimIdx++;
      if(dimIdx<MODES[mode].dims.length){ askDim(); }
      else finishT();
    },2600);
  }
}

/* 錯題圖解 */
function diagram(dim){
  const a=curA, t=curT;
  if(dim==="who"){
    const yes=a.who==="對外";
    return `<div class="diagram"><div class="dt">為什麼是<span class="mark out">${a.who}交易</span>?</div>
      <div class="row"><span class="k">看對象</span><span>${yes?"交易對象是<b>企業以外</b>的人(客戶、廠商、銀行)":"只在<b>企業內部</b>發生,沒有外人參與"}</span></div>
      <div class="row"><span class="k">關鍵字</span><span>${yes?"買賣、收付、借還 → 對外":"調整、結帳、更正、災損 → <b>對內</b>"}</span></div></div>`;
  }
  if(dim==="simple"){
    return `<div class="diagram"><div class="dt">為什麼是<span class="mark cnt">${a.simple}交易</span>?</div>
      <div class="row"><span class="k">數項目</span><span>借方 <b>${t.dr.length}</b> 個 + 貸方 <b>${t.cr.length}</b> 個 = 共 <b>${a.cnt}</b> 個會計項目</span></div>
      <div class="row"><span class="k">判斷</span><span>${a.cnt<=2?"剛好一借一貸(2 個)→ <b>簡單交易</b>":"達到 <b>3 個以上</b> → <b>複雜交易</b>"}</span></div></div>`;
  }
  const drc=t.dr.filter(x=>isCash(x[0])).map(x=>x[0]);
  const crc=t.cr.filter(x=>isCash(x[0])).map(x=>x[0]);
  const drAll=t.dr.map(x=>x[0]), crAll=t.cr.map(x=>x[0]);
  let why;
  if(a.cash==="轉帳") why="借貸雙方<b>都沒有現金項目</b> → 轉帳交易";
  else if(a.cash==="現金") why="只有<b>其中一方</b>出現現金,且那一方<b>僅有現金</b>一個項目 → 現金交易";
  else why="同一方<b>同時有現金和非現金</b>項目 → 混合交易";
  return `<div class="diagram"><div class="dt">為什麼是<span class="mark cash">${a.cash}交易</span>?</div>
    <div class="row"><span class="k">借方</span><span>${drAll.map(n=>isCash(n)?`<span class="mark cash">${n}</span>`:n).join("、")}</span></div>
    <div class="row"><span class="k">貸方</span><span>${crAll.map(n=>isCash(n)?`<span class="mark cash">${n}</span>`:n).join("、")}</span></div>
    <div class="row"><span class="k">判斷</span><span>${why}</span></div></div>`;
}

function finishT(){
  locked=true;
  $("#qbar").textContent="";
  $("#opts").innerHTML="";
  if(!curErr){
    streak++;maxStreak=Math.max(maxStreak,streak);perfect++;roundCorrect++;
    const bonus=mode==="full"?30:0;
    score+=bonus+Math.min(streak-1,5)*2;
    stamp(mode==="full"?"鑑定<br>通過":"正解");
    beep(660,.1);setTimeout(()=>beep(880,.12),90);
    if(mode==="full"){const p=document.createElement("div");p.className="popup";p.textContent="完美鑑定 +"+(30+bonus?bonus:0);mainEl.appendChild(p);setTimeout(()=>p.remove(),1000);}
    fb.innerHTML=`<b>${curA.who}交易</b>|<b>${curA.simple}交易</b>|<b>${curA.cash}交易</b>`;
    fb.className="feedback ok";
  }else{
    streak=0;
    wrongAll.push({d:curT.d,a:curA});
  }
  updateHUD();
  setTimeout(()=>{
    bigstamp.classList.remove("show");
    idx++;updateHUD();
    if(idx>=queue.length) end();
    else if(idx%ROUND===0) roundEnd();
    else nextT();
  }, curErr?900:1500);
}
function stamp(html){
  bigstamp.innerHTML=html;
  bigstamp.classList.remove("show");void bigstamp.offsetWidth;bigstamp.classList.add("show");
}
function updateHUD(){
  $("#prog-text").textContent=`${idx}/${queue.length}`;
  $("#score-text").textContent=score;
  $("#streak-text").textContent=streak>=3?`🔥 連對 ${streak}`:"";
  $("#prog-bar").style.width=(queue.length?idx/queue.length*100:0)+"%";
}
function roundEnd(){
  $("#round-title").textContent=`第 ${roundNo} 回合完成`;
  $("#round-correct").textContent=`${roundCorrect}/${ROUND}`;
  $("#round-acc").textContent=Math.round(perfect/idx*100)+"%";
  roundCorrect=0;roundNo++;
  $("#ov-round").classList.remove("hidden");
}
$("#btn-next").addEventListener("click",()=>{$("#ov-round").classList.add("hidden");nextT();});

function end(){
  $("#scorecard-result").innerHTML="";
  const acc=Math.round(perfect/queue.length*100);
  let rec="";
  if(score>best){best=score;rec="<b style='color:#E8A008'>🏆 新紀錄!</b><br>";beep(660,.1);setTimeout(()=>beep(880,.1),100);setTimeout(()=>beep(1320,.18),200);}
  else if(best>0) rec=`<b>目前最佳 ${best} 分,再挑戰一次破紀錄!</b><br>`;
  $("#end-title").textContent = acc===100 ? "🎉 完美鑑定師!" : "鑑定完成!";
  $("#end-score").textContent=score+" 分";
  $("#l1").firstChild.textContent = mode==="full"?"完美鑑定":"答對";
  $("#end-correct").textContent=`${perfect}/${queue.length}`;
  $("#end-acc").textContent=acc+"%";
  $("#end-streak").textContent=maxStreak;
  $("#end-wrong").innerHTML= rec + (wrongAll.length
    ? "<b>需要複習的交易:</b><br>"+wrongAll.map(w=>
        `${w.d}<span class="tag" style="background:#1D5FBF">${w.a.who}</span><span class="tag" style="background:#C77817">${w.a.simple}</span><span class="tag" style="background:#6B4FA3">${w.a.cash}</span>`).join("<br>")
    : "全部一次答對,鑑定神手!");
  $("#ov-end").classList.remove("hidden");
}
$("#btn-again").addEventListener("click",()=>start(mode));
$("#btn-restart").addEventListener("click",()=>{$("#ov-end").classList.add("hidden");$("#ov-start").classList.remove("hidden");});

/* ══ 證書與驗證(與其他遊戲同機制)══ */
const VSALT="CLVS-ACC-2026-桃";
function vcode(str){
  let h=5381,h2=52711;
  for(let i=0;i<str.length;i++){h=((h<<5)+h+str.charCodeAt(i))>>>0;}
  for(let i=str.length-1;i>=0;i--){h2=((h2*33)^str.charCodeAt(i))>>>0;}
  const s=(h.toString(36)+h2.toString(36)).toUpperCase().replace(/[^A-Z0-9]/g,"");
  return (s+"00000000").slice(0,8).replace(/^(.{4})(.{4})$/,"$1-$2");
}
$("#btn-make-card").addEventListener("click",async()=>{
  const name=$("#player-name").value.trim();
  if(!name){$("#player-name").style.borderColor="var(--stamp)";$("#player-name").placeholder="請先輸入姓名!";return;}
  $("#player-name").style.borderColor="";
  const d=new Date(),p=n=>String(n).padStart(2,"0");
  const dt=`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  const mName="交易鑑定所."+modeName[mode];
  const scoreTxt=$("#end-score").textContent.trim();
  const code=vcode(`${VSALT}|${name}|${mName}|${scoreTxt}|${dt}`);
  const s1=$("#end-correct").textContent.trim(),s2=$("#end-acc").textContent.trim(),s3=$("#end-streak").textContent.trim();
  try{await document.fonts.ready;}catch(e){}
  const W=1000,H=640,cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const g=cv.getContext("2d");
  g.fillStyle="#F8F6EF";g.fillRect(0,0,W,H);
  g.strokeStyle="#C9D6E8";g.lineWidth=1;
  for(let y=64;y<H;y+=44){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();}
  g.strokeStyle="#D65A5A";g.lineWidth=2;g.beginPath();g.moveTo(78,0);g.lineTo(78,H);g.stroke();
  g.strokeStyle="#22303A";g.lineWidth=3;g.strokeRect(14,14,W-28,H-28);
  g.textAlign="center";g.fillStyle="#22303A";
  g.font='900 46px "Noto Sans TC",sans-serif';g.fillText("交易鑑定所",W/2,88);
  g.font='700 22px "Noto Sans TC",sans-serif';g.fillStyle="#5B6B77";g.fillText("鑑 定 證 書",W/2,124);
  g.fillStyle="#22303A";g.font='900 40px "Noto Sans TC",sans-serif';g.fillText(name,W/2,196);
  g.font='700 24px "Noto Sans TC",sans-serif';g.fillStyle="#5B6B77";g.fillText(`模式:${mName}`,W/2,238);
  g.fillStyle="#22303A";g.font='900 110px "Noto Sans TC",sans-serif';g.fillText(scoreTxt,W/2,372);
  const L=[mode==="full"?"完美鑑定":"答對","正確率","最長連對"],V=[s1,s2,s3],X=[W/2-280,W/2,W/2+280];
  for(let i=0;i<3;i++){
    g.fillStyle="#5B6B77";g.font='500 20px "Noto Sans TC",sans-serif';g.fillText(L[i],X[i],428);
    g.fillStyle="#22303A";g.font='900 34px "Noto Sans TC",sans-serif';g.fillText(V[i],X[i],470);
  }
  g.fillStyle="#5B6B77";g.font='500 22px "Noto Sans TC",sans-serif';g.fillText(dt,W/2,530);
  g.fillStyle="#22303A";g.font='900 30px monospace';g.fillText(`驗證碼 ${code}`,W/2,576);
  g.save();g.translate(W-150,150);g.rotate(-.22);
  g.strokeStyle="rgba(193,39,45,.85)";g.lineWidth=6;g.beginPath();g.arc(0,0,74,0,Math.PI*2);g.stroke();
  g.fillStyle="rgba(193,39,45,.85)";g.font='900 40px "Noto Sans TC",sans-serif';
  g.fillText("鑑定",0,-4);g.fillText("通過",0,38);g.restore();
  const url=cv.toDataURL("image/png");
  $("#scorecard-result").innerHTML=
    `<img src="${url}" alt="鑑定證書">`+
    `<a class="btn ghost-btn" style="display:inline-block;text-decoration:none" href="${url}" download="鑑定證書_${name}.png">下載圖片</a>`+
    `<div class="vcode-note">手機可長按圖片儲存,再傳給老師。<br>驗證碼:<b>${code}</b></div>`;
});

if(location.hash==="#verify") openVerify();
