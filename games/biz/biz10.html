      { label:"進駐蝦皮商城!平台知名度高、瀏覽量大,馬上有人潮。", ok:true,

        fb:"這正是 O2O 離線商務模式:線上交易、線下消費,又稱線上線下模式、虛實整合——三個名字統測都認,還考過「以上皆是」!預購讓備貨精準、撲空客歸零,折扣碼也把線上流量帶起來了。", next:"s7" },

    ]
  },

    who:"第 9 話|報表上的岔路",
    text:`期末結算:阿嬤古早味穩定熱銷;上月試賣的「黑糖布朗尼」詢問度爆表;「抹茶戚風」卻乏人問津,食材一直過期報廢。阿哲攤開報表:「
      <span class="t" data-k="st">穩定</span>、
      <span class="t" data-k="gr">成長</span>、
      <span class="t" data-k="re">縮減</span>、
      <span class="t" data-k="mix">混合</span>——葛魯克的四條路,我們走哪條?」`,
    terms:[

      {k:"gr", term:"成長策略", en:"growth strategy", def:"藉由「擴充原產業或開發新事業」大幅提升經營績效,為多數企業「主要」的經營策略。例:星巴克計劃 2030 年前門市達 5.5 萬家。"},
      {k:"re", term:"縮減策略", en:"retrenchment strategy", def:"資金缺乏、營運不良、景氣不佳時,減少產品或服務以縮減規模、降低成本;為企業「最不願採行」的策略,如縮編、裁員。例:國泰航空裁員 8,500 人。"},

    ],
    choices:[
      { label:"全線加碼!三種口味通通加倍生產、廣告打好打滿。", ok:false,
        fb:"衝勁十足,但「成長策略」適合整體展望看好時全面擴充;現在三條產品線表現不均,資源全撒等於把錢也砸進賣不動的抹茶裡。修正:重開會議,重新分配資源。", next:"s10" },
      { label:"熱銷的穩定做、爆紅的加碼衝、賣不動的忍痛停產。", ok:true,
        fb:"漂亮!衡量不同部門(產品線)的表現、同時運用穩定+成長+縮減——這就是「混合策略」,王品集團的「汰弱留強」正是經典示範。四策略口訣:「好日穩、想衝成、缺錢縮、不平混」。", next:"s10" },
      { label:"全面縮編,只留最賺的一款,其他都收掉。", ok:false,
        fb:"「縮減策略」是資金缺乏、營運不良、景氣差時的止血手段,也是企業「最不願採行」的策略;你整體營運健康,只有單一產品疲軟,一刀全砍太傷。修正:只停抹茶線,其他照常。", next:"s10" },
      { label:"維持原樣就好,改來改去很累。", ok:false,
        fb:"「穩定策略」(溫和的成長策略)適合現況佳、環境穩定、各線表現平穩時;但你明明有爆品沒加碼、有賠錢貨在失血——放著不動,布朗尼的商機就被別攤搶走了。修正:阿哲把報表拍在桌上,兩人重新排兵布陣。", next:"s10" }
    ]
  },
  s10:{
    who:"第 10 話|抱枕的誘惑",
    text:`布朗尼產線穩定後,阿哲滑著統測考古題突然抬頭:「人家甜點工作室都出周邊商品了——我們也來做『阿嬤蛋糕造型抱枕』跟帆布袋啦!」跨出烘焙圈,這一步該不該踏?課本管這叫
      <span class="t" data-k="div">多角化經營</span>。`,
    terms:[
      {k:"div", term:"多角化經營", en:"diversification", def:"企業跨足其他領域以維持營運成長、擴大規模,讓資源發揮最大效益;最重要的目的是「分散風險」。例:統一企業從麵粉一路跨足食品、金融、物流、超商。"}
    ],
    choices:[
      { label:"小量試做!跨足周邊能分散風險,雞蛋別放同一個籃子。", ok:true,
        fb:"這就是「多角化經營」——跨足其他領域維持成長、擴大規模,而它「最重要的目的是分散風險」(統測愛考這句)。先小量試做更是穩健原則的展現;統一企業就是從麵粉一路多角化成食品龍頭。", next:"endg" },

        fb:"專注沒有錯,但想像一下:哪天雞蛋麵粉大漲、蛋糕毛利被吃光,周邊商品就是幫你撐現金流的第二隻腳——「分散風險」正是多角化的核心價值。修正:阿哲自掏腰包試做 10 個抱枕,上架三天完售,小芸眼睛都亮了。", next:"endg" }

  endg:{
    end:true,
    who:"最終話|畢業典禮",
    text:"畢業典禮那天,「阿嬤的古早味」粉專突破一萬追蹤。阿嬤看著小芸把課本名詞一個個變成真實的決策,笑瞇瞇地說:「阮孫仔,比電視上的董事長還厲害。」——平台、模式、支付、策略,這一章,你已經親手經營過一遍了。"
  }

/* ===== 引擎 ===== */
let cur="start", score=0, seen=0, dex={};
const $=id=>document.getElementById(id);
$("gtitle").textContent=GAME.title;

function collect(s){
  (s.terms||[]).forEach(t=>{ if(!dex[t.k]){ dex[t.k]=t; } });
  renderDex();
  if(Object.keys(dex).length>=TOTAL_TERMS){
    const b=$("dexbtn");
    b.innerHTML="📖 圖鑑 <span id='dexn'>"+TOTAL_TERMS+" / "+TOTAL_TERMS+"</span> 🎉 全收集!";
    b.style.background="#1f6f6b";
  }
}
function renderDex(){
  const arr=Object.values(dex);
  const n=$("dexn");
  if(n) n.textContent=arr.length+" / "+TOTAL_TERMS;
  $("dexlist").innerHTML=arr.map(t=>
    `<div class="entry"><b>${t.term}</b> <span class="en">${t.en}</span><br>${t.def}</div>`).join("")
    || "<div class='entry'>還沒有收集到名詞,回劇情裡找找看!</div>";
}
function hud(){
  $("prog").textContent=`進度 ${Math.min(seen,GAME.totalScenes)} / ${GAME.totalScenes}`;
  $("score").textContent=`決策分 ${score} / 10`;
  $("fill").style.width=(Math.min(seen,GAME.totalScenes)/GAME.totalScenes*100)+"%";
}
function show(id){
  cur=id; const s=SCENES[id]; seen++; collect(s); hud();
  if(s.end){ return ending(s); }
  $("main").innerHTML=`
    <div class="scene">
      <div class="who">${s.who||""}</div>
      <div>${s.text}</div>
      <div class="chips">${(s.terms||[]).map(t=>`<span class="chip">${t.term} ${t.en}</span>`).join("")}</div>
      <div class="choices">${s.choices.map((c,i)=>`<button data-i="${i}">${c.label}</button>`).join("")}</div>
      <div id="fbslot"></div>
    </div>`;
  document.querySelectorAll(".choices button").forEach(b=>b.onclick=()=>pick(+b.dataset.i));
}
function pick(i){
  const c=SCENES[cur].choices[i];
  if(c.ok) score++;
  hud();
  document.querySelectorAll(".choices button").forEach(b=>b.disabled=true);
  $("fbslot").innerHTML=`
    <div class="fb ${c.ok?"ok":"no"}">
      <span class="tag">${c.ok?"✔ 好決策!":"✘ 等等,這樣行不通"}</span>${c.fb}
      <br><button id="go">繼續 →</button>
    </div>`;
  $("go").onclick=()=>show(c.next);
}
function ending(s){
  let title, comment;
  if(score>=9){ title="🏆 金牌店長"; comment="你幾乎每個決策都踩在概念的甜蜜點上——統測遇到情境題,就用今天這套直覺作答!"; }
  else if(score>=6){ title="🌱 穩健小老闆"; comment="大方向都對,少數概念還會滑手。回頭把答錯那幾關的解析再讀一次,你就是金牌。"; }
  else { title="📚 見習生再出發"; comment="別灰心,每個解析都是重點整理。帶著圖鑑再玩一輪,這次換你當老闆!"; }
  $("main").innerHTML=`
    <div class="scene end">
      <div class="who">${s.who||""}</div>
      <div style="text-align:left">${s.text}</div>
      <div class="score">${title}|決策分 ${score} / 10</div>
      <div>${comment}</div>
      <ul>
        <li>自我檢核:三種電商平台(自行管理/租用/第三方大型)的優缺點,我說得出來</li>
        <li>B2B、B2C、C2B、C2C——我會「先看誰對誰,再看誰主動」</li>
        <li>四種行動支付:「票只儲、支全能、三方代、卡不沾」,含感應方式與主管機關</li>
        <li>O2O=線上交易、線下消費=虛實整合,三個名字都認得</li>
        <li>業際整合、策略聯盟、策略性外包、多角化,我分得出差別</li>
        <li>葛魯克四策略適用時機:「好日穩、想衝成、缺錢縮、不平混」</li>
        <li>打開名詞圖鑑(22 個),每個名詞不看定義也講得出意思</li>
      </ul>
      <button onclick="location.reload()">再玩一次</button>
    </div>`;
}
/* 名詞點擊與圖鑑開關 */
document.addEventListener("click",e=>{
  const t=e.target.closest(".t");
  if(t){ const d=dex[t.dataset.k]; if(d) alert(`${d.term}(${d.en})\n\n${d.def}`); }
});
$("dexbtn").onclick=()=>$("overlay").classList.add("show");
$("overlay").onclick=e=>{ if(e.target.id==="overlay") $("overlay").classList.remove("show"); };

show("start");
</script>
</body>
