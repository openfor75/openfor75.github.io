<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boba Lab 創業大冒險｜商概 CH2 互動學習遊戲</title>
<style>
  :root{
    --ink:#241812;          /* 黑糖 */
    --paper:#FBF4E6;        /* 鮮奶 */
    --amber:#E8A33D;        /* 黑糖琥珀 */
    --amber-deep:#C57F1D;
    --pearl:#3B2A20;        /* 珍珠棕 */
    --matcha:#6E9A4E;       /* 正確 */
    --berry:#C44E43;        /* 錯誤 */
    --tea:#8A5A33;
    --cream-line:#E3D3B8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(232,163,61,.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(138,90,51,.14), transparent 45%),
      var(--ink);
    color:var(--paper);
    min-height:100%;
    display:flex;justify-content:center;
    padding:16px;
  }
  .app{width:100%;max-width:680px;display:flex;flex-direction:column;gap:12px;}

  /* ── HUD ── */
  .hud{
    display:flex;align-items:center;gap:14px;
    background:rgba(59,42,32,.55);
    border:1px solid rgba(232,163,61,.35);
    border-radius:16px;padding:10px 14px;
    backdrop-filter:blur(4px);
  }
  .hud .brand{font-weight:900;letter-spacing:.05em;font-size:.95rem;color:var(--amber);white-space:nowrap;}
  .meters{display:flex;gap:12px;flex:1;min-width:0;}
  .meter{flex:1;min-width:0;}
  .meter label{font-size:.72rem;opacity:.85;display:flex;justify-content:space-between;}
  .bar{height:8px;background:rgba(0,0,0,.45);border-radius:6px;overflow:hidden;margin-top:3px;}
  .bar i{display:block;height:100%;border-radius:6px;transition:width .5s ease;}
  #cashBar i{background:linear-gradient(90deg,#C57F1D,#F2C063);}
  #repBar i{background:linear-gradient(90deg,#7A4C8F,#C79BD8);}

  /* ── 珍奶進度杯（簽名元件）── */
  .cup{position:relative;width:44px;height:58px;flex-shrink:0;}
  .cup .glass{
    position:absolute;inset:0;
    border:2px solid var(--amber);
    border-top-width:3px;
    border-radius:6px 6px 14px 14px;
    background:rgba(251,244,230,.07);
    overflow:hidden;
  }
  .cup .tealevel{
    position:absolute;left:0;right:0;bottom:0;height:0%;
    background:linear-gradient(180deg,rgba(232,163,61,.85),rgba(138,90,51,.95));
    transition:height .8s ease;
  }
  .cup .straw{
    position:absolute;top:-10px;left:50%;width:7px;height:22px;
    background:var(--berry);border-radius:3px;
    transform:translateX(-50%) rotate(8deg);
  }
  .cup .pearls{position:absolute;left:0;right:0;bottom:2px;height:16px;display:flex;justify-content:center;gap:2px;align-items:flex-end;}
  .cup .pearls b{width:7px;height:7px;border-radius:50%;background:var(--pearl);opacity:0;transform:translateY(6px);transition:all .5s ease;}
  .cup .pearls b.on{opacity:1;transform:translateY(0);}
  .cup .cupLabel{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--amber);white-space:nowrap;}

  /* ── 場景卡 ── */
  .stage{
    background:var(--paper);color:var(--pearl);
    border-radius:20px;
    padding:22px 20px 20px;
    box-shadow:0 12px 32px rgba(0,0,0,.45), inset 0 0 0 1px var(--cream-line);
    animation:pop .35s ease;
  }
  @keyframes pop{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  .chapterTag{
    display:inline-block;background:var(--pearl);color:var(--amber);
    font-size:.72rem;font-weight:800;letter-spacing:.15em;
    padding:4px 12px;border-radius:999px;margin-bottom:10px;
  }
  h1{font-size:1.7rem;font-weight:900;line-height:1.3;color:var(--ink);}
  h2{font-size:1.25rem;font-weight:900;margin-bottom:8px;color:var(--ink);}
  .speaker{
    display:flex;align-items:center;gap:8px;margin:12px 0 6px;
    font-weight:800;color:var(--tea);font-size:.92rem;
  }
  .speaker .ava{
    width:34px;height:34px;border-radius:50%;
    background:var(--amber);color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-size:1.05rem;flex-shrink:0;border:2px solid var(--pearl);
  }
  .bubble{
    background:#fff;border:1px solid var(--cream-line);
    border-radius:4px 16px 16px 16px;
    padding:12px 14px;font-size:.98rem;line-height:1.75;
  }
  .narr{font-size:.95rem;line-height:1.8;margin:10px 0;}
  .vocab{
    display:inline-block;background:rgba(232,163,61,.18);
    border:1px dashed var(--amber-deep);color:var(--amber-deep);
    font-size:.78rem;font-weight:700;padding:1px 7px;border-radius:6px;
    margin:0 2px;white-space:nowrap;
  }
  .kw{font-weight:900;color:var(--berry);}

  /* ── 選項 ── */
  .choices{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
  .choice{
    text-align:left;font:inherit;cursor:pointer;
    background:#fff;border:2px solid var(--cream-line);
    border-radius:12px;padding:12px 14px;
    font-size:.95rem;line-height:1.6;color:var(--pearl);
    transition:transform .12s ease, border-color .12s ease, background .12s;
  }
  .choice:hover{border-color:var(--amber);transform:translateX(4px);}
  .choice:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}
  .choice .en{font-size:.75rem;color:var(--tea);font-weight:700;}
  .choice.correct{background:#EAF3E1;border-color:var(--matcha);}
  .choice.wrong{background:#F8E4E1;border-color:var(--berry);opacity:.85;}
  .choice:disabled{cursor:default;transform:none;}

  /* ── 回饋 ── */
  .feedback{
    margin-top:14px;border-radius:12px;padding:13px 15px;
    font-size:.92rem;line-height:1.75;animation:pop .3s ease;
  }
  .feedback.ok{background:#EAF3E1;border-left:5px solid var(--matcha);}
  .feedback.no{background:#F8E4E1;border-left:5px solid var(--berry);}
  .feedback b{color:var(--ink);}
  .delta{font-weight:900;font-size:.85rem;margin-top:6px;display:block;color:var(--tea);}

  .btn{
    font:inherit;font-weight:900;cursor:pointer;
    background:var(--pearl);color:var(--amber);
    border:none;border-radius:12px;
    padding:13px 26px;font-size:1rem;letter-spacing:.08em;
    margin-top:16px;display:inline-block;
    transition:transform .12s ease;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}
  .btn.ghost{background:transparent;color:var(--pearl);border:2px solid var(--pearl);}

  /* ── 分類小遊戲 ── */
  .sortItem{
    background:#fff;border:2px solid var(--cream-line);border-radius:12px;
    padding:12px 14px;margin-top:12px;font-size:.95rem;line-height:1.6;
  }
  .sortBtns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .sortBtns .choice{flex:1;min-width:110px;text-align:center;padding:9px 8px;font-weight:800;}
  .progressDots{display:flex;gap:6px;margin-top:10px;}
  .progressDots i{width:10px;height:10px;border-radius:50%;background:var(--cream-line);}
  .progressDots i.done{background:var(--matcha);}
  .progressDots i.miss{background:var(--berry);}

  /* ── 結局 ── */
  .grade{
    font-size:3.2rem;font-weight:900;color:var(--amber-deep);
    text-align:center;margin:10px 0 2px;letter-spacing:.1em;
  }
  .gradeTitle{text-align:center;font-weight:900;font-size:1.15rem;color:var(--ink);margin-bottom:12px;}
  .recap{margin-top:14px;border-top:2px dashed var(--cream-line);padding-top:12px;font-size:.9rem;line-height:1.8;}
  .recap h3{font-size:.95rem;color:var(--tea);margin:10px 0 4px;}
  .statRow{display:flex;justify-content:space-around;text-align:center;margin-top:8px;}
  .statRow .n{font-size:1.5rem;font-weight:900;color:var(--ink);}
  .statRow .l{font-size:.75rem;color:var(--tea);}

  .titleArt{text-align:center;margin:6px 0 14px;}
  .titleArt .cupBig{font-size:4rem;line-height:1;}
  .subT{color:var(--tea);font-size:.9rem;margin-top:8px;line-height:1.7;}
  footer{text-align:center;font-size:.72rem;opacity:.55;padding:4px 0 10px;}
</style>
</head>
<body>
<div class="app">
  <!-- HUD -->
  <div class="hud" id="hud" style="display:none">
    <span class="brand">BOBA LAB</span>
    <div class="meters">
      <div class="meter" id="cashBar"><label><span>💰 資金 Capital</span><span id="cashV">50</span></label><div class="bar"><i style="width:50%"></i></div></div>
      <div class="meter" id="repBar"><label><span>⭐ 商譽 Reputation</span><span id="repV">50</span></label><div class="bar"><i style="width:50%"></i></div></div>
    </div>
    <div class="cup" aria-label="章節進度">
      <div class="straw"></div>
      <div class="glass"><div class="tealevel" id="teaLevel"></div></div>
      <div class="pearls"><b id="p1"></b><b id="p2"></b><b id="p3"></b><b id="p4"></b></div>
      <div class="cupLabel" id="cupLabel">開店前</div>
    </div>
  </div>

  <div class="stage" id="stage"></div>
  <footer>商業概論 CH2《企業家精神與創業》互動學習遊戲｜對應統測命題重點</footer>
</div>

<script>
/* ───────────── 遊戲狀態 ───────────── */
const S = { cash:50, rep:50, correct:0, total:0, chapter:0, scene:0 };
const stage = document.getElementById('stage');

function clamp(v){ return Math.max(0, Math.min(100, v)); }
function setMeters(dc, dr){
  S.cash = clamp(S.cash + dc); S.rep = clamp(S.rep + dr);
  document.querySelector('#cashBar i').style.width = S.cash + '%';
  document.querySelector('#repBar i').style.width = S.rep + '%';
  document.getElementById('cashV').textContent = S.cash;
  document.getElementById('repV').textContent = S.rep;
}
function setCup(n){ // n = 已完成章節數 0~4
  document.getElementById('teaLevel').style.height = (n*23) + '%';
  const labels = ['開店前','2.1 完成','2.2 完成','2.3 完成','全章完成!'];
  document.getElementById('cupLabel').textContent = labels[n];
  for(let i=1;i<=4;i++) document.getElementById('p'+i).classList.toggle('on', i<=n);
}
function deltaText(dc,dr){
  const parts=[];
  if(dc) parts.push(`💰資金 ${dc>0?'+':''}${dc}`);
  if(dr) parts.push(`⭐商譽 ${dr>0?'+':''}${dr}`);
  return parts.length? parts.join('　') : '';
}

/* ───────────── 通用渲染 ───────────── */
function render(html){ stage.innerHTML = html; stage.scrollIntoView({behavior:'smooth',block:'start'}); }
function esc(s){ return s; }

/* 劇情頁：tag, title, blocks(html), btnText, next */
function storyScene(o){
  render(`
    <span class="chapterTag">${o.tag}</span>
    ${o.title? `<h2>${o.title}</h2>`:''}
    ${o.body}
    <button class="btn" onclick="${o.next}">${o.btn||'繼續 ▶'}</button>
  `);
}

/* 單選題：answered 後顯示解析 + 繼續鈕 */
function quizScene(o){
  const opts = o.options.map((op,i)=>`
    <button class="choice" data-i="${i}" onclick="answerQuiz(${i})">
      ${op.t}${op.en? `<div class="en">${op.en}</div>`:''}
    </button>`).join('');
  render(`
    <span class="chapterTag">${o.tag}</span>
    ${o.body||''}
    <h2 style="margin-top:12px">${o.q}</h2>
    <div class="choices">${opts}</div>
    <div id="fb"></div>
  `);
  window.__quiz = o;
}
function answerQuiz(i){
  const o = window.__quiz, op = o.options[i], ok = !!op.ok;
  S.total++; if(ok) S.correct++;
  document.querySelectorAll('.choice').forEach((b,idx)=>{
    b.disabled = true;
    if(o.options[idx].ok) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const dc = ok ? (o.gain?.[0]??5) : (o.lose?.[0]??-5);
  const dr = ok ? (o.gain?.[1]??5) : (o.lose?.[1]??-5);
  setMeters(dc,dr);
  document.getElementById('fb').innerHTML = `
    <div class="feedback ${ok?'ok':'no'}">
      <b>${ok?'✅ 答對了！':'❌ 差一點！'}</b>　${op.fb || o.explain}
      ${!ok && o.explain? `<br>${o.explain}`:''}
      <span class="delta">${deltaText(dc,dr)}</span>
    </div>
    <button class="btn" onclick="${o.next}">繼續 ▶</button>`;
}

/* 連續分類小遊戲 */
function sortGame(o){
  window.__sort = { ...o, idx:0, results:[] };
  renderSortItem();
}
function renderSortItem(){
  const g = window.__sort, it = g.items[g.idx];
  const dots = g.items.map((_,i)=>{
    const r = g.results[i];
    return `<i class="${r===true?'done':r===false?'miss':''}"></i>`;
  }).join('');
  const btns = g.cats.map((c,ci)=>`
    <button class="choice" onclick="answerSort(${ci})">${c.t}${c.en?`<div class="en">${c.en}</div>`:''}</button>`).join('');
  render(`
    <span class="chapterTag">${g.tag}</span>
    <h2>${g.title}</h2>
    <div class="narr">${g.intro}</div>
    <div class="sortItem"><b>事件 ${g.idx+1}／${g.items.length}：</b>${it.t}</div>
    <div class="sortBtns">${btns}</div>
    <div class="progressDots">${dots}</div>
    <div id="fb"></div>
  `);
}
function answerSort(ci){
  const g = window.__sort, it = g.items[g.idx], ok = ci===it.a;
  S.total++; if(ok) S.correct++;
  g.results[g.idx] = ok;
  const dc = ok?4:-4, dr = ok?3:-4;
  setMeters(dc,dr);
  document.querySelectorAll('.sortBtns .choice').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===it.a) b.classList.add('correct');
    else if(idx===ci) b.classList.add('wrong');
  });
  const last = g.idx === g.items.length-1;
  document.getElementById('fb').innerHTML = `
    <div class="feedback ${ok?'ok':'no'}">
      <b>${ok?'✅ 正確！':'❌ 不對喔！'}</b>　${it.fb}
      <span class="delta">${deltaText(dc,dr)}</span>
    </div>
    <button class="btn" onclick="${last? g.next : 'nextSortItem()'}">${last?'完成本關 ▶':'下一個事件 ▶'}</button>`;
}
function nextSortItem(){ window.__sort.idx++; renderSortItem(); }

/* ───────────── 開場 ───────────── */
function start(){
  render(`
    <div class="titleArt"><div class="cupBig">🧋</div></div>
    <span class="chapterTag">商業概論 CH2 互動冒險</span>
    <h1>Boba Lab 創業大冒險</h1>
    <div class="subT">
      你是剛從<b>應用英文科</b>畢業的「阿芸」。看好手搖飲＋跨境電商的浪潮，
      你決定創立自己的珍奶品牌 <b>Boba Lab</b>，目標是把台灣珍奶賣到全世界。<br><br>
      從「一個人」到「一間店」，你將親身經歷課本 2.1 → 2.4 的每一個關鍵抉擇：
      <b>企業家特質、創業方式、風險與保險、危機處理、SWOT 策略</b>。<br><br>
      💰資金與 ⭐商譽會隨你的決策起伏——右上角的珍奶杯，就是你的創業進度。<br>
      準備好了嗎？
    </div>
    <button class="btn" onclick="hudOn();ch1_1()">🧋 開始創業 START</button>
  `);
}
function hudOn(){ document.getElementById('hud').style.display='flex'; setCup(0); }

/* ───────────── 第一章：企業家精神（2.1） ───────────── */
function ch1_1(){
  storyScene({
    tag:'第一章｜你是那塊料嗎？（2.1 企業家精神）',
    title:'深夜的頂樓',
    body:`
      <div class="narr">
        畢業前夕，你在頂樓跟死黨阿哲說出計畫。他潑了你一桶冷水：
      </div>
      <div class="speaker"><span class="ava">😏</span>阿哲</div>
      <div class="bubble">「珍奶店滿街都是，你憑什麼？有錢人開店叫投資，你這叫送頭吧。」</div>
      <div class="narr">
        你想起課本說的：經濟學家<b>熊彼得 (Schumpeter)</b> 認為企業家是進行
        <span class="kw">創造性破壞</span> <span class="vocab">creative destruction</span> 的人——
        把舊玩法打掉，<b>重新組合生產要素</b>。你不是要「再開一間一樣的店」，
        你要做的是「不一樣」。這就是<span class="vocab">entrepreneurship 企業家精神</span>。
      </div>`,
    next:'ch1_2()'
  });
}
function ch1_2(){
  quizScene({
    tag:'第一章｜特質判定 ①',
    body:`
      <div class="narr">你回答阿哲：</div>
      <div class="speaker"><span class="ava">🧋</span>阿芸（你）</div>
      <div class="bubble">「我觀察半年了——外國觀光客都在找『可以寄回國的珍奶』。
      我要做<b>常溫珍珠奶茶組合包</b>，搭配英文教學影片賣到海外。這個市場現在還沒人卡位，我要先佈局！」</div>`,
    q:'「察覺趨勢、先於對手佈局」——你展現了哪一種企業家特質？',
    options:[
      {t:'(A) 創新性', en:'Innovation', fb:''},
      {t:'(B) 預警性（前瞻性）', en:'Foresight', ok:true, fb:'對市場具<b>高度敏銳性</b>、能先於對手佈局＝預警性。統測考過郭台銘同款題！'},
      {t:'(C) 自主性', en:'Autonomy'},
      {t:'(D) 風險承擔性', en:'Risk-taking'}
    ],
    explain:'關鍵字「察覺未來趨勢、事先佈局」→ <b>預警性</b>。若題目強調「重組要素做出新東西」才是創新性。',
    next:'ch1_3()'
  });
}
function ch1_3(){
  quizScene({
    tag:'第一章｜特質判定 ②',
    body:`
      <div class="narr">
        阿哲繼續嗆：「萬一賠光呢？」你深吸一口氣：
      </div>
      <div class="speaker"><span class="ava">🧋</span>阿芸</div>
      <div class="bubble">「商業環境本來就充滿不確定。我把打工三年的積蓄都押上了——
      賠了我認，但不試我會後悔一輩子。」</div>`,
    q:'這段話展現的核心特質是？',
    options:[
      {t:'(A) 風險承擔性', en:'Risk-taking', ok:true, fb:'具備<b>冒險精神、勇於承擔風險</b>。⚠️ 統測陷阱字：企業家是風險「承擔」性，不是風險「趨避」性！'},
      {t:'(B) 競爭積極性', en:'Competitiveness'},
      {t:'(C) 預警性', en:'Foresight'},
      {t:'(D) 可溝通性', en:'Communicability', fb:'這是「企業願景」的特質，混進來騙你的！'}
    ],
    explain:'面對不確定性仍勇於投入＝<b>風險承擔性</b>（113 統測石斑魚題同款：風險承擔與堅持）。',
    next:'ch1_4()'
  });
}
function ch1_4(){
  quizScene({
    tag:'第一章｜熊彼得五創新',
    body:`
      <div class="narr">
        你研發出「<b>冷萃常溫珍珠保存技術</b>」，讓珍珠不冰也 Q 彈 30 天——這是全台首創。
        阿哲終於閉嘴，改口叫你「熊彼得接班人」。
      </div>`,
    q:'「冷萃常溫珍珠保存技術」屬於熊彼得五種創新模式中的哪一種？',
    options:[
      {t:'(A) 生產新產品', en:'new product'},

/* ───────────── 結局 ───────────── */
function ending(){
  const rate = S.total? Math.round(S.correct/S.total*100):0;
  const score = Math.round(rate*0.5 + S.cash*0.25 + S.rep*0.25);
  let grade, title;
  if(score>=90){grade='S';title='傳奇創業家｜熊彼得看了都想投資你';}
  else if(score>=75){grade='A';title='明日之星｜統測 SWOT 題已是你的送分題';}
  else if(score>=60){grade='B';title='潛力新秀｜再複習一輪口訣就能封頂';}
  else {grade='C';title='熱血學徒｜重玩一次，資金商譽都會回來！';}
  render(`
    <span class="chapterTag">創業成績單 FINAL REPORT</span>
    <div class="grade">${grade}</div>
    <div class="gradeTitle">${title}</div>
    <div class="statRow">
      <div><div class="n">${S.correct}/${S.total}</div><div class="l">答對題數</div></div>
      <div><div class="n">${S.cash}</div><div class="l">💰 最終資金</div></div>
      <div><div class="n">${S.rep}</div><div class="l">⭐ 最終商譽</div></div>
    </div>
    <div class="recap">
      <h3>🗺 你走過的知識地圖（CH2 一條龍）</h3>
      2.1 誰來創業 → 五特質（自創瘋魚競）、熊彼得五創新（產雞料理事務所）<br>
      2.2 怎麼開始 → SOHO 兩把尺、房東房客獲利表、內部「經資合」外部「市法災」<br>
      2.3 怎麼防護 → 三大責任險一秒分、危機六原則（積極真統治責任靈活扛）、三階段<br>
      2.4 怎麼走遠 → 願景五特質、SWOT（先內外再利弊）、四策略（兩好衝兩壞縮）
      <h3>📖 本遊戲出現的應英必背字</h3>
      entrepreneur · innovation · risk-taking · creative destruction · SOHO · freelancer ·
      e-commerce · insurance · liability · claim · crisis management · vision ·
      SWOT (Strengths / Weaknesses / Opportunities / Threats) · strategic alliance · expand · diversify · downsize
    </div>
    <div style="text-align:center">
      <button class="btn" onclick="location.reload()">🔄 再創業一次</button>
    </div>
  `);
}

start();
