   ============================================================ */
const GAME = { title:"嬤嬤辣創業記|CH9 商業法律", totalScenes:13, passLine:9 };
const TOTAL_TERMS = 23;

const SCENES = {
  start:{

    text:`高三的小澄把阿嬤的祖傳辣醬帶去園遊會,一小時完售,同學瘋狂敲碗「開店啦!」。
      創業第一題:這罐配方要怎麼受法律保護——去申請
      <span class="t" data-k="patent">專利權</span>,還是把它當

    terms:[

      {k:"tsecret", term:"營業秘密", en:"trade secret", def:"可用於生產、銷售或經營的方法、技術、製程、配方等資訊;免申請註冊,三要件持續存在即受永久保護。"}
    ],
    choices:[
      { label:"申請發明專利!拿到 20 年獨家保護,超安心。", ok:false,

      { label:"學可口可樂:不申請、不公開,把配方當營業秘密守住。", ok:true,

  },
  s2:{

    text:`決定走營業秘密路線後,問題來了:阿嬤的配方筆記就貼在廚房牆上,連鄰居阿姨都看得到。

    choices:[
      { label:"口頭交代大家「不要說出去」就好,自己人不會背叛。", ok:false,

      { label:"配方鎖進保險箱、員工簽保密契約、關鍵比例只有小澄和阿嬤各知一半。", ok:true,

  },
  s3:{

    choices:[
      { label:"先上市搶市場,商標之後再補登記。", ok:false,

  },
  s4:{

    text:`架設官網需要美食照。阿哲在美食部落格看到一張超誘人的辣椒特寫,順手就想抓下來用;

      {k:"repro", term:"重製", en:"reproduction", def:"著作財產權之一;未經授權複製他人的圖文影音,就是侵害重製權。"},

    choices:[
      { label:"網路上的圖大家都在抓,先用再說。", ok:false,

  s5:{

    text:`準備量產上架,包裝設計稿有兩版。行銷鬼才阿哲的 A 版印著大大的「吃了感冒秒好、抗癌聖品」……

    choices:[
      { label:"用 A 版!療效聽起來超猛,一定大賣。", ok:false,
        fb:"直接踩線——<b>食安法規定食品不得為「醫療效能」之標示、宣傳或廣告</b>,巴西堅果廣告喊「抗癌」就被認定違規。劇情修正:主管機關來函警告,包裝全面重印,小澄含淚記帳。", next:"s6" },

/* ===== 引擎 ===== */
let cur="start", score=0, seen=0, dex={};
const $=id=>document.getElementById(id);
$("gtitle").textContent=GAME.title;

function collect(s){ (s.terms||[]).forEach(t=>{ if(!dex[t.k]){ dex[t.k]=t; } }); renderDex(); }
function renderDex(){
  const arr=Object.values(dex);
  $("dexn").textContent=arr.length+"/"+TOTAL_TERMS;
  $("dexbtn").firstChild.textContent=(arr.length>=TOTAL_TERMS?"🏆 圖鑑全收集!":"📖 名詞圖鑑 ");
  $("dexlist").innerHTML=(arr.length>=TOTAL_TERMS?"<div class='entry' style='background:#e6f2ec'><b>🏆 恭喜!23 個法律名詞全數收集完成。</b><br>試試看:每一個都能不看定義說出意思嗎?</div>":"")
    + (arr.map(t=>
    `<div class="entry"><b>${t.term}</b> <span class="en">${t.en}</span><br>${t.def}</div>`).join("")
    || "<div class='entry'>還沒有收集到名詞,回劇情裡找找看!</div>");
}
function hud(){
  $("prog").textContent=`進度 ${Math.min(seen,GAME.totalScenes)} / ${GAME.totalScenes}`;
  $("score").textContent=`決策分 ${score}`;
  $("fill").style.width=(Math.min(seen,GAME.totalScenes)/GAME.totalScenes*100)+"%";
}
function show(id){
  cur=id; const s=SCENES[id]; seen++; collect(s); hud();
  if(s.end){ return ending(s); }
  $("main").innerHTML=`
    <div class="scene">
      <div class="who">${s.who||""}</div>
      <div>${s.text}</div>
      <div class="chips">${(s.terms||[]).map(t=>`<span class="chip">${t.term} ${t.en}</span>`).join("")}</div>
      <div class="choices">${s.choices.map((c,i)=>`<button data-i="${i}">${c.label}</button>`).join("")}</div>
      <div id="fbslot"></div>
    </div>`;
  window.scrollTo(0,0);
  document.querySelectorAll(".choices button").forEach(b=>b.onclick=()=>pick(+b.dataset.i));
}
function pick(i){
  const c=SCENES[cur].choices[i];
  if(c.ok) score++;
  hud();
  document.querySelectorAll(".choices button").forEach(b=>b.disabled=true);
  $("fbslot").innerHTML=`
    <div class="fb ${c.ok?"ok":"no"}">
      <span class="tag">${c.ok?"✔ 好決策!":"✘ 等等,這樣有法律風險"}</span>${c.fb}
      <br><button id="go">繼續 →</button>
    </div>`;
  $("go").onclick=()=>show(c.next);
}
function ending(s){
  const total=GAME.totalScenes-1;
  const passed=score>=GAME.passLine;
  $("main").innerHTML=`
    <div class="scene end">
      <div class="who">${s.who||""}</div>
      <div style="text-align:left">${s.text}</div>
      <div class="score">決策分 ${score} / ${total}</div>
      <div>${passed?"你已經有守法經營者的思維了!":"再玩一次,把每則解析裡的粗體字看清楚——那些就是考點。"}</div>
      <ul>${(s.check||[]).map(x=>`<li>${x}</li>`).join("")}</ul>
      <ul><li>最後自我檢核:打開📖名詞圖鑑,每個名詞你能不看定義說出意思嗎?</li></ul>
      <button onclick="location.reload()">再玩一次</button>
    </div>`;
}
/* 名詞點擊與圖鑑開關 */
document.addEventListener("click",e=>{
  const t=e.target.closest(".t");
  if(t){ const d=dex[t.dataset.k]; if(d) alert(`${d.term}(${d.en})\n\n${d.def}`); }
});
$("dexbtn").onclick=()=>$("overlay").classList.add("show");
$("overlay").onclick=e=>{ if(e.target.id==="overlay") $("overlay").classList.remove("show"); };

show("start");
</script>
