<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃記柑仔店轉型記｜商業現代化機能 互動學習遊戲</title>
<style>
  :root{
    --night:#0E1630;      /* 深夜街區 */
    --night2:#16223F;     /* 卡片底 */
    --sign:#FFC53D;       /* 招牌黃 */
    --neon:#FF4F8B;       /* 霓虹粉 */
    --mint:#3EE0B0;       /* 通過綠 */
    --cream:#F7F1E3;      /* 米白字 */
    --dim:#8B97B8;        /* 次要字 */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--night);
    color:var(--cream);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei","Heiti TC",sans-serif;
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px;margin:0 auto;padding:20px 16px 56px;}

  /* ── 霓虹招牌（signature element）── */
  .signboard{
    border:3px solid var(--sign);
    border-radius:14px;
    padding:18px 14px 14px;
    text-align:center;
    position:relative;
    background:
      radial-gradient(ellipse at 50% -20%, rgba(255,197,61,.18), transparent 60%),
      var(--night2);
    box-shadow:0 0 22px rgba(255,197,61,.25), inset 0 0 18px rgba(255,197,61,.08);
    margin-bottom:18px;
  }
  .signboard .shopname{
    font-size:1.7rem;font-weight:900;letter-spacing:.35em;text-indent:.35em;
    color:var(--sign);
    text-shadow:0 0 8px rgba(255,197,61,.8),0 0 24px rgba(255,197,61,.45);
    animation:flicker 6s infinite;
  }
  .signboard .shopsub{font-size:.8rem;color:var(--dim);letter-spacing:.2em;margin-top:4px;}
  .signboard .bulbs{position:absolute;top:-9px;left:14px;right:14px;display:flex;justify-content:space-between;}
  .signboard .bulbs i{width:8px;height:8px;border-radius:50%;background:var(--sign);box-shadow:0 0 6px var(--sign);}
  @keyframes flicker{0%,93%,96%,100%{opacity:1;}94%,95%{opacity:.55;}}
  @media (prefers-reduced-motion: reduce){
    .signboard .shopname{animation:none;}
    *{transition:none !important;}
  }

  /* ── 狀態列 ── */
  .hud{display:flex;gap:8px;margin-bottom:16px;font-size:.82rem;}
  .hud .chip{flex:1;background:var(--night2);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 10px;text-align:center;}
  .hud .chip b{display:block;font-size:1.05rem;color:var(--sign);}
  .bar{height:8px;background:var(--night2);border-radius:99px;overflow:hidden;margin-bottom:20px;border:1px solid rgba(255,255,255,.07);}
  .bar > span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--neon),var(--sign));transition:width .4s ease;}

  /* ── 卡片 ── */
  .card{background:var(--night2);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:20px 18px;margin-bottom:16px;}
  .stagegate{border-color:var(--neon);box-shadow:0 0 18px rgba(255,79,139,.18);}
  .eyebrow{font-size:.72rem;letter-spacing:.28em;color:var(--neon);font-weight:700;margin-bottom:8px;}
  .story{font-size:.95rem;color:var(--cream);}
  .story em{color:var(--sign);font-style:normal;font-weight:700;}
  .qtext{font-size:1.02rem;font-weight:800;margin:14px 0 12px;}
  .opts{display:flex;flex-direction:column;gap:9px;}
  .opts button{
    text-align:left;font-size:.93rem;color:var(--cream);
    background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.13);
    border-radius:11px;padding:12px 14px;cursor:pointer;line-height:1.5;
    transition:border-color .15s, background .15s;
    font-family:inherit;
  }
  .opts button:hover{border-color:var(--sign);}
  .opts button:focus-visible{outline:2px solid var(--sign);outline-offset:2px;}
  .opts button.correct{border-color:var(--mint);background:rgba(62,224,176,.12);}
  .opts button.wrong{border-color:var(--neon);background:rgba(255,79,139,.12);}
  .opts button:disabled{cursor:default;}

  .verdict{margin-top:14px;font-weight:800;font-size:.95rem;}
  .verdict.ok{color:var(--mint);}
  .verdict.no{color:var(--neon);}

  /* 知識卡 */
  .kcard{
    margin-top:12px;border-radius:12px;padding:14px;
    background:linear-gradient(135deg, rgba(255,197,61,.10), rgba(255,79,139,.08));
    border:1px dashed var(--sign);
  }
  .kcard .kterm{font-weight:900;color:var(--sign);font-size:.98rem;}
  .kcard .ken{font-size:.8rem;color:var(--mint);letter-spacing:.04em;margin:2px 0 6px;}
  .kcard .knote{font-size:.87rem;color:var(--cream);}

  .next{
    display:block;width:100%;margin-top:16px;
    background:var(--sign);color:#241A00;font-weight:900;font-size:1rem;
    border:none;border-radius:12px;padding:13px;cursor:pointer;letter-spacing:.15em;
    font-family:inherit;
  }
  .next:focus-visible{outline:2px solid var(--cream);outline-offset:2px;}
  .ghost{background:transparent;color:var(--sign);border:2px solid var(--sign);}

  .shopface{font-size:2.4rem;text-align:center;margin:6px 0 2px;letter-spacing:.1em;}
  .stagetitle{font-size:1.25rem;font-weight:900;color:var(--sign);margin:6px 0 8px;}
  .hidden{display:none;}

  /* 結局 */
  .rank{font-size:1.5rem;font-weight:900;color:var(--sign);text-align:center;margin:8px 0;}
  .review li{font-size:.86rem;margin:6px 0 6px 18px;color:var(--dim);}
  .review li b{color:var(--cream);}
  footer{margin-top:26px;text-align:center;font-size:.72rem;color:var(--dim);letter-spacing:.1em;}
</style>
</head>
<body>
<div class="wrap">

  <div class="signboard">
    <div class="bulbs"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>

  <div class="hud">
    <div class="chip">現代化指數<b id="score">0</b></div>

  <div id="stage"></div>

  <footer>商業概論・第 3 章 商業現代化機能｜桃記柑仔店轉型記</footer>

/* ───────────── 遊戲引擎 ───────────── */
const TOTAL = CHAPTERS.reduce((s,c)=>s+c.questions.length,0);
let ch=0, qi=-1, score=0, streak=0, done=0;
const missed=[];

const $ = id=>document.getElementById(id);
const stage = $("stage");

function hud(){
  $("score").textContent = score;
  $("streak").textContent = streak;
  $("prog").textContent = done+" / "+TOTAL;
  $("barfill").style.width = (done/TOTAL*100)+"%";
}
function setSign(){
  $("signName").textContent = CHAPTERS[ch].sign;
  $("signSub").textContent = CHAPTERS[ch].sub;
}
function esc(s){return s;}

function showIntro(){
  setSign();
  const c = CHAPTERS[ch];
  stage.innerHTML = `
    <div class="card stagegate">
      <div class="shopface">${c.face}</div>
      <div class="eyebrow">STAGE ${ch} ／ ${TOTAL} 題挑戰</div>
      <div class="stagetitle">${c.title}</div>
      <p class="story">${c.intro}</p>
      <button class="next" id="go">${ch===0?"接下鑰匙，開始經營":"進入本關"}</button>
    </div>`;
  $("go").onclick = ()=>{ qi=0; showQ(); };
}

function showQ(){
  const c = CHAPTERS[ch], item = c.questions[qi];
  stage.innerHTML = `
    <div class="card">
      <div class="eyebrow">${c.title.split("｜")[0]}・第 ${qi+1} 題</div>
      <p class="story">${item.story}</p>
      <p class="qtext">${item.q}</p>
      <div class="opts" id="opts">
        ${item.opts.map((o,i)=>`<button data-i="${i}">${"ABCD"[i]}. ${o}</button>`).join("")}
      </div>
      <div id="fb"></div>
    </div>`;
  document.querySelectorAll("#opts button").forEach(b=>{
    b.onclick = ()=>answer(parseInt(b.dataset.i,10));
  });
}

function answer(i){
  const c = CHAPTERS[ch], item = c.questions[qi];
  const ok = i===item.ans;
  done++;
  if(ok){ score+=5; streak++; if(streak>0 && streak%4===0) score+=2; }
  else { streak=0; missed.push(item); }
  hud();

  document.querySelectorAll("#opts button").forEach((b,bi)=>{
    b.disabled = true;
    if(bi===item.ans) b.classList.add("correct");
    else if(bi===i) b.classList.add("wrong");
  });

  $("fb").innerHTML = `
    <div class="verdict ${ok?"ok":"no"}">${ok?"✔ 答對了！現代化指數 +5"+(streak%4===0&&streak>0?"（連對加成 +2）":""):"✘ 差一點——正解是 "+"ABCD"[item.ans]+"。看完知識卡再出發！"}</div>
    <div class="kcard">
      <div class="kterm">📇 知識卡｜${item.term}</div>
      <div class="ken">${item.en}</div>
      <div class="knote">${item.note}</div>
    </div>
    <button class="next" id="nx">${nextLabel()}</button>`;
  $("nx").onclick = advance;
  $("nx").focus();
}

function nextLabel(){
  const last = qi===CHAPTERS[ch].questions.length-1;
  if(!last) return "下一題";
  return ch===CHAPTERS.length-1 ? "看看店變成什麼樣子" : "本關完成，前進下一關";
}

function advance(){
  if(qi < CHAPTERS[ch].questions.length-1){ qi++; showQ(); return; }
  if(ch < CHAPTERS.length-1){ ch++; qi=-1; showIntro(); return; }
  showEnd();
}

function showEnd(){
  const max = TOTAL*5;
  const pct = score/max;
  let face,rank,msg;
  if(pct>=0.85){ face="🌆"; rank="桃記智慧商店 CEO"; msg="五流全開、政策法規倒背如流——阿嬤在門口偷偷抹眼淚。統測第 3 章，穩了。"; }
  else if(pct>=0.6){ face="🏪"; rank="桃記超商 店長"; msg="店已成功轉型！少數觀念還會打滑，把下方複習清單掃過一輪就能封頂。"; }
  else { face="🏚️"; rank="柑仔店 見習生"; msg="轉型之路才剛開始。別灰心——把知識卡與複習清單讀熟，再挑戰一次！"; }

  $("signName").textContent = pct>=0.85?"桃記智慧商店":(pct>=0.6?"桃記超商":"桃記柑仔店");
  $("signSub").textContent = "經營成果結算";

  stage.innerHTML = `
    <div class="card stagegate">
      <div class="shopface">${face}</div>
      <div class="eyebrow">FINAL RESULT</div>
      <div class="rank">${rank}</div>
      <p class="story" style="text-align:center">現代化指數 <em>${score}</em>／${max}<br>${msg}</p>
      ${missed.length?`
      <div class="kcard" style="margin-top:16px">
        <div class="kterm">📚 回家複習清單（本局答錯的觀念）</div>
        <ul class="review">
          ${missed.map(m=>`<li><b>${m.term}</b>（${m.en}）— ${m.note}</li>`).join("")}
        </ul>
      </div>`:`
      <div class="kcard" style="margin-top:16px">
        <div class="kterm">🎉 全數答對，零錯題！</div>
        <div class="knote">建議直接挑戰課本「統測聚焦」歷屆試題，做最後驗收。</div>
      </div>`}
      <button class="next" id="again">再開一間分店（重新挑戰）</button>
      <button class="next ghost" id="recap" style="margin-top:10px">五流 30 秒總複習</button>
    </div>`;
  $("again").onclick = ()=>{ ch=0;qi=-1;score=0;streak=0;done=0;missed.length=0;hud();showIntro(); };
  $("recap").onclick = showRecap;
}

function showRecap(){
  stage.innerHTML = `
    <div class="card">
      <div class="eyebrow">30-SECOND RECAP</div>
      <div class="stagetitle">一筆網購，五流全開</div>
      <p class="story">
        成交（<em>商流</em>＝所有權移轉，一切交易的基礎）→
        出貨（<em>物流</em>＝實體流通，核心是運輸配送、關鍵是自動化）→
        付錢（<em>金流</em>＝資金流通，首重安全性）→
        留數據（<em>資訊流</em>＝條碼是身分證、POS 對客人、EOS 訂貨、EDI 文件）→
        顧售後（<em>服務流</em>＝無同逝變、RATER、CRM 蒐儲分應）。<br><br>
        政策面別忘了：主管機關是<em>經濟部商業發展署</em>，簽約看 <em>30</em>、網購悔 <em>7</em>、台灣條碼 <em>471</em>。
      </p>
      <button class="next" id="back">回到結算畫面</button>
    </div>`;
  $("back").onclick = showEnd;
}

hud();
showIntro();
</script>
