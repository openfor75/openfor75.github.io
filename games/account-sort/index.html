<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>會計項目分類挑戰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F8F6EF;
  --rule:#C9D6E8;
  --margin-red:#D65A5A;
  --ink:#22303A;
  --ink-soft:#5B6B77;
  --stamp:#C1272D;
  --card-w:min(88vw,440px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(90deg, transparent 0, transparent 2.4rem, var(--margin-red) 2.4rem, var(--margin-red) calc(2.4rem + 1.5px), transparent calc(2.4rem + 1.5px)),
    repeating-linear-gradient(0deg, transparent 0, transparent 27px, var(--rule) 27px, var(--rule) 28px);
  display:flex;flex-direction:column;
  overflow:hidden;
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}

/* ── 頁首 ── */
header{
  padding:.7rem 1rem .4rem;
  display:flex;align-items:baseline;justify-content:space-between;gap:.6rem;flex-wrap:wrap;
}
h1{
  font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;
  font-size:clamp(1.05rem,4.3vw,1.5rem);letter-spacing:.12em;
}
h1 small{font-size:.6em;font-weight:600;color:var(--ink-soft);letter-spacing:.15em;margin-left:.4em;}
.scorebar{display:flex;gap:1rem;font-size:.85rem;font-weight:500;color:var(--ink-soft);}
.scorebar b{color:var(--ink);font-variant-numeric:tabular-nums;}
.streak{color:var(--stamp);font-weight:700;}

.progress{height:6px;margin:0 1rem;border:1px solid var(--rule);border-radius:3px;overflow:hidden;background:#fff;}
.progress i{display:block;height:100%;width:0;background:var(--ink);transition:width .3s ease;}

/* ── 主區:卡片 ── */
main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;}
.deck-hint{position:absolute;top:6%;font-size:.78rem;color:var(--ink-soft);letter-spacing:.12em;text-align:center;width:100%;pointer-events:none;padding:0 1rem;}

.card{
  width:var(--card-w);
  background:#fff;
  border:1.5px solid var(--ink);
  border-radius:6px;
  box-shadow:4px 4px 0 rgba(34,48,58,.15), 8px 8px 0 rgba(34,48,58,.07);
  padding:1.5rem 1.1rem 1.1rem;
  text-align:center;
  cursor:grab;
  position:relative;
  touch-action:none;
}
.card.dragging{opacity:0;}
.card .no{
  position:absolute;top:.55rem;left:.8rem;
  font-size:.7rem;color:var(--ink-soft);letter-spacing:.1em;font-variant-numeric:tabular-nums;
}
.card .contra{
  position:absolute;top:.45rem;right:.7rem;
  font-size:.65rem;font-weight:700;color:var(--stamp);
  border:1px solid var(--stamp);border-radius:3px;padding:.1em .4em;letter-spacing:.15em;
  display:none;
}
.card .name{
  font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;
  font-size:clamp(1.5rem,7vw,2.2rem);
  letter-spacing:.06em;line-height:1.4;
  padding:.6rem 0 .4rem;
  min-height:3.2em;
  display:flex;align-items:center;justify-content:center;
}
.card .name.long{font-size:clamp(1.15rem,5.2vw,1.65rem);letter-spacing:.03em;}
.card .name.xl{font-size:clamp(.95rem,4.3vw,1.3rem);letter-spacing:0;}
.card .ask{font-size:.78rem;color:var(--ink-soft);letter-spacing:.22em;}

/* 拖曳中的漂浮卡 */
.ghost{
  position:fixed;z-index:50;pointer-events:none;
  transform:translate(-50%,-50%) rotate(-2deg) scale(.92);
  transition:none;
}

/* 印章 */
.stamp-seal{
  position:absolute;left:50%;top:50%;z-index:60;pointer-events:none;
  width:110px;height:110px;border:4px solid var(--stamp);border-radius:50%;
  color:var(--stamp);font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;font-size:2rem;letter-spacing:.1em;
  display:flex;align-items:center;justify-content:center;
  transform:translate(-50%,-50%) rotate(-12deg) scale(2.2);opacity:0;
  mix-blend-mode:multiply;
}
.stamp-seal.show{animation:stampIn .35s cubic-bezier(.2,1.6,.4,1) forwards;}
@keyframes stampIn{to{transform:translate(-50%,-50%) rotate(-12deg) scale(1);opacity:.9;}}
.card.wrong-shake{animation:shake .4s;}
@keyframes shake{20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}

.feedback{
  position:absolute;bottom:5%;width:100%;text-align:center;
  font-size:.85rem;font-weight:500;color:var(--ink-soft);min-height:1.4em;
  padding:0 1rem;pointer-events:none;
}
.feedback.err{color:var(--stamp);font-weight:700;}

/* ── 類別置放區 ── */
.bins{
  display:grid;grid-template-columns:repeat(5,1fr);gap:.45rem;
  padding:.6rem .7rem calc(.8rem + env(safe-area-inset-bottom));
}
.bins.n3{grid-template-columns:repeat(3,1fr);max-width:520px;margin:0 auto;width:100%;}
.bins.n2{grid-template-columns:repeat(2,1fr);max-width:460px;margin:0 auto;width:100%;}
.bins.n7{grid-template-columns:repeat(4,1fr);gap:.4rem;}
.bin{
  --c:var(--ink);
  border:1.5px solid var(--c);
  border-radius:6px;
  background:#fff;
  color:var(--c);
  padding:.6rem .1rem .45rem;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:transform .12s ease, box-shadow .12s ease;
}
.bin .cn{font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;font-size:clamp(1rem,4.2vw,1.35rem);letter-spacing:.15em;display:block;white-space:nowrap;}
.bins.n7 .bin .cn{font-size:clamp(.8rem,3.4vw,1.05rem);letter-spacing:.05em;}
.bins.contra{grid-template-columns:1fr minmax(100px,30%);gap:.5rem;align-items:stretch;}
.elem-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;}
.nat-grid{display:grid;grid-template-columns:1fr;gap:.4rem;}
.bins.contra .bin{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.45rem .1rem;}
.bins.contra .bin .cn{font-size:clamp(.95rem,4vw,1.2rem);letter-spacing:.12em;}
.bin-elem.sel{background:var(--c);color:#fff;box-shadow:0 3px 0 var(--c);transform:translateY(-2px);}
.bin-elem.sel .key{color:#fff;opacity:.7;}

/* ── 街機模式:會計方塊 ── */
.card.fall{
  position:absolute;width:min(46vw,215px);
  padding:.7rem .5rem .85rem;cursor:pointer;
  box-shadow:3px 3px 0 rgba(34,48,58,.18);
  z-index:10;
}
.card.fall.wide{width:min(80vw,340px);}
.card.fall.tfclaim{width:auto;min-width:130px;padding:.55rem 1rem .7rem;}
.card.fall.tfclaim .name{font-size:1.45rem;letter-spacing:.12em;min-height:0;padding:.05rem 0;}
.tf-quest{
  position:absolute;top:.5rem;left:50%;transform:translateX(-50%);
  width:min(88vw,430px);z-index:15;text-align:center;
  background:#fff;border:1.5px solid var(--ink);border-radius:6px;
  box-shadow:3px 3px 0 rgba(34,48,58,.15);
  padding:.6rem .8rem .5rem;
}
.tf-quest .tq-name{font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;line-height:1.35;}
.tf-quest .tq-cap{font-size:.7rem;color:var(--ink-soft);letter-spacing:.2em;margin-top:.2rem;}
.card.fall .name{font-size:1.05rem;min-height:0;padding:.1rem 0;line-height:1.3;}
.card.fall .name.long{font-size:.88rem;}
.card.fall .name.xl{font-size:.74rem;}
.card.fall::after{
  content:"";position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
  border:7px solid transparent;border-top-color:var(--ink);border-bottom:0;
}
.stack-block{
  position:absolute;border-radius:4px;color:#fff;font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  white-space:nowrap;padding:0 .3em;z-index:5;
  box-shadow:0 1px 0 rgba(0,0,0,.25);
}
.danger-line{position:absolute;left:0;right:0;border-top:2px dashed var(--stamp);opacity:.45;pointer-events:none;}
.levelup{
  position:absolute;left:50%;top:36%;transform:translate(-50%,-50%);
  font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;font-size:1.7rem;color:var(--stamp);
  letter-spacing:.25em;pointer-events:none;opacity:0;z-index:70;white-space:nowrap;
}
.levelup.show{animation:lvl 1s ease forwards;}
@keyframes lvl{10%{opacity:1;transform:translate(-50%,-60%) scale(1.12);}75%{opacity:1;}100%{opacity:0;transform:translate(-50%,-95%);}}
.pause-btn{
  position:absolute;top:.4rem;right:.6rem;z-index:20;
  font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.1em;
  padding:.35rem .7rem;border:1.5px solid var(--ink);border-radius:5px;
  background:#fff;color:var(--ink);cursor:pointer;
}
input.txt{
  font-family:inherit;font-size:1rem;color:var(--ink);
  border:1.5px solid var(--ink);border-radius:6px;background:#fff;
  padding:.6rem .8rem;width:100%;margin:.2rem 0;text-align:center;
}
input.txt:focus{outline:2px solid var(--rule);}
.scorecard-box{border-top:1px dashed var(--rule);margin-top:.6rem;padding-top:.8rem;}
#scorecard-result img{width:100%;border:1px solid var(--rule);border-radius:6px;margin:.6rem 0 .2rem;}
.vcode-note{font-size:.78rem;color:var(--ink-soft);line-height:1.6;margin-top:.3rem;}
.verify-result{font-size:1.1rem;font-weight:900;letter-spacing:.15em;margin:.6rem 0;min-height:1.5em;}
.verify-result.ok{color:#1E7F4F;}
.verify-result.bad{color:var(--stamp);}
.bin .key{font-size:.6rem;opacity:.55;letter-spacing:.1em;}
.bin .cnt{
  position:absolute;top:-9px;right:-6px;
  background:var(--c);color:#fff;border-radius:9px;
  font-size:.62rem;font-weight:700;padding:.1em .45em;min-width:1.5em;
  font-variant-numeric:tabular-nums;
}
.bin.hover,.bin:active{transform:translateY(-3px);box-shadow:0 4px 0 var(--c);background:color-mix(in srgb,var(--c) 8%, #fff);}

/* ── 覆蓋層 ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(248,246,239,.96);
  display:flex;align-items:center;justify-content:center;
  padding:1.2rem;
}
.overlay.hidden{display:none;}
.panel{
  width:min(92vw,560px);max-height:90vh;overflow:auto;
  background:#fff;border:1.5px solid var(--ink);border-radius:8px;
  box-shadow:6px 6px 0 rgba(34,48,58,.15);
  padding:1.6rem 1.4rem;text-align:center;
}
.panel h2{font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:.15em;margin-bottom:.6rem;}
.panel p{font-size:.88rem;color:var(--ink-soft);line-height:1.8;margin-bottom:.9rem;}
.panel .big{font-family:'Noto Sans TC','LINE Seed TW',sans-serif;font-size:2.6rem;font-weight:900;letter-spacing:.05em;margin:.3rem 0 .1rem;font-variant-numeric:tabular-nums;}
.stats{display:flex;justify-content:center;gap:1.6rem;margin:.8rem 0 1rem;font-size:.85rem;color:var(--ink-soft);flex-wrap:wrap;}
.stats b{display:block;font-size:1.3rem;color:var(--ink);font-variant-numeric:tabular-nums;}
button.btn{
  font-family:inherit;font-size:.95rem;font-weight:700;letter-spacing:.12em;
  padding:.7rem 1.4rem;margin:.25rem;
  background:var(--ink);color:#fff;border:none;border-radius:6px;cursor:pointer;
}
button.btn.ghost-btn{background:#fff;color:var(--ink);border:1.5px solid var(--ink);}
button.btn:active{transform:translateY(2px);}
.mode-list{display:flex;flex-direction:column;gap:.55rem;margin:.4rem 0 .2rem;}
.mode-btn{
  display:flex;flex-direction:column;align-items:flex-start;text-align:left;
  border:1.5px solid var(--ink);border-radius:6px;background:#fff;cursor:pointer;
  padding:.75rem 1rem;font-family:inherit;color:var(--ink);
  transition:transform .12s ease, box-shadow .12s ease;
}
.mode-btn:active{transform:translateY(2px);}
.mode-btn b{font-size:1.02rem;letter-spacing:.1em;}
.mode-btn span{font-size:.78rem;color:var(--ink-soft);margin-top:.15rem;line-height:1.5;}
.wrong-list{
  text-align:left;font-size:.85rem;line-height:2;margin:.4rem 0 1rem;
  border-top:1px dashed var(--rule);padding-top:.6rem;
}
.wrong-list span.tag{font-weight:700;padding:.05em .45em;border-radius:3px;color:#fff;font-size:.72rem;margin-left:.5em;white-space:nowrap;}
.legend{display:flex;flex-wrap:wrap;gap:.4rem .9rem;justify-content:center;font-size:.8rem;margin-bottom:.8rem;}
.legend i{display:inline-block;width:.75em;height:.75em;border-radius:2px;margin-right:.3em;}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;}
}
@media (min-width:700px){
  .bins{max-width:780px;margin:0 auto;width:100%;}
  .bins.n7{grid-template-columns:repeat(7,1fr);}
}
</style>
</head>
<body>

<header>
  <h1>會計項目分類挑戰<small id="mode-label"></small></h1>
  <div class="scorebar">
    <span>進度 <b id="prog-text">0/0</b></span>
    <span>答對 <b id="score-text">0</b></span>
    <span class="streak" id="streak-text"></span>
  </div>
</header>
<div class="progress"><i id="prog-bar"></i></div>

<main id="main">
  <div class="deck-hint" id="deck-hint">把卡片拖到正確類別,或直接點類別按鈕</div>
  <div class="card" id="card" style="visibility:hidden">
    <span class="no" id="card-no"></span>
    <span class="contra" id="card-contra"></span>
    <div class="name" id="card-name"></div>
    <div class="ask" id="card-ask">這個會計項目屬於哪一類?</div>
  </div>
  <div class="stamp-seal" id="seal">正解</div>
  <div class="feedback" id="feedback"></div>
</main>

<div class="bins" id="bins"></div>

<!-- 開始畫面 -->
<div class="overlay" id="ov-start">
  <div class="panel">
    <h2>會計項目分類挑戰</h2>
    <p style="margin-bottom:.5rem">題庫依《會計項目彙總》編製,每 10 題一回合。<br>拖曳卡片或點按作答,電腦可用數字鍵快答。</p>
    <div class="mode-list" id="mode-list"></div>
  </div>
</div>

<!-- 回合小結 -->
<div class="overlay hidden" id="ov-round">
  <div class="panel">
    <h2 id="round-title">第 1 回合完成</h2>
    <div class="stats">
      <span>本回合答對<b id="round-correct">0/10</b></span>
      <span>目前正確率<b id="round-acc">0%</b></span>
    </div>
    <div class="wrong-list" id="round-wrong"></div>
    <button class="btn" id="btn-next">下一回合</button>
  </div>
</div>

<!-- 街機休息/暫停 -->
<div class="overlay hidden" id="ov-break">
  <div class="panel">
    <h2 id="break-title">休息一下</h2>
    <p id="break-msg"></p>
    <div class="stats">
      <span>目前分數<b id="break-score">0</b></span>
      <span>已消除<b id="break-cleared">0</b></span>
      <span>最長連消<b id="break-combo">0</b></span>
    </div>
    <button class="btn" id="btn-resume">繼續挑戰</button>
  </div>
</div>

<!-- 結算 -->
<div class="overlay hidden" id="ov-end">
  <div class="panel">
    <h2>挑戰完成!</h2>
    <div class="big" id="end-score">0 分</div>
    <div class="stats">
      <span>答對題數<b id="end-correct">0</b></span>
      <span>正確率<b id="end-acc">0%</b></span>
      <span>最長連對<b id="end-streak">0</b></span>
    </div>
    <div class="wrong-list" id="end-wrong"></div>
    <div class="scorecard-box">
      <input class="txt" id="player-name" maxlength="20" placeholder="輸入班級座號姓名(例:商三乙15王小明)">
      <button class="btn ghost-btn" id="btn-make-card">產生成績卡 📸</button>
      <div id="scorecard-result"></div>
    </div>
    <button class="btn" id="btn-retry-wrong">錯題重練</button>
    <button class="btn ghost-btn" id="btn-restart">回到首頁</button>
  </div>
</div>

<!-- 教師驗證(網址加 #verify 開啟) -->
<div class="overlay hidden" id="ov-verify">
  <div class="panel">
    <h2>成績卡驗證</h2>
    <p>依成績卡上的內容逐欄輸入,系統會核對驗證碼是否相符。</p>
    <input class="txt" id="v-name" placeholder="姓名(照卡片輸入)">
    <input class="txt" id="v-mode" placeholder="模式(照卡片輸入)">
    <input class="txt" id="v-score" placeholder="分數(照卡片輸入,例:186 分)">
    <input class="txt" id="v-dt" placeholder="日期時間(照卡片輸入,例:2026/07/16 14:32)">
    <input class="txt" id="v-code" placeholder="驗證碼(例:A3F9-K27B)">
    <div class="verify-result" id="verify-result"></div>
    <button class="btn" id="btn-verify">驗證</button>
    <button class="btn ghost-btn" id="btn-verify-close">關閉</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   題庫:依《會計項目彙總》(台科大圖書) 逐項編製
   c: 五大類別   l: 流動性(僅資產/負債)   x:1 減項   p:1 加項
   ══════════════════════════════════════════════════════ */
const BANK = [
/* ── 資產:流動資產 ── */
{n:"現金",c:"資產",l:"流動"},
{n:"零用金",c:"資產",l:"流動"},
{n:"銀行存款",c:"資產",l:"流動"},
{n:"強制透過損益按公允價值衡量之金融資產—流動",c:"資產",l:"流動"},
{n:"強制透過損益按公允價值衡量之金融資產評價調整—流動",c:"資產",l:"流動"},
{n:"應收票據",c:"資產",l:"流動"},
{n:"應收票據折價",c:"資產",l:"流動",x:1},
{n:"備抵損失—應收票據",c:"資產",l:"流動",x:1},
{n:"應收帳款",c:"資產",l:"流動"},
{n:"備抵損失—應收帳款",c:"資產",l:"流動",x:1},
{n:"應收退稅款",c:"資產",l:"流動"},
{n:"應收收益",c:"資產",l:"流動"},
{n:"其他應收款",c:"資產",l:"流動"},
{n:"存貨",c:"資產",l:"流動"},
{n:"備抵存貨跌價",c:"資產",l:"流動",x:1},
{n:"農業產品",c:"資產",l:"流動"},
{n:"消耗性生物資產—流動",c:"資產",l:"流動"},
{n:"消耗性生物資產公允價值減出售成本累計變動數—流動",c:"資產",l:"流動"},
{n:"生產性生物資產—流動",c:"資產",l:"流動"},
{n:"生產性生物資產公允價值減出售成本累計變動數—流動",c:"資產",l:"流動"},
{n:"預付貨款",c:"資產",l:"流動"},
{n:"預付費用",c:"資產",l:"流動"},
{n:"用品盤存",c:"資產",l:"流動"},
{n:"進項稅額",c:"資產",l:"流動"},
{n:"留抵稅額",c:"資產",l:"流動"},
{n:"待出售非流動資產",c:"資產",l:"流動"},
{n:"暫付款",c:"資產",l:"流動"},
{n:"代付款",c:"資產",l:"流動"},
/* ── 資產:非流動資產 ── */
{n:"強制透過損益按公允價值衡量之金融資產—非流動",c:"資產",l:"非流動"},
{n:"強制透過損益按公允價值衡量之金融資產評價調整—非流動",c:"資產",l:"非流動"},

function buildQueue(mode){
  if(mode==="quick") return shuffle([...BANK]).slice(0,30);
  if(mode==="contra"){
    /* 標記項目(累計折舊、累計攤銷除外) */
    const marked=BANK.filter(it=>(it.x||it.p)
      && !it.n.startsWith("累計折舊") && !it.n.startsWith("累計攤銷"));
    /* 累計折舊、累計攤銷各隨機抽 2 個 */
    const dep=shuffle(BANK.filter(it=>it.n.startsWith("累計折舊"))).slice(0,2);
    const amo=shuffle(BANK.filter(it=>it.n.startsWith("累計攤銷"))).slice(0,2);
    /* 借貸餘額判斷題:每個項目出借餘、貸餘各一題 */
    const dual=[];
    for(const d of CONTRA_DUAL){
      const drIsMinus = d.dr==="減";
      dual.push({n:d.b+"(借方餘額)", c:d.c, x:drIsMinus?1:0});
      dual.push({n:d.b+"(貸方餘額)", c:d.c, x:drIsMinus?0:1});
    }
    return shuffle([...marked,...dep,...amo,...dual,...CONTRA_EXTRA]);
  }
  if(mode==="affix"){
    return shuffle([...AFFIX]);
  }
  return shuffle([...BANK]);
}

const modeName={basic:"基礎挑戰",quick:"快速練習",liquid:"進階.流動性挑戰",contra:"進階.加減項特訓",affix:"字首字尾特訓"};
$("#mode-list").innerHTML=Object.keys(MODES).map(m=>
  `<button class="mode-btn" data-mode="${m}"><b>${modeName[m]}</b><span>${modeDesc[m]}</span></button>`
).join("")+
`<button class="mode-btn" data-mode="arcade" style="border-color:#C1272D">
   <b style="color:#C1272D">街機.會計方塊</b>
   <span>科目卡不斷落下,落地前移到正確類別!放錯會堆疊,疊滿 5 層結束,全破 5 關即勝利</span>
 </button>`+
`<button class="mode-btn" data-mode="arcade-tf" style="border-color:#C1272D">
   <b style="color:#C1272D">街機.加減項是非快打</b>
   <span>會計項目固定顯示在上方,落下的是分類標籤(例:資產加項),判斷 ○ 或 ✕!同樣 5 關制</span>
 </button>`;
document.querySelectorAll(".mode-btn").forEach(b=>
  b.addEventListener("click",()=>{
    const m=b.dataset.mode;
    if(m==="arcade") startArcade("cat");
    else if(m==="arcade-tf") startArcade("tf");
    else startGame(m);
  })
);

/* ── 建立置放區 ── */
let selElem=null;
function clearSel(){
  selElem=null;
  document.querySelectorAll(".bin-elem").forEach(b=>b.classList.remove("sel"));
}
function selectElem(b){
  document.querySelectorAll(".bin-elem").forEach(x=>x.classList.remove("sel"));
  b.classList.add("sel");
  selElem=b.dataset.elem;
  if(!locked){
    fb.textContent=`已選「${selElem}」,再點右邊的加項或減項`;
    fb.classList.remove("err");
  }
}
function natAnswer(nat){
  if(!selElem){
    fb.textContent="請先點選左邊的要素!";
    fb.classList.add("err");
    return;
  }
  answer(selElem+nat);
}
function buildBins(){
  binsEl.className="bins "+cfg.binClass;
  if(cfg.two){
    binsEl.innerHTML=
      `<div class="elem-grid">`+
      cfg.elems.map((cat,i)=>
        `<div class="bin bin-elem" data-elem="${cat}" style="--c:${ANS_COLOR[cat]}">
           <span class="cn">${cat}</span><span class="key">${i+1}</span>
         </div>`).join("")+
      `</div><div class="nat-grid">`+
      `<div class="bin bin-nat" data-nat="加項" style="--c:#1B5E3B"><span class="cn">加項</span><span class="key">6</span></div>`+
      `<div class="bin bin-nat" data-nat="減項" style="--c:#C1272D"><span class="cn">減項</span><span class="key">7</span></div>`+
      `</div>`;
    bins=[...binsEl.querySelectorAll(".bin")];
    binsEl.querySelectorAll(".bin-elem").forEach(b=>b.addEventListener("click",()=>selectElem(b)));
    binsEl.querySelectorAll(".bin-nat").forEach(b=>b.addEventListener("click",()=>natAnswer(b.dataset.nat)));
  }else{
    binsEl.innerHTML=cfg.bins.map((cat,i)=>
      `<div class="bin" data-cat="${cat}" style="--c:${ANS_COLOR[cat]}">
         <span class="cnt">0</span><span class="cn">${cat}</span><span class="key">${i+1}</span>
       </div>`
    ).join("");
    bins=[...binsEl.querySelectorAll(".bin")];
    bins.forEach((b,i)=>b.addEventListener("click",()=>{
      if(arcade) arcMove(i); else answer(b.dataset.cat);
    }));
  }
}

function startGame(m, customQueue){
  stopArcade();
  mode=m; cfg=MODES[m];
  $("#mode-label").textContent=cfg.label;
  buildBins();
  queue=customQueue?shuffle([...customQueue]):buildQueue(m);
  idx=0; score=0; streak=0; maxStreak=0;
  wrongAll=[]; roundWrong=[]; roundCorrect=0; roundNo=1;
  cardAsk.textContent=cfg.ask;
  $("#deck-hint").textContent=cfg.hint||HINT_DEFAULT;
  clearSel();
  updateHUD(); showItem();
  $("#ov-start").classList.add("hidden");
  $("#ov-round").classList.add("hidden");
  $("#ov-end").classList.add("hidden");
}

function showItem(){
  const it=queue[idx];
  firstTry=true; locked=false;
  clearSel();
  cardName.textContent=it.n;
  cardName.classList.remove("long","xl");
  if(it.n.length>=16) cardName.classList.add("xl");
  else if(it.n.length>=9) cardName.classList.add("long");
  cardNo.textContent=`No. ${idx+1} / ${queue.length}`;
  if(cfg.badge && it.x){ cardContra.textContent="減項"; cardContra.style.display="inline-block"; }
  else if(cfg.badge && it.p){ cardContra.textContent="加項"; cardContra.style.display="inline-block"; }
  else{ cardContra.style.display="none"; }
  fb.textContent=""; fb.classList.remove("err");
  card.style.visibility="visible";
  card.animate?.([{transform:"translateY(14px)",opacity:0},{transform:"translateY(0)",opacity:1}],{duration:220,easing:"ease-out"});
}

function updateHUD(){
  $("#prog-text").textContent=`${idx}/${queue.length}`;
  $("#score-text").textContent=score;
  $("#streak-text").textContent= streak>=3 ? `🔥 連對 ${streak}` : "";
  $("#prog-bar").style.width=(queue.length?idx/queue.length*100:0)+"%";
}

function answer(cat){
  if(locked || !queue.length) return;
  const it=queue[idx];
  const correct=cfg.key(it);
  if(cat===correct){
    locked=true;
    if(firstTry){ score++; streak++; maxStreak=Math.max(maxStreak,streak); roundCorrect++; }
    const bin=bins.find(b=>b.dataset.cat===cat);
    if(bin){
      const cnt=bin.querySelector(".cnt");
      if(cnt) cnt.textContent=+cnt.textContent+1;
    }
    seal.classList.remove("show"); void seal.offsetWidth; seal.classList.add("show");
    if(mode==="contra"){
      fb.textContent=`正確!「${it.n}」是${it.c}的${it.x?"減項":"加項"}`;
    }else if(mode==="affix" && it.e){
      fb.textContent=`✔ ${it.e}`;
    }else if(cfg.badge && (it.x||it.p)){
      fb.textContent=`正確!「${it.n}」是${it.c}類的${nature(it)}項目`;
    }else{
      fb.textContent="";
    }
    const stayMs = mode==="affix" ? 1500 : 620;
    setTimeout(()=>{
      seal.classList.remove("show");
      card.style.visibility="hidden";
      idx++;
      updateHUD();
      if(idx>=queue.length){ endGame(); }
      else if(idx % ROUND_SIZE===0){ roundSummary(); }
      else{ showItem(); }
    }, stayMs);
  }else{
    streak=0;
    if(firstTry){ wrongAll.push(it); roundWrong.push(it); }
    firstTry=false;
    card.classList.remove("wrong-shake"); void card.offsetWidth; card.classList.add("wrong-shake");
    fb.textContent=`「${it.n}」不是${cat},再想想看!`;
    fb.classList.add("err");
    updateHUD();
  }
}

function wrongListHTML(list){
  return list.map(w=>{
    const ans=cfg.key(w);
    return `${w.n}<span class="tag" style="background:${ANS_COLOR[ans]}">${ans}</span>`;
  }).join("<br>");
}

function roundSummary(){
  $("#round-title").textContent=`第 ${roundNo} 回合完成`;
  $("#round-correct").textContent=`${roundCorrect}/${ROUND_SIZE}`;
  $("#round-acc").textContent=Math.round(score/idx*100)+"%";
  $("#round-wrong").innerHTML = roundWrong.length
    ? "<b>本回合答錯:</b><br>"+wrongListHTML(roundWrong)
    : "本回合全對,太厲害了!";
  roundWrong=[]; roundCorrect=0; roundNo++;
  $("#ov-round").classList.remove("hidden");
}

function endGame(){
  $("#ov-end .panel h2").textContent="挑戰完成!";
  $("#btn-retry-wrong").textContent="錯題重練";
  $("#scorecard-result").innerHTML="";
  $("#end-score").textContent=Math.round(score/queue.length*100)+" 分";
  $("#end-correct").textContent=`${score}/${queue.length}`;
  $("#end-acc").textContent=Math.round(score/queue.length*100)+"%";
  $("#end-streak").textContent=maxStreak;
  $("#end-wrong").innerHTML = wrongAll.length
    ? "<b>需要複習的項目:</b><br>"+wrongListHTML(wrongAll)
    : "全部一次答對,滿分通過!";
  $("#btn-retry-wrong").style.display = wrongAll.length ? "" : "none";
  $("#ov-end").classList.remove("hidden");
}

/* ── 鍵盤快答 ── */
document.addEventListener("keydown",e=>{
  if(document.querySelector(".overlay:not(.hidden)")) return;
  const i=+e.key-1;
  if(arcade){
    if(e.key==="ArrowLeft") arcMove(arcCol-1);
    else if(e.key==="ArrowRight") arcMove(arcCol+1);
    else if(e.key==="ArrowDown"||e.key===" ") dropping=true;
    else if(i>=0 && i<5) arcMove(i);
    return;
  }
  if(cfg.two){
    const elems=[...document.querySelectorAll(".bin-elem")];
    if(i>=0 && i<elems.length) selectElem(elems[i]);
    else if(e.key==="6") natAnswer("加項");
    else if(e.key==="7") natAnswer("減項");
  }else{
    if(i>=0 && i<bins.length) answer(bins[i].dataset.cat);
  }
});

/* ── 拖曳(Pointer Events,支援觸控與滑鼠)── */
let ghost=null, dragging=false;
card.addEventListener("pointerdown",e=>{
  if(locked || card.style.visibility==="hidden") return;
  dragging=true;
  card.setPointerCapture(e.pointerId);
  ghost=card.cloneNode(true);
  ghost.classList.add("ghost");
  ghost.style.width=card.offsetWidth+"px";
  document.body.appendChild(ghost);
  moveGhost(e);
  card.classList.add("dragging");
});
card.addEventListener("pointermove",e=>{ if(dragging) moveGhost(e); });
card.addEventListener("pointerup",e=>{
  if(!dragging) return;
  dragging=false;
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const bin=el?.closest?.(".bin");
  bins.forEach(b=>b.classList.remove("hover"));
  ghost?.remove(); ghost=null;
  card.classList.remove("dragging");
  if(bin){
    if(bin.classList.contains("bin-elem")) selectElem(bin);
    else if(bin.classList.contains("bin-nat")) natAnswer(bin.dataset.nat);
    else answer(bin.dataset.cat);
  }
});
card.addEventListener("pointercancel",()=>{
  dragging=false; ghost?.remove(); ghost=null;
  card.classList.remove("dragging");
  bins.forEach(b=>b.classList.remove("hover"));
});
function moveGhost(e){
  ghost.style.left=e.clientX+"px";
  ghost.style.top=e.clientY+"px";
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const over=el?.closest?.(".bin");
  bins.forEach(b=>b.classList.toggle("hover",b===over));
}

/* ── 按鈕 ── */
$("#btn-next").addEventListener("click",()=>{ $("#ov-round").classList.add("hidden"); showItem(); });
$("#btn-restart").addEventListener("click",()=>{
  stopArcade();
  $("#ov-end").classList.add("hidden");
  $("#ov-start").classList.remove("hidden");
});
$("#btn-retry-wrong").addEventListener("click",()=>{
  if(mode==="arcade") startArcade(arcVariant);
  else startGame(mode, wrongAll);
});

/* ══════════════════════════════════════════════════════
   街機模式:會計方塊
   ══════════════════════════════════════════════════════ */
let arcade=false, arcRaf=null, arcDeck=[], arcDeckIdx=0, arcVariant="cat";
let arcCard=null, arcIt=null, arcCol=2, arcY=0, lastT=0, dropping=false, arcPaused=false;
let stacks=[[],[],[],[],[]], level=1, clearedN=0, combo=0, maxCombo=0;
const MAX_STACK=5, BLOCK_H=26, BLOCK_GAP=3, MAX_LEVEL=5;
const mainEl=$("#main");
const ELEMS=["資產","負債","權益","收益","費損"];
const arcName=()=> arcVariant==="tf" ? "是非快打" : "會計方塊";

const fieldRect=()=>mainEl.getBoundingClientRect();
const colCenters=()=>bins.map(b=>{const r=b.getBoundingClientRect();return r.left+r.width/2;});
const fallDur=lv=>Math.max(2.4, (arcVariant==="tf"?8.5:7)*Math.pow(0.88,lv-1));

function refillArcDeck(){
  arcDeck = arcVariant==="tf" ? shuffle(buildQueue("contra")) : shuffle([...BANK]);
  arcDeckIdx=0;
}
/* 是非快打:依項目產生正確或竄改後的敘述 */
function makeStatement(it){
  const truth=Math.random()<0.5;
  let elem=it.c, nat=it.x?"減項":"加項";
  if(!truth){
    if(Math.random()<0.5){
      const others=ELEMS.filter(e=>e!==it.c);
      elem=others[Math.floor(Math.random()*others.length)];
    }else{
      nat = nat==="減項" ? "加項" : "減項";
    }
  }
  return {
    stmt:`「${it.n}」是${elem}的${nat}`,
    claim:`${elem}${nat}`,
    truth,
    real:it.c+(it.x?"減項":"加項"),
    baseName:it.n
  };
}
/* 是非快打:上方題目看板 */
function tfBanner(name){
  let q=mainEl.querySelector(".tf-quest");
  if(!q){
    q=document.createElement("div");
    q.className="tf-quest";
    q.innerHTML=`<div class="tq-name"></div><div class="tq-cap">落下的分類標籤正確嗎?○ 對.✕ 錯</div>`;
    mainEl.appendChild(q);
  }
  const nm=q.querySelector(".tq-name");
  nm.textContent=name;
  nm.style.fontSize = name.length>=16 ? "1rem" : name.length>=9 ? "1.3rem" : "1.65rem";
  return q;
}

function clearArcadeDom(){
  mainEl.querySelectorAll(".fall,.stack-block,.danger-line,.levelup,.pause-btn,.tf-quest").forEach(el=>el.remove());
}
function stopArcade(){
  if(arcRaf) cancelAnimationFrame(arcRaf);
  arcRaf=null; arcade=false; arcCard=null; arcPaused=false;
  clearArcadeDom();
  card.style.visibility="hidden";
}

function startArcade(variant){
  stopArcade();
  arcVariant=variant||"cat";
  mode="arcade"; cfg=MODES.basic; arcade=true; arcPaused=false;
  if(arcVariant==="tf"){
    binsEl.className="bins n2";
    binsEl.innerHTML=
      `<div class="bin" data-cat="○" style="--c:#1E7F4F"><span class="cn">○ 正確</span><span class="key">1</span></div>`+
      `<div class="bin" data-cat="✕" style="--c:#C1272D"><span class="cn">✕ 錯誤</span><span class="key">2</span></div>`;
    bins=[...binsEl.querySelectorAll(".bin")];
    bins.forEach((b,i)=>b.addEventListener("click",()=>{ if(arcade) arcMove(i); }));
    $("#deck-hint").textContent="上方是題目,判斷落下的分類標籤對不對!點 ○/✕ 移動,點標籤直接落下";
  }else{
    buildBins();
    $("#deck-hint").textContent="點下方類別左右移動卡片,點卡片直接落下";
  }
  cardAsk.textContent="";
  stacks=[[],[],[],[],[]]; level=1; clearedN=0; combo=0; maxCombo=0; score=0;
  wrongAll=[];
  refillArcDeck();
  const dl=document.createElement("div");
  dl.className="danger-line";
  dl.style.top=(fieldRect().height-MAX_STACK*(BLOCK_H+BLOCK_GAP)-6)+"px";
  mainEl.appendChild(dl);
  const pb=document.createElement("button");
  pb.className="pause-btn"; pb.textContent="⏸ 休息";
  pb.addEventListener("click",()=>pauseBreak("暫停中","休息一下,準備好再按繼續!"));
  mainEl.appendChild(pb);
  fb.textContent=""; fb.classList.remove("err");
  ["ov-start","ov-round","ov-end"].forEach(id=>$("#"+id).classList.add("hidden"));
  updateArcHUD();
  spawnCard();
  lastT=performance.now();
  arcRaf=requestAnimationFrame(arcTick);
}

function spawnCard(){
  if(arcDeckIdx>=arcDeck.length) refillArcDeck();
  const raw=arcDeck[arcDeckIdx++];
  dropping=false;
  arcCard=document.createElement("div");
  if(arcVariant==="tf"){
    arcIt=makeStatement(raw);
    arcCol=Math.random()<0.5?0:1;
    const q=tfBanner(arcIt.baseName);
    arcCard.className="card fall tfclaim";
    const nm=document.createElement("div");
    nm.className="name";
    nm.textContent=arcIt.claim;
    arcCard.appendChild(nm);
    arcCard.addEventListener("pointerdown",()=>{ dropping=true; });
    mainEl.appendChild(arcCard);
    arcY=q.offsetTop+q.offsetHeight+10;
  }else{
    arcIt=raw;
    arcCol=2;
    arcCard.className="card fall";
    const nm=document.createElement("div");
    nm.className="name"+(arcIt.n.length>=16?" xl":arcIt.n.length>=9?" long":"");
    nm.textContent=arcIt.n;
    arcCard.appendChild(nm);
    arcCard.addEventListener("pointerdown",()=>{ dropping=true; });
    mainEl.appendChild(arcCard);
    arcY=-arcCard.offsetHeight-4;
  }
  positionArcCard();
}
function positionArcCard(){
  if(!arcCard) return;
  const fr=fieldRect(), centers=colCenters();
  arcCard.style.left=(centers[arcCol]-fr.left)+"px";
  arcCard.style.transform="translateX(-50%)";
  arcCard.style.top=arcY+"px";
}
function arcMove(i){
  if(!arcade||!arcCard) return;
  arcCol=Math.max(0,Math.min(bins.length-1,i));
  positionArcCard();
}

function arcTick(t){
  if(!arcade||!arcCard) return;
  const dt=Math.min((t-lastT)/1000,.05); lastT=t;
  const fr=fieldRect();
  arcY += (fr.height/fallDur(level))*dt*(dropping?9:1);
  const landTop = fr.height - stacks[arcCol].length*(BLOCK_H+BLOCK_GAP);
  if(arcY+arcCard.offsetHeight>=landTop){ arcLand(); return; }
  arcCard.style.top=arcY+"px";
  arcRaf=requestAnimationFrame(arcTick);
}

function arcLand(){
  const correct = arcVariant==="tf"
    ? (arcCol===0)===arcIt.truth
    : bins[arcCol].dataset.cat===arcIt.c;
  arcCard.remove(); arcCard=null;
  if(correct){
    clearedN++; combo++; maxCombo=Math.max(maxCombo,combo);
    score += 10 + 2*(level-1) + Math.min(combo-1,5);
    seal.classList.remove("show"); void seal.offsetWidth; seal.classList.add("show");
    setTimeout(()=>seal.classList.remove("show"),320);
    fb.textContent = combo>=3 ? `連消 ${combo}!` : "";
    fb.classList.remove("err");
    if(clearedN%8===0){
      if(level>=MAX_LEVEL){ updateArcHUD(); arcadeOver(true); return; }
      level++;
      updateArcHUD();
      pauseBreak(`LEVEL ${level} 達成!`,"喝口水休息一下~準備好再繼續,掉落速度會變快!");
      return;
    }
  }else{
    combo=0;
    if(arcVariant==="tf"){
      wrongAll.push({n:`${arcIt.baseName}(出題:${arcIt.claim})`, c:arcIt.real});
      addStackBlock(arcCol, arcIt.baseName, arcIt.real);
      fb.textContent=`正解:「${arcIt.baseName}」是${arcIt.real.slice(0,2)}的${arcIt.real.slice(2)}`;
    }else{
      wrongAll.push(arcIt);
      addStackBlock(arcCol, arcIt.n, arcIt.c);
      fb.textContent=`「${arcIt.n}」是${arcIt.c}!`;
    }
    fb.classList.add("err");
    if(stacks[arcCol].length>=MAX_STACK){ updateArcHUD(); arcadeOver(false); return; }
  }
  updateArcHUD();
  setTimeout(()=>{
    if(!arcade || arcPaused) return;
    spawnCard();
    lastT=performance.now();
    arcRaf=requestAnimationFrame(arcTick);
  },280);
}

function pauseBreak(title,msg){
  if(!arcade) return;
  arcPaused=true;
  if(arcRaf) cancelAnimationFrame(arcRaf);
  $("#break-title").textContent=title;
  $("#break-msg").textContent=msg;
  $("#break-score").textContent=score;
  $("#break-cleared").textContent=clearedN;
  $("#break-combo").textContent=maxCombo;
  $("#ov-break").classList.remove("hidden");
}
$("#btn-resume").addEventListener("click",()=>{
  $("#ov-break").classList.add("hidden");
  if(!arcade) return;
  arcPaused=false;
  lastT=performance.now();
  if(!arcCard) spawnCard();
  arcRaf=requestAnimationFrame(arcTick);
});

function addStackBlock(col,text,colorKey){
  stacks[col].push(text);
  const fr=fieldRect(), centers=colCenters();
  const b=document.createElement("div");
  b.className="stack-block";
  b.style.background=ANS_COLOR[colorKey]||"#22303A";
  b.style.width=(bins[col].getBoundingClientRect().width-4)+"px";
  b.style.height=BLOCK_H+"px";
  b.style.left=(centers[col]-fr.left)+"px";
  b.style.transform="translateX(-50%)";
  b.style.top=(fr.height-stacks[col].length*(BLOCK_H+BLOCK_GAP))+"px";
  b.textContent=text;
  mainEl.appendChild(b);
}

function showLevelUp(){
  const el=document.createElement("div");
  el.className="levelup show";
  el.textContent=`LEVEL ${level}`;
  mainEl.appendChild(el);
  setTimeout(()=>el.remove(),1050);
}

function updateArcHUD(){
  $("#mode-label").textContent=`${arcName()} Lv.${level}/${MAX_LEVEL}`;
  $("#prog-text").textContent=clearedN;
  $("#score-text").textContent=score;
  $("#streak-text").textContent= combo>=3 ? `🔥 連消 ${combo}` : "";
  $("#prog-bar").style.width=((clearedN%8)/8*100)+"%";
}

function arcadeOver(win){
  arcade=false;
  if(arcRaf) cancelAnimationFrame(arcRaf);
  if(win) score+=100;
  $("#scorecard-result").innerHTML="";
  $("#ov-end .panel h2").textContent= win ? "🎉 五關全破!" : "遊戲結束!";
  $("#end-score").textContent=score+" 分";
  $("#end-correct").textContent=clearedN;
  const total=clearedN+wrongAll.length;
  $("#end-acc").textContent= total ? Math.round(clearedN/total*100)+"%" : "0%";
  $("#end-streak").textContent=maxCombo;
  $("#end-wrong").innerHTML =
    (win ? "<b style='color:#1E7F4F'>全破獎勵 +100 分!</b><br>" : "") +
    (wrongAll.length
      ? "<b>放錯的項目:</b><br>"+wrongAll.map(w=>`${w.n}<span class="tag" style="background:${ANS_COLOR[w.c]}">${w.c}</span>`).join("<br>")
      : "");
  $("#btn-retry-wrong").textContent="再玩一次";
  $("#btn-retry-wrong").style.display="";
  $("#ov-end").classList.remove("hidden");
}

/* ══════════════════════════════════════════════════════
   成績卡與驗證碼
   ══════════════════════════════════════════════════════ */
const VSALT="CLVS-ACC-2026-桃";
function vcode(str){
  let h=5381, h2=52711;
  for(let i=0;i<str.length;i++){ h=((h<<5)+h+str.charCodeAt(i))>>>0; }
  for(let i=str.length-1;i>=0;i--){ h2=((h2*33)^str.charCodeAt(i))>>>0; }
  const s=(h.toString(36)+h2.toString(36)).toUpperCase().replace(/[^A-Z0-9]/g,"");
  return (s+"00000000").slice(0,8).replace(/^(.{4})(.{4})$/,"$1-$2");
}
const cardModeName=()=> mode==="arcade" ? "街機."+arcName() : modeName[mode];

$("#btn-make-card").addEventListener("click",async()=>{
  const name=$("#player-name").value.trim();
  if(!name){
    $("#player-name").style.borderColor="var(--stamp)";
    $("#player-name").placeholder="請先輸入姓名!";
    return;
  }
  $("#player-name").style.borderColor="";
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  const dt=`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  const mName=cardModeName();
  const scoreTxt=$("#end-score").textContent.trim();
  const code=vcode(`${VSALT}|${name}|${mName}|${scoreTxt}|${dt}`);
  const stat1=$("#end-correct").textContent.trim();
  const stat2=$("#end-acc").textContent.trim();
  const stat3=$("#end-streak").textContent.trim();
  const lv= mode==="arcade" ? `Lv.${level}` : "";

  try{ await document.fonts.ready; }catch(e){}
  const W=1000,H=640;
  const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
  const g=cv.getContext("2d");
  /* 帳簿紙底 */
  g.fillStyle="#F8F6EF"; g.fillRect(0,0,W,H);
  g.strokeStyle="#C9D6E8"; g.lineWidth=1;
  for(let y=64;y<H;y+=44){ g.beginPath(); g.moveTo(0,y); g.lineTo(W,y); g.stroke(); }
  g.strokeStyle="#D65A5A"; g.lineWidth=2;
  g.beginPath(); g.moveTo(78,0); g.lineTo(78,H); g.stroke();
  g.strokeStyle="#22303A"; g.lineWidth=3; g.strokeRect(14,14,W-28,H-28);
  /* 標題 */
  g.fillStyle="#22303A"; g.textAlign="center";
  g.font='900 46px "Noto Sans TC",sans-serif';
  g.fillText("會計項目分類挑戰",W/2,88);
  g.font='700 22px "Noto Sans TC",sans-serif';
  g.fillStyle="#5B6B77";
  g.fillText("成 績 證 明",W/2,124);
  /* 姓名與模式 */
  g.fillStyle="#22303A";
  g.font='900 40px "Noto Sans TC",sans-serif';
  g.fillText(name,W/2,196);
  g.font='700 24px "Noto Sans TC",sans-serif';
  g.fillStyle="#5B6B77";
  g.fillText(`模式:${mName} ${lv}`,W/2,238);
  /* 分數 */
  g.fillStyle="#22303A";
  g.font='900 110px "Noto Sans TC",sans-serif';
  g.fillText(scoreTxt,W/2,372);
  /* 統計列 */
  const labels= mode==="arcade" ? ["消除數","正確率","最長連消"] : ["答對題數","正確率","最長連對"];
  const vals=[stat1,stat2,stat3];
  const xs=[W/2-280,W/2,W/2+280];
  g.font='500 20px "Noto Sans TC",sans-serif';
  for(let i=0;i<3;i++){
    g.fillStyle="#5B6B77"; g.font='500 20px "Noto Sans TC",sans-serif';
    g.fillText(labels[i],xs[i],428);
    g.fillStyle="#22303A"; g.font='900 34px "Noto Sans TC",sans-serif';
    g.fillText(vals[i],xs[i],470);
  }
  /* 日期與驗證碼 */
  g.fillStyle="#5B6B77"; g.font='500 22px "Noto Sans TC",sans-serif';
  g.fillText(dt,W/2,530);
  g.fillStyle="#22303A"; g.font='900 30px monospace';
  g.fillText(`驗證碼 ${code}`,W/2,576);
  /* 印章 */
  g.save();
  g.translate(W-150,150); g.rotate(-0.22);
  g.strokeStyle="rgba(193,39,45,.85)"; g.lineWidth=6;
  g.beginPath(); g.arc(0,0,74,0,Math.PI*2); g.stroke();
  g.fillStyle="rgba(193,39,45,.85)";
  g.font='900 52px "Noto Sans TC",sans-serif';
  g.fillText("正解",0,20);
  g.restore();

  const url=cv.toDataURL("image/png");
  $("#scorecard-result").innerHTML=
    `<img src="${url}" alt="成績卡">`+
    `<a class="btn ghost-btn" style="display:inline-block;text-decoration:none" href="${url}" download="成績卡_${name}.png">下載圖片</a>`+
    `<div class="vcode-note">手機也可以長按圖片直接儲存,再傳給老師。<br>驗證碼:<b>${code}</b>(改任何內容驗證碼就會對不上喔)</div>`;
});

/* ── 教師驗證頁(網址加 #verify 開啟)── */
function openVerify(){ $("#ov-verify").classList.remove("hidden"); }
if(location.hash==="#verify") openVerify();
window.addEventListener("hashchange",()=>{ if(location.hash==="#verify") openVerify(); });
$("#btn-verify").addEventListener("click",()=>{
  const name=$("#v-name").value.trim();
  const mName=$("#v-mode").value.trim();
  const scoreTxt=$("#v-score").value.trim();
  const dt=$("#v-dt").value.trim();
  const code=$("#v-code").value.trim().toUpperCase();
  const expect=vcode(`${VSALT}|${name}|${mName}|${scoreTxt}|${dt}`);
  const r=$("#verify-result");
  if(code===expect){ r.textContent="✔ 驗證通過,成績為真"; r.className="verify-result ok"; }
  else{ r.textContent="✘ 驗證失敗,內容與驗證碼不符"; r.className="verify-result bad"; }
});
$("#btn-verify-close").addEventListener("click",()=>{
  $("#ov-verify").classList.add("hidden");
  if(location.hash==="#verify") history.replaceState(null,"",location.pathname+location.search);
});
</script>
