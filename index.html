<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品總入口</title>
<style>
:root{
  --bg:#F5F6F8;
  --ink:#1F2937;
  --soft:#6B7280;
  --line:#E5E7EB;
  --blue:#1D5FBF;
  --green:#1E7F4F;
  --amber:#C77817;
  --purple:#6B4FA3;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'LINE Seed TW','Noto Sans TC',system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;padding:2.5rem 1.2rem 3rem;
}
.wrap{max-width:720px;margin:0 auto;}
header{margin-bottom:2rem;}
h1{font-size:clamp(1.5rem,6vw,2rem);font-weight:800;letter-spacing:.05em;}
.sub{color:var(--soft);font-size:.9rem;margin-top:.35rem;line-height:1.7;}

.section{margin-bottom:1.8rem;}
.section h2{
  font-size:.85rem;font-weight:700;color:var(--soft);
  letter-spacing:.25em;margin-bottom:.7rem;
  display:flex;align-items:center;gap:.6rem;
}
.section h2::after{content:"";flex:1;height:1px;background:var(--line);}

.cards{display:grid;grid-template-columns:1fr;gap:.7rem;}
@media (min-width:560px){.cards{grid-template-columns:repeat(2,1fr);}}

a.card{
  display:block;background:#fff;
  border:1px solid var(--line);border-radius:12px;
  padding:1rem 1.1rem;
  text-decoration:none;color:inherit;
  border-left:5px solid var(--c,var(--blue));
  transition:transform .15s ease, box-shadow .15s ease;
}
a.card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(31,41,55,.1);}
a.card:active{transform:translateY(0);}
.card .t{font-size:1.05rem;font-weight:800;letter-spacing:.03em;}
.card .d{font-size:.8rem;color:var(--soft);margin-top:.3rem;line-height:1.6;}
.card .go{
  display:inline-block;margin-top:.55rem;
  font-size:.75rem;font-weight:700;color:var(--c,var(--blue));
  letter-spacing:.1em;
}

footer{
  margin-top:2.5rem;text-align:center;
  font-size:.75rem;color:var(--soft);letter-spacing:.15em;line-height:2;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>作品總入口</h1>
    <p class="sub">教學遊戲、行政系統與校園工具都從這裡出發。</p>
  </header>

  <div id="sections"></div>

  <footer>© 商經科 × 衛生組</footer>
</div>

<script>
/* ══════════════════════════════════════════════════════
   入口清單:之後新增只要在對應分區加一筆即可
   url:完整或相對路徑  title:名稱  desc:說明  color:左側色條
   ══════════════════════════════════════════════════════ */
const SECTIONS=[
  {
    name:"教 學 遊 戲",
    items:[
      {url:"./games/", title:"🎮 商經科遊戲大廳",
       desc:"會計項目分類挑戰、借貸法則大挑戰,邊玩邊學拿認證成績卡。",
       color:"#C77817"}
    ]
  },
  {
    name:"行 政 系 統",
    items:[
      {url:"./missioncomplete/", title:"✅ 掃區任務完成系統",
       desc:"QR code 打卡回報,掃區檢查任務完成確認。",
       color:"#1E7F4F"}
    ]
  },
  {
    name:"校 園 工 具",
    items:[
      {url:"./zhongli-campus/", title:"🗺️ 3D 互動校園地圖",
       desc:"立體校園導覽,樓層平面圖與環景照片一次看。",
       color:"#1D5FBF"}
    ]
  }
];

document.getElementById("sections").innerHTML=SECTIONS.map(s=>
  `<div class="section"><h2>${s.name}</h2><div class="cards">`+
  s.items.map(it=>
    `<a class="card" href="${it.url}" style="--c:${it.color}">
       <div class="t">${it.title}</div>
       <div class="d">${it.desc}</div>
       <span class="go">前往 →</span>
     </a>`).join("")+
  `</div></div>`
).join("");
</script>
</body>
</html>
